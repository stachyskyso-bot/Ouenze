<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouenze | Tableau de bord vendeur</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1e293b; }
        :root { --primary: #1e40af; --primary-dark: #1e3a8a; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --white: #ffffff; --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-500: #64748b; --gray-700: #334155; }
        .header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo h1 { font-size: 24px; color: var(--primary); }
        .user-menu { display: flex; align-items: center; gap: 12px; background: var(--gray-100); padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .user-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
        .container { max-width: 1400px; margin: 32px auto; padding: 0 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: var(--white); border-radius: 20px; padding: 20px; border: 1px solid var(--gray-200); }
        .stat-card h3 { font-size: 12px; color: var(--gray-500); margin-bottom: 8px; text-transform: uppercase; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .shop-card { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-200); margin-bottom: 24px; overflow: hidden; }
        .shop-header { padding: 20px; background: var(--gray-100); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .shop-info { display: flex; align-items: center; gap: 16px; }
        .shop-logo { width: 50px; height: 50px; border-radius: 12px; background: white; display: flex; align-items: center; justify-content: center; }
        .shop-body { padding: 20px; }
        .product-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--gray-200); }
        .btn-sm { padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; border: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: var(--gray-100); border: 1px solid var(--gray-200); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-card { background: var(--white); border-radius: 24px; width: 100%; max-width: 500px; padding: 28px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: 10px; }
        .btn-submit { background: var(--primary); color: white; padding: 12px; border-radius: 40px; border: none; width: 100%; cursor: pointer; }
        .footer { text-align: center; padding: 24px; color: var(--gray-500); font-size: 12px; border-top: 1px solid var(--gray-200); margin-top: 40px; }
        @media (max-width: 700px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo"><h1>OUENZE</h1></div>
    <div class="user-menu" onclick="window.location.href='index.html'"><div class="user-avatar" id="userAvatar">V</div><div><span id="userName">Vendeur</span><br><small>Tableau de bord</small></div><i class="fas fa-arrow-right"></i></div>
</div>

<div class="container" id="appContainer"></div>

<div class="footer">2024 Ouenze - Espace vendeur</div>

<script>
    let currentUser = JSON.parse(localStorage.getItem('ouenze_current_user') || 'null');
    let shops = JSON.parse(localStorage.getItem('ouenze_shops') || '[]');
    let orders = JSON.parse(localStorage.getItem('ouenze_orders') || '[]');
    
    if(!currentUser || currentUser.type !== 'vendeur') window.location.href = 'index.html';
    
    document.getElementById('userAvatar').innerText = currentUser.name.charAt(0).toUpperCase();
    document.getElementById('userName').innerText = currentUser.name;
    
    function showDashboard() {
        const userShops = shops.filter(s => s.owner === currentUser.email);
        const totalProducts = userShops.reduce((s,shop)=>s+(shop.products?.length||0),0);
        const totalOrders = orders.filter(o => o.items?.some(i => userShops.some(s=>s.id===i.shopId))).length;
        const totalRevenue = orders.filter(o => o.status === 'delivered').reduce((s,o)=>s+o.total,0);
        
        document.getElementById('appContainer').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><h3>Mes boutiques</h3><div class="stat-value">${userShops.length}</div></div>
                <div class="stat-card"><h3>Produits</h3><div class="stat-value">${totalProducts}</div></div>
                <div class="stat-card"><h3>Commandes</h3><div class="stat-value">${totalOrders}</div></div>
                <div class="stat-card"><h3>CA total</h3><div class="stat-value">${totalRevenue.toLocaleString()} FCFA</div></div>
            </div>
            <div style="display:flex; gap:12px; margin-bottom:24px;">
                <button class="btn-sm btn-primary" onclick="createNewShop()">+ Creer une boutique</button>
                <button class="btn-sm btn-outline" onclick="openAddProduct()">+ Ajouter produit</button>
                <button class="btn-sm btn-outline" onclick="openRestock()"> Ravitailler</button>
            </div>
            <h2>Mes boutiques</h2>
            ${userShops.length ? userShops.map(shop => renderShop(shop)).join('') : '<div class="stat-card" style="text-align:center;">Aucune boutique. Cliquez sur "Creer une boutique"</div>'}
        `;
    }
    
    function renderShop(shop) {
        const shopOrders = orders.filter(o => o.items?.some(i => i.shopId === shop.id));
        const revenue = shopOrders.reduce((s,o)=>s+o.total,0);
        const rating = shop.rating || 0;
        let stars = '';
        for(let i=0;i<Math.floor(rating);i++) stars += '<i class="fas fa-star" style="color:#f59e0b;"></i>';
        for(let i=0;i<5-Math.ceil(rating);i++) stars += '<i class="far fa-star"></i>';
        
        return `
            <div class="shop-card">
                <div class="shop-header">
                    <div class="shop-info">
                        <div class="shop-logo">${shop.logo ? `<img src="${shop.logo}" style="width:40px;height:40px;">` : '<i class="fas fa-store"></i>'}</div>
                        <div><h3>${escapeHtml(shop.name)}</h3><div>${stars} (${shop.totalRatings||0} avis)</div></div>
                    </div>
                    <div><span class="btn-sm btn-outline" onclick="viewStats(${shop.id})">Statistiques</span></div>
                </div>
                <div class="shop-body">
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px;">
                        <div><strong>${shop.products?.length||0}</strong><br>Produits</div>
                        <div><strong>${shopOrders.length}</strong><br>Commandes</div>
                        <div><strong>${revenue.toLocaleString()} FCFA</strong><br>CA</div>
                    </div>
                    <h4>Produits</h4>
                    ${(shop.products||[]).slice(0,3).map(p => `<div class="product-row"><span>${escapeHtml(p.name)}</span><span>${p.price} FCFA</span><span>Stock: ${p.stock||0}</span></div>`).join('')}
                    ${(!shop.products||!shop.products.length) ? '<div>Aucun produit</div>' : ''}
                    <div style="margin-top:16px;">
                        <button class="btn-sm btn-outline" onclick="openAddProductToShop(${shop.id})">Ajouter produit</button>
                        <button class="btn-sm btn-outline" onclick="openRestockToShop(${shop.id})">Ravitailler</button>
                        <button class="btn-sm btn-primary" onclick="window.open('ouenze-shop-designer.html?edit=${shop.id}','_blank')">Modifier boutique</button>
                    </div>
                </div>
            </div>
        `;
    }
    
    function createNewShop() {
        alert("Un email avec le lien de creation a ete envoye");
        window.open('ouenze-shop-designer.html', '_blank');
    }
    
    function openAddProduct() {
        const userShops = shops.filter(s => s.owner === currentUser.email);
        if(!userShops.length) { alert("Creez d'abord une boutique"); return; }
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-card"><h3>Ajouter produit</h3><div class="form-group"><label>Boutique</label><select id="prodShopId">${userShops.map(s=>`<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('')}</select></div>
            <div class="form-group"><label>Nom</label><input id="prodName"></div><div class="form-group"><label>Prix</label><input id="prodPrice"></div>
            <div class="form-group"><label>Categorie</label><input id="prodCat"></div><div class="form-group"><label>Stock</label><input id="prodStock" value="10"></div>
            <div class="form-group"><label>Photo</label><input type="file" id="prodPhoto" accept="image/*"></div>
            <div class="form-group"><label>Description</label><textarea id="prodDesc" rows="2"></textarea></div>
            <button class="btn-submit" onclick="addProductToShop()">Ajouter</button></div>`;
        document.body.appendChild(modal);
        window.addProductToShop = () => {
            const shopId = parseInt(document.getElementById('prodShopId').value);
            const shop = shops.find(s=>s.id===shopId);
            if(shop) {
                const file = document.getElementById('prodPhoto').files[0];
                const reader = new FileReader();
                reader.onload = e => {
                    shop.products.push({ id:Date.now(), name:document.getElementById('prodName').value, price:document.getElementById('prodPrice').value, category:document.getElementById('prodCat').value, stock:parseInt(document.getElementById('prodStock').value), description:document.getElementById('prodDesc').value, photos:[e.target.result] });
                    if(!shop.categories.includes(document.getElementById('prodCat').value)) shop.categories.push(document.getElementById('prodCat').value);
                    localStorage.setItem('ouenze_shops', JSON.stringify(shops));
                    alert("Produit ajoute");
                    modal.remove();
                    showDashboard();
                };
                if(file) reader.readAsDataURL(file);
                else reader.onload({ target:{ result:null } });
            }
        };
    }
    
    function openAddProductToShop(shopId) {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-card"><h3>Ajouter produit</h3>
            <div class="form-group"><label>Nom</label><input id="prodName"></div><div class="form-group"><label>Prix</label><input id="prodPrice"></div>
            <div class="form-group"><label>Categorie</label><input id="prodCat"></div><div class="form-group"><label>Stock</label><input id="prodStock" value="10"></div>
            <div class="form-group"><label>Photo</label><input type="file" id="prodPhoto" accept="image/*"></div>
            <div class="form-group"><label>Description</label><textarea id="prodDesc" rows="2"></textarea></div>
            <button class="btn-submit" onclick="addProductToShopSpecific(${shopId})">Ajouter</button></div>`;
        document.body.appendChild(modal);
        window.addProductToShopSpecific = (sid) => {
            const shop = shops.find(s=>s.id===sid);
            if(shop) {
                const file = document.getElementById('prodPhoto').files[0];
                const reader = new FileReader();
                reader.onload = e => {
                    shop.products.push({ id:Date.now(), name:document.getElementById('prodName').value, price:document.getElementById('prodPrice').value, category:document.getElementById('prodCat').value, stock:parseInt(document.getElementById('prodStock').value), description:document.getElementById('prodDesc').value, photos:[e.target.result] });
                    if(!shop.categories.includes(document.getElementById('prodCat').value)) shop.categories.push(document.getElementById('prodCat').value);
                    localStorage.setItem('ouenze_shops', JSON.stringify(shops));
                    alert("Produit ajoute");
                    modal.remove();
                    showDashboard();
                };
                if(file) reader.readAsDataURL(file);
                else reader.onload({ target:{ result:null } });
            }
        };
    }
    
    function openRestock() { alert("Selectionnez un produit pour augmenter le stock"); }
    function openRestockToShop(shopId) { alert("Fonctionnalite de ravitaillement a venir"); }
    function viewStats(shopId) { alert("Statistiques de la boutique (graphiques a venir)"); }
    function escapeHtml(s) { return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    showDashboard();
</script>
</body>
</html>
