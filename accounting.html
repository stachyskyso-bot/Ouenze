<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouenze | Comptabilité vendeur</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1e293b; }
        :root { --primary: #1e40af; --primary-dark: #1e3a8a; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --white: #ffffff; --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-500: #64748b; --gray-700: #334155; }
        
        .header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo h1 { font-size: 24px; color: var(--primary); cursor: pointer; }
        .user-menu { display: flex; align-items: center; gap: 12px; background: var(--gray-100); padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .user-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-tabs { display: flex; gap: 8px; background: var(--white); padding: 8px 24px; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; }
        .nav-tab { padding: 8px 20px; background: var(--gray-100); border: none; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; }
        .nav-tab.active { background: var(--primary); color: white; }
        
        .container { max-width: 1400px; margin: 24px auto; padding: 0 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: var(--white); border-radius: 20px; padding: 20px; border: 1px solid var(--gray-200); }
        .stat-card h3 { font-size: 12px; color: var(--gray-500); margin-bottom: 8px; text-transform: uppercase; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-change { font-size: 12px; margin-top: 6px; }
        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }
        
        .chart-container { background: var(--white); border-radius: 20px; padding: 20px; border: 1px solid var(--gray-200); margin-bottom: 24px; }
        .chart-container h3 { font-size: 16px; margin-bottom: 16px; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        
        .journal-table { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-200); overflow-x: auto; }
        .journal-table table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .journal-table th, .journal-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--gray-200); }
        .journal-table th { background: var(--gray-100); font-weight: 600; }
        
        .cpc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .cpc-card { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-200); padding: 20px; }
        .cpc-card h3 { margin-bottom: 16px; font-size: 16px; border-bottom: 1px solid var(--gray-200); padding-bottom: 8px; }
        .cpc-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--gray-200); }
        .cpc-total { font-weight: 700; color: var(--primary); font-size: 16px; margin-top: 12px; padding-top: 12px; border-top: 2px solid var(--gray-200); }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: 10px; font-size: 13px; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; }
        .btn-outline { background: var(--gray-100); border: 1px solid var(--gray-200); padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-card { background: var(--white); border-radius: 24px; width: 100%; max-width: 500px; padding: 28px; max-height: 90vh; overflow-y: auto; }
        .footer { text-align: center; padding: 24px; color: var(--gray-500); font-size: 12px; border-top: 1px solid var(--gray-200); margin-top: 40px; }
        
        @media (max-width: 768px) {
            .chart-row { grid-template-columns: 1fr; }
            .cpc-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="window.location.href='index.html'"><h1>OUENZE</h1></div>
    <div class="user-menu" onclick="window.location.href='vendor-dashboard.html'"><div class="user-avatar" id="userAvatar">V</div><div><span id="userName">Vendeur</span><br><small>Comptabilité</small></div><i class="fas fa-arrow-right"></i></div>
</div>

<div class="nav-tabs">
    <button class="nav-tab active" data-tab="dashboard">Tableau de bord</button>
    <button class="nav-tab" data-tab="journal">Livre journal</button>
    <button class="nav-tab" data-tab="cpc">Compte de résultat (CPC)</button>
    <button class="nav-tab" data-tab="balance">Balance générale</button>
    <button class="nav-tab" data-tab="entry">Saisie manuelle</button>
</div>

<div class="container" id="appContainer"></div>

<div class="footer">2024 Ouenze - Comptabilité vendeur | Tenue de livres automatisée</div>

<script>
    let currentUser = JSON.parse(localStorage.getItem('ouenze_current_user') || 'null');
    let shops = JSON.parse(localStorage.getItem('ouenze_shops') || '[]');
    let orders = JSON.parse(localStorage.getItem('ouenze_orders') || '[]');
    let accountingEntries = JSON.parse(localStorage.getItem('ouenze_accounting_entries') || '[]');
    let manualEntries = JSON.parse(localStorage.getItem('ouenze_manual_entries') || '[]');
    
    if(!currentUser || currentUser.type !== 'vendeur') window.location.href = 'index.html';
    
    document.getElementById('userAvatar').innerText = currentUser.name.charAt(0).toUpperCase();
    document.getElementById('userName').innerText = currentUser.name;
    
    // Générer automatiquement les écritures comptables à partir des commandes
    function generateJournalEntries() {
        const userShops = shops.filter(s => s.owner === currentUser.email);
        const userShopIds = userShops.map(s => s.id);
        const userOrders = orders.filter(o => o.items?.some(i => userShopIds.includes(i.shopId)));
        
        const entries = [];
        
        userOrders.forEach(order => {
            // Vente
            entries.push({
                id: Date.now() + Math.random(),
                date: order.date,
                account: "Ventes",
                debit: 0,
                credit: order.total,
                description: `Vente #${order.id}`,
                type: "auto"
            });
            
            // Banque / Caisse
            entries.push({
                id: Date.now() + Math.random() + 1,
                date: order.date,
                account: order.paymentMethod === 'cash' ? "Caisse" : "Banque",
                debit: order.total,
                credit: 0,
                description: `Règlement commande #${order.id}`,
                type: "auto"
            });
            
            // Frais de livraison (10%)
            const deliveryFees = order.deliveryFees;
            if (deliveryFees > 0) {
                entries.push({
                    id: Date.now() + Math.random() + 2,
                    date: order.date,
                    account: "Frais de livraison",
                    debit: deliveryFees,
                    credit: 0,
                    description: `Frais de livraison commande #${order.id}`,
                    type: "auto"
                });
            }
        });
        
        // Trier par date
        entries.sort((a, b) => new Date(a.date) - new Date(b.date));
        return entries;
    }
    
    function getAllEntries() {
        const autoEntries = generateJournalEntries();
        return [...autoEntries, ...manualEntries].sort((a, b) => new Date(a.date) - new Date(b.date));
    }
    
    function calculateCPC() {
        const entries = getAllEntries();
        let ventes = 0, achats = 0, fraisLivraison = 0, fraisDivers = 0, autresCharges = 0;
        
        entries.forEach(e => {
            if (e.account === "Ventes") ventes += e.credit;
            else if (e.account === "Achats") achats += e.debit;
            else if (e.account === "Frais de livraison") fraisLivraison += e.debit;
            else if (e.account === "Frais divers") fraisDivers += e.debit;
            else if (e.account === "Autres charges") autresCharges += e.debit;
        });
        
        const totalCharges = achats + fraisLivraison + fraisDivers + autresCharges;
        const resultat = ventes - totalCharges;
        
        return { ventes, achats, fraisLivraison, fraisDivers, autresCharges, totalCharges, resultat };
    }
    
    function calculateBalance() {
        const entries = getAllEntries();
        const balances = {};
        
        entries.forEach(e => {
            if (!balances[e.account]) balances[e.account] = 0;
            balances[e.account] += e.debit - e.credit;
        });
        
        return balances;
    }
    
    function showDashboard() {
        const userShops = shops.filter(s => s.owner === currentUser.email);
        const entries = getAllEntries();
        const cpc = calculateCPC();
        const balances = calculateBalance();
        
        // Statistiques mensuelles pour le graphique
        const monthlyData = {};
        entries.forEach(e => {
            const month = new Date(e.date).toLocaleString('fr', { month: 'short', year: 'numeric' });
            if (!monthlyData[month]) monthlyData[month] = 0;
            if (e.account === "Ventes") monthlyData[month] += e.credit;
        });
        
        const labels = Object.keys(monthlyData).slice(-6);
        const data = labels.map(l => monthlyData[l]);
        
        document.getElementById('appContainer').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><h3>Chiffre d'affaires</h3><div class="stat-value">${cpc.ventes.toLocaleString()} FCFA</div><div class="stat-change positive"><i class="fas fa-arrow-up"></i> +12%</div></div>
                <div class="stat-card"><h3>Total charges</h3><div class="stat-value">${cpc.totalCharges.toLocaleString()} FCFA</div><div class="stat-change negative"><i class="fas fa-arrow-down"></i> -5%</div></div>
                <div class="stat-card"><h3>Résultat net</h3><div class="stat-value ${cpc.resultat >= 0 ? 'positive' : 'negative'}">${cpc.resultat.toLocaleString()} FCFA</div><div class="stat-change">${cpc.resultat >= 0 ? 'Bénéfice' : 'Perte'}</div></div>
                <div class="stat-card"><h3>Nombre d'écritures</h3><div class="stat-value">${entries.length}</div><div class="stat-change">Dont ${manualEntries.length} manuelles</div></div>
            </div>
            
            <div class="chart-container">
                <h3>Évolution du chiffre d'affaires</h3>
                <canvas id="revenueChart" style="max-height: 250px;"></canvas>
            </div>
            
            <div class="cpc-grid">
                <div class="cpc-card">
                    <h3>Produits</h3>
                    <div class="cpc-row"><span>Ventes de marchandises</span><span>${cpc.ventes.toLocaleString()} FCFA</span></div>
                    <div class="cpc-total">Total produits: ${cpc.ventes.toLocaleString()} FCFA</div>
                </div>
                <div class="cpc-card">
                    <h3>Charges</h3>
                    <div class="cpc-row"><span>Achats de marchandises</span><span>${cpc.achats.toLocaleString()} FCFA</span></div>
                    <div class="cpc-row"><span>Frais de livraison</span><span>${cpc.fraisLivraison.toLocaleString()} FCFA</span></div>
                    <div class="cpc-row"><span>Frais divers</span><span>${cpc.fraisDivers.toLocaleString()} FCFA</span></div>
                    <div class="cpc-row"><span>Autres charges</span><span>${cpc.autresCharges.toLocaleString()} FCFA</span></div>
                    <div class="cpc-total">Total charges: ${cpc.totalCharges.toLocaleString()} FCFA</div>
                    <div class="cpc-total" style="border-top-color: var(--primary); margin-top: 16px;">Résultat: ${cpc.resultat >= 0 ? '+' : ''}${cpc.resultat.toLocaleString()} FCFA</div>
                </div>
            </div>
            
            <div class="chart-container">
                <h3>Balance par compte (sélection)</h3>
                <canvas id="balanceChart" style="max-height: 250px;"></canvas>
            </div>
        `;
        
        setTimeout(() => {
            const ctx1 = document.getElementById('revenueChart')?.getContext('2d');
            if (ctx1) {
                new Chart(ctx1, {
                    type: 'line',
                    data: { labels, datasets: [{ label: 'CA (FCFA)', data, borderColor: '#1e40af', backgroundColor: 'rgba(30,64,175,0.1)', fill: true, tension: 0.3 }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            }
            
            const topBalances = Object.entries(balances).slice(0, 6);
            const ctx2 = document.getElementById('balanceChart')?.getContext('2d');
            if (ctx2) {
                new Chart(ctx2, {
                    type: 'bar',
                    data: { labels: topBalances.map(b => b[0]), datasets: [{ label: 'Solde (FCFA)', data: topBalances.map(b => b[1]), backgroundColor: '#3b82f6' }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            }
        }, 100);
    }
    
    function showJournal() {
        const entries = getAllEntries();
        
        document.getElementById('appContainer').innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Livre journal</h2>
                <button class="btn-primary" onclick="exportJournal()"><i class="fas fa-download"></i> Exporter (CSV)</button>
            </div>
            <div class="journal-table">
                <table>
                    <thead>
                        <tr><th>Date</th><th>Compte</th><th>Libellé</th><th>Débit (FCFA)</th><th>Crédit (FCFA)</th><th>Type</th></tr>
                    </thead>
                    <tbody>
                        ${entries.length ? entries.map(e => `
                            <tr>
                                <td>${new Date(e.date).toLocaleDateString()}</td>
                                <td><strong>${escapeHtml(e.account)}</strong></td>
                                <td>${escapeHtml(e.description)}</td>
                                <td>${e.debit > 0 ? e.debit.toLocaleString() : '-'}</td>
                                <td>${e.credit > 0 ? e.credit.toLocaleString() : '-'}</td>
                                <td><span style="background:${e.type === 'auto' ? '#e2e8f0' : '#dbeafe'}; padding:2px 8px; border-radius:20px; font-size:11px;">${e.type === 'auto' ? 'Auto' : 'Manuelle'}</span></td>
                            </tr>
                        `).join('') : '<tr><td colspan="6" style="text-align:center;">Aucune écriture</td></tr>'}
                    </tbody>
                </table>
            </div>
        `;
    }
    
    function showCPC() {
        const cpc = calculateCPC();
        
        document.getElementById('appContainer').innerHTML = `
            <div class="cpc-grid">
                <div class="cpc-card">
                    <h3>Produits</h3>
                    <div class="cpc-row"><span>Ventes de marchandises</span><span>${cpc.ventes.toLocaleString()} FCFA</span></div>
                    <div class="cpc-row"><span>Autres produits</span><span>0 FCFA</span></div>
                    <div class="cpc-total">Total des produits: ${cpc.ventes.toLocaleString()} FCFA</div>
                </div>
                <div class="cpc-card">
                    <h3>Charges</h3>
                    <div class="cpc-row"><span>Achats de marchandises</span><span>${cpc.achats.toLocaleString()} FCFA</span></div>
                    <div class="cpc-row"><span>Frais de livraison</span><span>${cpc.fraisLivraison.toLocaleString()} FCFA</span></div>
                    <div class="cpc-row"><span>Frais divers</span><span>${cpc.fraisDivers.toLocaleString()} FCFA</span></div>
                    <div class="cpc-row"><span>Autres charges</span><span>${cpc.autresCharges.toLocaleString()} FCFA</span></div>
                    <div class="cpc-total">Total des charges: ${cpc.totalCharges.toLocaleString()} FCFA</div>
                </div>
            </div>
            <div class="stat-card" style="text-align:center; padding:24px;">
                <h3>RÉSULTAT NET</h3>
                <div class="stat-value ${cpc.resultat >= 0 ? 'positive' : 'negative'}" style="font-size:32px;">${cpc.resultat >= 0 ? '+' : ''}${cpc.resultat.toLocaleString()} FCFA</div>
                <div class="stat-change">${cpc.resultat >= 0 ? 'Bénéfice' : 'Perte'} de l'exercice</div>
            </div>
        `;
    }
    
    function showBalance() {
        const balances = calculateBalance();
        
        document.getElementById('appContainer').innerHTML = `
            <h2 style="margin-bottom:20px;">Balance générale</h2>
            <div class="journal-table">
                <table>
                    <thead>
                        <tr><th>Compte</th><th>Total Débit (FCFA)</th><th>Total Crédit (FCFA)</th><th>Solde (FCFA)</th></tr>
                    </thead>
                    <tbody>
                        ${Object.entries(balances).map(([account, balance]) => `
                            <tr>
                                <td><strong>${escapeHtml(account)}</strong></td>
                                <td>${balance > 0 ? balance.toLocaleString() : '-'}</td>
                                <td>${balance < 0 ? Math.abs(balance).toLocaleString() : '-'}</td>
                                <td class="${balance >= 0 ? 'positive' : 'negative'}">${balance.toLocaleString()} FCFA</td>
                            </tr>
                        `).join('')}
                        ${Object.keys(balances).length === 0 ? '<tr><td colspan="4" style="text-align:center;">Aucune donnée</td></tr>' : ''}
                    </tbody>
                </table>
            </div>
        `;
    }
    
    function showManualEntry() {
        document.getElementById('appContainer').innerHTML = `
            <div class="stat-card" style="max-width: 600px; margin: 0 auto;">
                <h2 style="margin-bottom:20px;">Saisie manuelle d'écriture comptable</h2>
                <div class="form-group"><label>Date *</label><input type="date" id="entryDate" value="${new Date().toISOString().split('T')[0]}"></div>
                <div class="form-group"><label>Compte *</label>
                    <select id="entryAccount">
                        <option value="Achats">Achats de marchandises</option>
                        <option value="Frais de livraison">Frais de livraison</option>
                        <option value="Frais divers">Frais divers</option>
                        <option value="Autres charges">Autres charges</option>
                        <option value="Caisse">Caisse</option>
                        <option value="Banque">Banque</option>
                        <option value="Ventes">Ventes</option>
                    </select>
                </div>
                <div class="form-group"><label>Type d'opération</label>
                    <select id="entryType">
                        <option value="debit">Débit (charge/actif)</option>
                        <option value="credit">Crédit (produit/passif)</option>
                    </select>
                </div>
                <div class="form-group"><label>Montant (FCFA) *</label><input type="number" id="entryAmount" placeholder="0"></div>
                <div class="form-group"><label>Libellé / Description</label><textarea id="entryDesc" rows="2" placeholder="Description de l'opération..."></textarea></div>
                <button class="btn-primary" onclick="addManualEntry()" style="width:100%;">Ajouter l'écriture</button>
            </div>
        `;
    }
    
    function addManualEntry() {
        const date = document.getElementById('entryDate').value;
        const account = document.getElementById('entryAccount').value;
        const type = document.getElementById('entryType').value;
        const amount = parseFloat(document.getElementById('entryAmount').value);
        const description = document.getElementById('entryDesc').value;
        
        if (!date || !account || !amount || amount <= 0) {
            alert("Veuillez remplir tous les champs obligatoires");
            return;
        }
        
        const newEntry = {
            id: Date.now(),
            date: new Date(date).toISOString(),
            account: account,
            debit: type === 'debit' ? amount : 0,
            credit: type === 'credit' ? amount : 0,
            description: description || `Saisie manuelle - ${account}`,
            type: "manual"
        };
        
        manualEntries.push(newEntry);
        localStorage.setItem('ouenze_manual_entries', JSON.stringify(manualEntries));
        
        alert("Écriture comptable ajoutée avec succès !");
        showJournal();
    }
    
    function exportJournal() {
        const entries = getAllEntries();
        let csv = "Date,Compte,Libellé,Débit (FCFA),Crédit (FCFA),Type\n";
        entries.forEach(e => {
            csv += `${new Date(e.date).toLocaleDateString()},"${e.account}","${e.description}",${e.debit},${e.credit},${e.type}\n`;
        });
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `journal_comptable_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        alert("Export CSV effectué !");
    }
    
    function escapeHtml(s) { return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    window.showDashboard = showDashboard;
    window.showJournal = showJournal;
    window.showCPC = showCPC;
    window.showBalance = showBalance;
    window.showManualEntry = showManualEntry;
    window.addManualEntry = addManualEntry;
    window.exportJournal = exportJournal;
    
    document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const tabName = tab.dataset.tab;
            if (tabName === 'dashboard') showDashboard();
            else if (tabName === 'journal') showJournal();
            else if (tabName === 'cpc') showCPC();
            else if (tabName === 'balance') showBalance();
            else if (tabName === 'entry') showManualEntry();
        });
    });
    
    showDashboard();
</script>
</body>
</html>
