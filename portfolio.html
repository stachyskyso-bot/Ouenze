<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouenze | Mon portefeuille d'investissement</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e17; color: #e2e8f0; }
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --white: #ffffff;
            --gray-100: #1e2430;
            --gray-200: #2a3140;
            --gray-500: #6b7280;
            --gray-700: #9ca3af;
            --dark-bg: #0a0e17;
            --card-bg: #111827;
        }
        
        .header { background: var(--card-bg); border-bottom: 1px solid var(--gray-200); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; position: sticky; top: 0; z-index: 100; }
        .logo h1 { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .auth-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--gray-200); border: none; color: white; }
        .user-menu { display: flex; align-items: center; gap: 12px; background: var(--gray-200); padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .user-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
        
        .main { max-width: 1400px; margin: 32px auto; padding: 0 24px; }
        
        .portfolio-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: var(--card-bg); border-radius: 20px; padding: 24px; border: 1px solid var(--gray-200); transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card h3 { font-size: 12px; font-weight: 500; color: var(--gray-500); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 28px; font-weight: 700; color: white; }
        .stat-change { font-size: 12px; margin-top: 6px; }
        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }
        
        .chart-container { background: var(--card-bg); border-radius: 20px; padding: 24px; border: 1px solid var(--gray-200); margin-bottom: 32px; }
        .chart-container h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .chart-wrapper { height: 400px; position: relative; }
        
        .portfolio-filters { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 20px; background: var(--gray-200); border: 1px solid var(--gray-200); border-radius: 30px; cursor: pointer; font-size: 13px; transition: 0.2s; color: var(--gray-500); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .filter-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
        
        .investments-list { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--gray-200); overflow: hidden; }
        .investment-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--gray-200); transition: 0.2s; cursor: pointer; }
        .investment-item:hover { background: var(--gray-200); }
        .investment-info h4 { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: white; }
        .investment-info p { font-size: 12px; color: var(--gray-500); }
        .investment-value { text-align: right; }
        .investment-amount { font-size: 18px; font-weight: 700; color: var(--primary); }
        .investment-change { font-size: 12px; margin-top: 4px; }
        
        .payment-methods { display: flex; gap: 16px; flex-wrap: wrap; margin: 16px 0; }
        .payment-card { background: var(--gray-200); border-radius: 12px; padding: 12px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .payment-card.selected { border-color: var(--primary); background: var(--gray-100); }
        .payment-card i { font-size: 24px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-card { background: var(--card-bg); border-radius: 24px; max-width: 500px; width: 100%; padding: 28px; border: 1px solid var(--gray-200); position: relative; }
        .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--gray-500); font-size: 20px; cursor: pointer; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--gray-500); }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: var(--gray-200); border: 1px solid var(--gray-200); border-radius: 10px; color: white; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; width: 100%; transition: opacity 0.2s; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        
        .footer { border-top: 1px solid var(--gray-200); background: var(--card-bg); margin-top: 60px; padding: 24px; text-align: center; font-size: 12px; color: var(--gray-500); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animated { animation: slideUp 0.4s ease-out; }
        
        @media (max-width: 700px) { .investment-item { flex-direction: column; text-align: center; gap: 12px; } .investment-value { text-align: center; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="window.location.href='index.html'"><h1>OUENZE INVEST</h1></div>
    <div class="header-actions" id="headerActions"></div>
</div>

<div class="main" id="appContainer"></div>

<div class="footer">
    <p>© 2024 Ouenze Invest - Plateforme d'investissement certifiée | Données en temps réel</p>
</div>
<script src="database.js"></script>
<script>
    // ============ ALGORITHME DE LUHN POUR VALIDATION CARTE ============
    function luhnCheck(cardNumber) {
        let sum = 0;
        let shouldDouble = false;
        const clean = cardNumber.replace(/\s/g, '');
        
        for (let i = clean.length - 1; i >= 0; i--) {
            let digit = parseInt(clean[i]);
            if (shouldDouble) {
                digit *= 2;
                if (digit > 9) digit -= 9;
            }
            sum += digit;
            shouldDouble = !shouldDouble;
        }
        return sum % 10 === 0;
    }
    
    // ============ VALIDATIONS ============
    function validateCongolesePhone(number) {
        const clean = number.replace(/\s/g, '');
        return /^(\+242|0)[56]\d{8}$/.test(clean);
    }
    
    function validateCardNumber(number) {
        const clean = number.replace(/\s/g, '');
        return /^\d{16}$/.test(clean) && luhnCheck(clean);
    }
    
    function validateCVV(cvv) { return /^\d{3}$/.test(cvv); }
    function validateExpiry(expiry) { 
        if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiry)) return false;
        const [month, year] = expiry.split('/');
        const expiryDate = new Date(2000 + parseInt(year), parseInt(month), 1);
        return expiryDate > new Date();
    }
    
    // ============ BASE DE DONNÉES CENTRALISÉE ============
    let db = {
        currentUser: null,
        shops: [],
        portfolioInvestments: [],
        withdrawalHistory: [],
        investmentRequests: [],
        portfolioHistory: []
    };
    
    // Chargement des données
    function loadData() {
        db.currentUser = JSON.parse(localStorage.getItem('ouenze_current_user') || 'null');
        db.shops = JSON.parse(localStorage.getItem('ouenze_shops') || '[]');
        db.portfolioInvestments = JSON.parse(localStorage.getItem('ouenze_portfolio_investments') || '[]');
        db.withdrawalHistory = JSON.parse(localStorage.getItem('ouenze_withdrawal_history') || '[]');
        db.investmentRequests = JSON.parse(localStorage.getItem('ouenze_investment_requests') || '[]');
        db.portfolioHistory = JSON.parse(localStorage.getItem('ouenze_portfolio_history') || '[]');
        
        if (db.shops.length === 0) {
            db.shops = [
                { id: 1, name: "Élégance Africaine", rating: 5.0, totalRatings: 342, products: [], city: "Brazzaville", assets: [], totalSales: 1250, hasPhysicalStore: true, totalShares: 10000 },
                { id: 2, name: "Tech Congo", rating: 4.8, totalRatings: 124, products: [], city: "Brazzaville", assets: [], totalSales: 342, hasPhysicalStore: false, totalShares: 8000 }
            ];
            localStorage.setItem('ouenze_shops', JSON.stringify(db.shops));
        }
        
        if (db.portfolioInvestments.length === 0 && db.currentUser) {
            db.portfolioInvestments = [
                { id: crypto.randomUUID(), shopId: 1, shopName: "Élégance Africaine", shares: 50, investedAmount: 250000, averageBuyPrice: 5000, date: new Date().toISOString() },
                { id: crypto.randomUUID(), shopId: 2, shopName: "Tech Congo", shares: 30, investedAmount: 120000, averageBuyPrice: 4000, date: new Date(Date.now() - 15*86400000).toISOString() }
            ];
            localStorage.setItem('ouenze_portfolio_investments', JSON.stringify(db.portfolioInvestments));
        }
    }
    
    function saveData() {
        localStorage.setItem('ouenze_shops', JSON.stringify(db.shops));
        localStorage.setItem('ouenze_portfolio_investments', JSON.stringify(db.portfolioInvestments));
        localStorage.setItem('ouenze_withdrawal_history', JSON.stringify(db.withdrawalHistory));
        localStorage.setItem('ouenze_investment_requests', JSON.stringify(db.investmentRequests));
        localStorage.setItem('ouenze_portfolio_history', JSON.stringify(db.portfolioHistory));
    }
    
   // Dans portfolio.html, remplacer syncInvestmentsFromRequests

function loadPortfolioData() {
    // Utiliser la fonction centralisée pour synchroniser
    if (window.syncAllPendingApprovals) {
        const synced = window.syncAllPendingApprovals();
        if (synced > 0) {
            console.log(`${synced} investissement(s) synchronisé(s)`);
        }
    }
    
    // Utiliser les stats centralisées
    let stats = { totalInvested: 0, totalCurrentValue: 0, totalProfit: 0, profitPercent: 0, positionsCount: 0 };
    if (window.getPortfolioStats) {
        stats = window.getPortfolioStats(currentUser.email);
    } else {
        // Fallback
        const portfolio = JSON.parse(localStorage.getItem('ouenze_portfolio_investments') || '[]');
        const userInvestments = portfolio.filter(p => p.investor === currentUser.email);
        stats.totalInvested = userInvestments.reduce((s, inv) => s + inv.investedAmount, 0);
        stats.positionsCount = userInvestments.length;
        // ... calcul de la valeur actuelle
    }
    
    // Afficher les stats
    document.getElementById('appContainer').innerHTML = `...`;
}
    
    // ============ CALCULS FINANCIERS CORRECTS ============
    function calculateShopValuation(shop) {
        const baseValue = 1000000;
        const productValue = (shop.products?.length || 0) * 50000;
        const ratingBonus = (shop.rating || 0) * 150000;
        const salesBonus = (shop.totalSales || 0) * 1000;
        const assetsValue = (shop.assets || []).reduce((sum, a) => sum + (a.value || 0), 0);
        return baseValue + productValue + ratingBonus + salesBonus + assetsValue;
    }
    
    function calculateSharePrice(shop) {
        const valuation = calculateShopValuation(shop);
        const totalShares = shop.totalShares || 10000;
        return valuation / totalShares;
    }
    
    function calculateCurrentValue(investment) {
        const shop = db.shops.find(s => s.id === investment.shopId);
        if (!shop) return investment.investedAmount;
        const currentPrice = calculateSharePrice(shop);
        return investment.shares * currentPrice;
    }
    
    function getTotalPortfolioValue() {
        return db.portfolioInvestments.reduce((sum, inv) => sum + calculateCurrentValue(inv), 0);
    }
    
    function getTotalInvested() {
        return db.portfolioInvestments.reduce((sum, inv) => sum + inv.investedAmount, 0);
    }
    
    function getTotalProfit() {
        return getTotalPortfolioValue() - getTotalInvested();
    }
    
    function getProfitPercent() {
        const invested = getTotalInvested();
        return invested > 0 ? (getTotalProfit() / invested * 100) : 0;
    }
    
    // ============ HISTORIQUE (STOCKÉ, PAS ALÉATOIRE) ============
    function generateInitialHistory() {
        const history = [];
        let baseValue = getTotalInvested();
        if (baseValue === 0) baseValue = 500000;
        
        for (let i = 30; i >= 0; i--) {
            let change = (Math.random() - 0.48) * 0.02;
            baseValue = baseValue * (1 + change);
            history.push({
                date: new Date(Date.now() - i * 86400000).toISOString().split('T')[0],
                value: Math.max(baseValue, getTotalInvested() * 0.85)
            });
        }
        return history;
    }
    
    function loadPortfolioHistory() {
        if (db.portfolioHistory.length === 0) {
            db.portfolioHistory = generateInitialHistory();
            saveData();
        }
    }
    
    function addHistorySnapshot() {
        const lastValue = db.portfolioHistory[db.portfolioHistory.length - 1]?.value || getTotalPortfolioValue();
        const newValue = getTotalPortfolioValue();
        if (Math.abs(newValue - lastValue) / lastValue > 0.005) {
            db.portfolioHistory.push({
                date: new Date().toISOString().split('T')[0],
                value: newValue
            });
            if (db.portfolioHistory.length > 60) db.portfolioHistory.shift();
            saveData();
        }
    }
    
    // ============ INTERVALLE DE MISE À JOUR (AVEC NETTOYAGE) ============
    let liveUpdateInterval = null;
    let portfolioChart = null;
    
    function startLiveUpdates() {
        if (liveUpdateInterval) clearInterval(liveUpdateInterval);
        liveUpdateInterval = setInterval(() => {
            addHistorySnapshot();
            if (portfolioChart) {
                portfolioChart.data.datasets[0].data = db.portfolioHistory.map(h => h.value);
                portfolioChart.update('none');
            }
            updateStatsDisplay();
        }, 30000);
    }
    
    function stopLiveUpdates() {
        if (liveUpdateInterval) {
            clearInterval(liveUpdateInterval);
            liveUpdateInterval = null;
        }
    }
    
    function updateStatsDisplay() {
        const totalValue = getTotalPortfolioValue();
        const totalInvested = getTotalInvested();
        const totalProfit = getTotalProfit();
        const profitPercent = getProfitPercent();
        
        const statValues = document.querySelectorAll('.stat-value');
        if (statValues[0]) statValues[0].innerText = totalValue.toLocaleString() + ' FCFA';
        if (statValues[1]) statValues[1].innerText = totalInvested.toLocaleString() + ' FCFA';
        if (statValues[2]) statValues[2].innerText = (profitPercent >= 0 ? '+' : '') + profitPercent.toFixed(2) + '%';
        
        const statChanges = document.querySelectorAll('.stat-change');
        if (statChanges[0]) {
            statChanges[0].innerHTML = (totalProfit >= 0 ? '+' : '') + totalProfit.toLocaleString() + ' FCFA';
            statChanges[0].className = `stat-change ${totalProfit >= 0 ? 'positive' : 'negative'}`;
        }
    }
    
    // ============ PAGE PORTEFEUILLE ============
    let currentPortfolioFilter = 'all';
    
    function showPortfolioPage() {
        syncInvestmentsFromRequests();
        
        const totalValue = getTotalPortfolioValue();
        const totalInvested = getTotalInvested();
        const totalProfit = getTotalProfit();
        const profitPercent = getProfitPercent();
        
        const filteredInvestments = currentPortfolioFilter === 'all' 
            ? db.portfolioInvestments 
            : db.portfolioInvestments.filter(inv => inv.shopId === parseInt(currentPortfolioFilter));
        
        document.getElementById('appContainer').innerHTML = `
            <div class="portfolio-stats animated">
                <div class="stat-card"><h3>Valeur totale</h3><div class="stat-value">${totalValue.toLocaleString()} FCFA</div><div class="stat-change ${totalProfit >= 0 ? 'positive' : 'negative'}">${totalProfit >= 0 ? '+' : ''}${totalProfit.toLocaleString()} FCFA</div></div>
                <div class="stat-card"><h3>Total investi</h3><div class="stat-value">${totalInvested.toLocaleString()} FCFA</div><div class="stat-change">${db.portfolioInvestments.length} position(s)</div></div>
                <div class="stat-card"><h3>Performance</h3><div class="stat-value ${profitPercent >= 0 ? 'positive' : 'negative'}">${profitPercent >= 0 ? '+' : ''}${profitPercent.toFixed(2)}%</div><div class="stat-change">depuis l'ouverture</div></div>
                <div class="stat-card"><h3>Disponible</h3><div class="stat-value">${totalValue.toLocaleString()} FCFA</div><div class="stat-change"><button onclick="openWithdrawModal()" style="background:var(--primary);border:none;padding:6px 12px;border-radius:20px;color:white;cursor:pointer;margin-top:8px;">Retirer</button></div></div>
            </div>
            
            <div class="chart-container animated">
                <h3><i class="fas fa-chart-line"></i> Évolution du portefeuille <span style="background:var(--primary-dark);font-size:10px;padding:2px 8px;border-radius:20px;">LIVE</span></h3>
                <div class="chart-wrapper"><canvas id="portfolioChart"></canvas></div>
            </div>
            
            <div class="portfolio-filters">
                <button class="filter-btn ${currentPortfolioFilter === 'all' ? 'active' : ''}" onclick="filterPortfolio('all')">Tous</button>
                ${db.shops.filter(s => db.portfolioInvestments.some(inv => inv.shopId === s.id)).map(shop => `
                    <button class="filter-btn ${currentPortfolioFilter == shop.id ? 'active' : ''}" onclick="filterPortfolio(${shop.id})">${escapeHtml(shop.name)}</button>
                `).join('')}
            </div>
            
            <div class="investments-list animated">
                ${filteredInvestments.length ? filteredInvestments.map(inv => {
                    const shop = db.shops.find(s => s.id === inv.shopId);
                    const currentValue = calculateCurrentValue(inv);
                    const profit = currentValue - inv.investedAmount;
                    const profitPercent = (profit / inv.investedAmount * 100);
                    return `
                        <div class="investment-item" onclick="showInvestmentDetail(${inv.shopId})">
                            <div class="investment-info">
                                <h4><i class="fas fa-store"></i> ${escapeHtml(shop?.name || 'Boutique')}</h4>
                                <p>${inv.shares} actions · Prix moyen: ${Math.round(inv.averageBuyPrice).toLocaleString()} FCFA</p>
                                <p style="font-size:11px;">Investi: ${inv.investedAmount.toLocaleString()} FCFA</p>
                            </div>
                            <div class="investment-value">
                                <div class="investment-amount">${currentValue.toLocaleString()} FCFA</div>
                                <div class="investment-change ${profit >= 0 ? 'positive' : 'negative'}">${profit >= 0 ? '+' : ''}${profit.toLocaleString()} FCFA (${profitPercent >= 0 ? '+' : ''}${profitPercent.toFixed(2)}%)</div>
                            </div>
                        </div>
                    `;
                }).join('') : '<div style="text-align:center;padding:60px;color:var(--gray-500);"><i class="fas fa-folder-open" style="font-size:48px;margin-bottom:16px;"></i><p>Aucun investissement. <a href="invest.html" style="color:var(--primary);">Investir maintenant</a></p></div>'}
            </div>
        `;
        
        drawPortfolioChart();
        startLiveUpdates();
    }
    
    function drawPortfolioChart() {
        const ctx = document.getElementById('portfolioChart')?.getContext('2d');
        if (!ctx) return;
        if (portfolioChart) portfolioChart.destroy();
        
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(59,130,246,0.3)');
        gradient.addColorStop(1, 'rgba(59,130,246,0.0)');
        
        portfolioChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: db.portfolioHistory.map(h => h.date.slice(5)),
                datasets: [{
                    label: 'Valeur du portefeuille (FCFA)',
                    data: db.portfolioHistory.map(h => h.value),
                    borderColor: '#3b82f6',
                    backgroundColor: gradient,
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 6,
                    pointHoverBackgroundColor: '#3b82f6'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { position: 'top', labels: { color: '#9ca3af', font: { size: 11 } } },
                    tooltip: { 
                        backgroundColor: '#1e293b',
                        titleColor: '#f1f5f9',
                        bodyColor: '#cbd5e1',
                        callbacks: { label: (ctx) => `${ctx.raw.toLocaleString()} FCFA` }
                    }
                },
                scales: {
                    x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
                    y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', callback: (val) => val.toLocaleString() + ' FCFA' } }
                }
            }
        });
    }
    
    function filterPortfolio(filter) {
        currentPortfolioFilter = filter;
        showPortfolioPage();
    }
    
    // ============ DÉTAIL D'UN INVESTISSEMENT ============
    function showInvestmentDetail(shopId) {
        stopLiveUpdates();
        
        const shop = db.shops.find(s => s.id === shopId);
        const investment = db.portfolioInvestments.find(inv => inv.shopId === shopId);
        if (!shop || !investment) return;
        
        const currentValue = calculateCurrentValue(investment);
        const profit = currentValue - investment.investedAmount;
        const currentPrice = calculateSharePrice(shop);
        
        document.getElementById('appContainer').innerHTML = `
            <button onclick="showPortfolioPage()" style="background:none;border:none;color:var(--primary);cursor:pointer;margin-bottom:20px;"><i class="fas fa-arrow-left"></i> Retour</button>
            <div class="chart-container animated">
                <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap;margin-bottom:24px;">
                    <div style="width:80px;height:80px;background:var(--gray-200);border-radius:50%;display:flex;align-items:center;justify-content:center;">${shop.logo ? `<img src="${shop.logo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : '<i class="fas fa-store" style="font-size:40px;"></i>'}</div>
                    <div><h2 style="font-size:24px;">${escapeHtml(shop.name)}</h2><div class="shop-rating">${'⭐'.repeat(Math.floor(shop.rating || 0))} ${shop.rating || 0}/5</div><div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(shop.city || 'Brazzaville')}</div></div>
                </div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;">
                    <div class="stat-card"><h3>Actions</h3><div class="stat-value">${investment.shares}</div><div class="stat-change">Prix moyen: ${Math.round(investment.averageBuyPrice).toLocaleString()} FCFA</div></div>
                    <div class="stat-card"><h3>Valeur actuelle</h3><div class="stat-value">${currentValue.toLocaleString()} FCFA</div><div class="stat-change">Prix actuel: ${Math.round(currentPrice).toLocaleString()} FCFA</div></div>
                    <div class="stat-card"><h3>Plus-value</h3><div class="stat-value ${profit >= 0 ? 'positive' : 'negative'}">${profit >= 0 ? '+' : ''}${profit.toLocaleString()} FCFA</div><div class="stat-change">${(profit / investment.investedAmount * 100).toFixed(2)}%</div></div>
                </div>
                <div style="display:flex;gap:12px;">
                    <button class="btn-primary" onclick="openSellModal(${shop.id}, ${investment.shares}, ${Math.round(currentPrice)})">Vendre des actions</button>
                    <button class="btn-success" onclick="window.location.href='invest.html'">Acheter plus</button>
                </div>
            </div>
        `;
    }
    
    // ============ VENTE D'ACTIONS (AVEC PROTECTION DOUBLE CLIC) ============
    let isSelling = false;
    
    function openSellModal(shopId, maxShares, sharePrice) {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button>
                <h3 style="margin-bottom:20px;">Vendre des actions</h3>
                <div class="form-group"><label>Nombre d'actions (max ${maxShares})</label><input type="number" id="sellQty" min="1" max="${maxShares}" value="1"></div>
                <div class="form-group"><label>Prix unitaire</label><input type="text" value="${sharePrice.toLocaleString()} FCFA" readonly disabled style="background:var(--gray-100);"></div>
                <div class="form-group"><strong>Total: <span id="sellTotal">${sharePrice.toLocaleString()}</span> FCFA</strong></div>
                <button class="btn-danger" style="width:100%;margin-top:16px;" id="confirmSellBtn" onclick="confirmSell(${shopId}, ${maxShares}, ${sharePrice})">Confirmer la vente</button>
                <button onclick="this.closest('.modal').remove()" style="margin-top:12px;background:none;border:none;cursor:pointer;color:var(--gray-500);">Annuler</button>
            </div>`;
        document.body.appendChild(modal);
        
        document.getElementById('sellQty').addEventListener('input', (e) => {
            const total = (parseInt(e.target.value) || 0) * sharePrice;
            document.getElementById('sellTotal').innerText = total.toLocaleString();
        });
    }
    
    function confirmSell(shopId, maxShares, sharePrice) {
        if (isSelling) return;
        isSelling = true;
        
        const btn = document.getElementById('confirmSellBtn');
        if (btn) btn.disabled = true;
        
        const quantity = parseInt(document.getElementById('sellQty').value);
        if (!quantity || quantity < 1 || quantity > maxShares) { 
            alert("Quantité invalide"); 
            isSelling = false;
            if (btn) btn.disabled = false;
            return; 
        }
        const total = quantity * sharePrice;
        
        const investmentIndex = db.portfolioInvestments.findIndex(inv => inv.shopId === shopId);
        if (investmentIndex === -1) {
            isSelling = false;
            return;
        }
        
        const investment = db.portfolioInvestments[investmentIndex];
        if (quantity === investment.shares) {
            db.portfolioInvestments.splice(investmentIndex, 1);
        } else {
            const ratio = quantity / investment.shares;
            const soldAmount = investment.investedAmount * ratio;
            investment.shares -= quantity;
            investment.investedAmount -= soldAmount;
            investment.averageBuyPrice = investment.investedAmount / investment.shares;
        }
        
        // Enregistrer la demande de vente
        const sellRequest = {
            id: crypto.randomUUID(),
            type: 'sell_shares',
            shopId: shopId,
            shopName: investment.shopName,
            investor: db.currentUser?.email,
            investorName: db.currentUser?.name,
            quantity: quantity,
            pricePerShare: sharePrice,
            total: total,
            date: new Date().toISOString(),
            status: 'approved',
            syncedToPortfolio: true
        };
        db.investmentRequests.push(sellRequest);
        
        saveData();
        alert(`Vente de ${quantity} actions effectuée !\nMontant: ${total.toLocaleString()} FCFA\nLes fonds seront disponibles sous 48h.`);
        document.querySelector('.modal.active')?.remove();
        
        addHistorySnapshot();
        showPortfolioPage();
        isSelling = false;
    }
    
    // ============ RETRAIT (AVEC VALIDATIONS) ============
    function openWithdrawModal() {
        const totalValue = getTotalPortfolioValue();
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button>
                <h3 style="margin-bottom:20px;">Retirer des fonds</h3>
                <div class="payment-methods" id="paymentMethods">
                    <div class="payment-card" data-method="airtel"><i class="fas fa-mobile-alt"></i><span>Airtel Money</span></div>
                    <div class="payment-card" data-method="mtn"><i class="fas fa-mobile-alt"></i><span>MTN Mobile Money</span></div>
                    <div class="payment-card" data-method="visa"><i class="fab fa-cc-visa"></i><span>Carte bancaire</span></div>
                    <div class="payment-card" data-method="paypal"><i class="fab fa-paypal"></i><span>PayPal</span></div>
                </div>
                <div id="paymentFormContainer"></div>
                <button class="btn-success" id="submitWithdrawBtn" style="width:100%;margin-top:16px;">Confirmer le retrait</button>
            </div>`;
        document.body.appendChild(modal);
        
        let selectedMethod = 'airtel';
        
        function updatePaymentForm() {
            const container = document.getElementById('paymentFormContainer');
            if (selectedMethod === 'airtel' || selectedMethod === 'mtn') {
                container.innerHTML = `
                    <div class="form-group"><label>Montant (FCFA)</label><input type="number" id="withdrawAmount" min="10000" max="${totalValue}" value="${Math.min(100000, totalValue)}"></div>
                    <div class="form-group"><label>Numéro Mobile Money (${selectedMethod === 'airtel' ? 'Airtel' : 'MTN'})</label><input type="tel" id="withdrawAccount" placeholder="+242 06 XX XX XX ou 06 XX XX XX"></div>
                    <div class="info-text" style="font-size:11px;color:var(--gray-500);margin-top:4px;">Format: +242 06 123 45 67</div>
                `;
            } else if (selectedMethod === 'visa') {
                container.innerHTML = `
                    <div class="form-group"><label>Montant (FCFA)</label><input type="number" id="withdrawAmount" min="10000" max="${totalValue}" value="${Math.min(100000, totalValue)}"></div>
                    <div class="form-group"><label>Nom sur la carte</label><input type="text" id="cardName" placeholder="JEAN DUPONT"></div>
                    <div class="form-group"><label>Numéro de carte</label><input type="text" id="cardNumber" maxlength="19" placeholder="XXXX XXXX XXXX XXXX"></div>
                    <div class="form-row">
                        <div class="form-group"><label>Date d'expiration</label><input type="text" id="cardExpiry" placeholder="MM/AA"></div>
                        <div class="form-group"><label>CVV</label><input type="password" id="cardCvv" maxlength="3" placeholder="XXX"></div>
                    </div>
                    <div id="cardTypeDisplay" style="font-size:11px;color:var(--gray-500);"></div>
                    <div id="cardValidationMsg" style="font-size:11px;margin-top:4px;"></div>
                `;
                const cardInput = document.getElementById('cardNumber');
                if (cardInput) {
                    cardInput.addEventListener('input', (e) => {
                        let val = e.target.value.replace(/\s/g, '');
                        if (val.length > 16) val = val.slice(0,16);
                        e.target.value = val.replace(/(\d{4})/g, '$1 ').trim();
                        const firstDigit = val.charAt(0);
                        const typeDisplay = document.getElementById('cardTypeDisplay');
                        const validationMsg = document.getElementById('cardValidationMsg');
                        if (firstDigit === '4') typeDisplay.innerHTML = '<i class="fab fa-cc-visa"></i> VISA';
                        else if (firstDigit === '5') typeDisplay.innerHTML = '<i class="fab fa-cc-mastercard"></i> MasterCard';
                        else typeDisplay.innerHTML = '';
                        if (val.length === 16) {
                            if (luhnCheck(val)) validationMsg.innerHTML = '✅ Numéro valide';
                            else validationMsg.innerHTML = '❌ Numéro invalide';
                            validationMsg.style.color = luhnCheck(val) ? '#22c55e' : '#ef4444';
                        } else {
                            validationMsg.innerHTML = '';
                        }
                    });
                }
            } else if (selectedMethod === 'paypal') {
                container.innerHTML = `
                    <div class="form-group"><label>Montant (FCFA)</label><input type="number" id="withdrawAmount" min="10000" max="${totalValue}" value="${Math.min(100000, totalValue)}"></div>
                    <div class="form-group"><label>Email PayPal</label><input type="email" id="withdrawAccount" placeholder="exemple@paypal.com"></div>
                `;
            }
        }
        
        document.querySelectorAll('.payment-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.payment-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedMethod = card.dataset.method;
                updatePaymentForm();
            });
        });
        
        updatePaymentForm();
        
        document.getElementById('submitWithdrawBtn').onclick = () => {
            const amount = parseInt(document.getElementById('withdrawAmount')?.value);
            if (!amount || amount < 10000) { alert("Montant minimum 10 000 FCFA"); return; }
            if (amount > totalValue) { alert("Montant supérieur au solde disponible"); return; }
            
            if (selectedMethod === 'airtel' || selectedMethod === 'mtn') {
                const phone = document.getElementById('withdrawAccount')?.value.trim();
                if (!phone) { alert("Numéro de téléphone requis"); return; }
                if (!validateCongolesePhone(phone)) { alert("Numéro invalide. Format: +242 06 XX XX XX"); return; }
            } else if (selectedMethod === 'visa') {
                const cardName = document.getElementById('cardName')?.value.trim();
                const cardNumber = document.getElementById('cardNumber')?.value.replace(/\s/g, '');
                const cardExpiry = document.getElementById('cardExpiry')?.value.trim();
                const cardCvv = document.getElementById('cardCvv')?.value.trim();
                if (!cardName || !cardNumber || !cardExpiry || !cardCvv) { alert("Veuillez remplir toutes les informations de la carte"); return; }
                if (!validateCardNumber(cardNumber)) { alert("Numéro de carte invalide"); return; }
                if (!validateExpiry(cardExpiry)) { alert("Date d'expiration invalide ou expirée"); return; }
                if (!validateCVV(cardCvv)) { alert("CVV invalide (3 chiffres)"); return; }
            } else if (selectedMethod === 'paypal') {
                const email = document.getElementById('withdrawAccount')?.value.trim();
                if (!email) { alert("Email PayPal requis"); return; }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert("Email invalide"); return; }
            }
            
            db.withdrawalHistory.push({ id: crypto.randomUUID(), amount, method: selectedMethod, date: new Date().toISOString(), status: 'pending' });
            saveData();
            
            alert(`Demande de retrait de ${amount.toLocaleString()} FCFA enregistrée !\nMode: ${selectedMethod.toUpperCase()}\nTraitement sous 48h.`);
            modal.remove();
        };
    }
    
    // ============ AUTHENTIFICATION ============
    function updateHeaderUI() {
        const container = document.getElementById('headerActions');
        if (db.currentUser) {
            container.innerHTML = `<div class="user-menu"><div class="user-avatar">${db.currentUser.name.charAt(0)}</div><div>${db.currentUser.name.split(' ')[0]}<br><small>Investisseur</small></div><button onclick="event.stopPropagation();logout()" style="background:none;border:none;cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button></div>`;
        } else {
            container.innerHTML = `<button class="auth-btn" onclick="openLoginModal()">Connexion</button>`;
        }
    }
    
    function openLoginModal() {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-card"><button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button><h3 style="margin-bottom:20px;">Connexion</h3><div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div><div class="form-group"><input type="password" id="loginPassword" placeholder="Mot de passe"></div><button class="btn-primary" onclick="doLogin()">Se connecter</button><div style="text-align:center;margin-top:16px;"><a href="#" onclick="window.location.href='index.html'">Créer un compte</a></div></div>`;
        document.body.appendChild(modal);
    }
    
    function doLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        if (email) {
            db.currentUser = { name: email.split('@')[0], email, type: 'investor' };
            localStorage.setItem('ouenze_current_user', JSON.stringify(db.currentUser));
            loadData();
            updateHeaderUI();
            document.querySelector('.modal')?.remove();
            showPortfolioPage();
            alert(`Bienvenue ${db.currentUser.name}`);
        } else alert("Email requis");
    }
    
    function logout() {
        stopLiveUpdates();
        db.currentUser = null;
        localStorage.removeItem('ouenze_current_user');
        updateHeaderUI();
        window.location.href = 'index.html';
    }
    
    function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    // ============ NETTOYAGE AU DÉCHARGEMENT ============
    window.addEventListener('beforeunload', () => {
        stopLiveUpdates();
    });
    
    // ============ INITIALISATION ============
    loadData();
    loadPortfolioHistory();
    updateHeaderUI();
    
    // Exports globaux
    window.showPortfolioPage = showPortfolioPage;
    window.filterPortfolio = filterPortfolio;
    window.showInvestmentDetail = showInvestmentDetail;
    window.openSellModal = openSellModal;
    window.confirmSell = confirmSell;
    window.openWithdrawModal = openWithdrawModal;
    window.logout = logout;
    window.openLoginModal = openLoginModal;
    window.doLogin = doLogin;
    
    document.addEventListener('DOMContentLoaded', () => {
        if (db.currentUser) showPortfolioPage();
        else showPortfolioPage();
    });
</script>
</body>
</html>
