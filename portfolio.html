<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouenze | Mon portefeuille d'investissement</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1e293b; }
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --white: #ffffff;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-500: #64748b;
            --gray-700: #334155;
        }
        
        .header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo h1 { font-size: 24px; font-weight: 800; color: var(--primary); cursor: pointer; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .auth-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--gray-100); border: none; }
        .user-menu { display: flex; align-items: center; gap: 12px; background: var(--gray-100); padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .user-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
        
        .main { max-width: 1400px; margin: 32px auto; padding: 0 24px; }
        
        /* Stats portefeuille */
        .portfolio-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: var(--white); border-radius: 20px; padding: 24px; border: 1px solid var(--gray-200); transition: 0.2s; }
        .stat-card h3 { font-size: 12px; font-weight: 600; color: var(--gray-500); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--gray-900); }
        .stat-change { font-size: 12px; margin-top: 6px; }
        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }
        
        /* Graphiques */
        .chart-container { background: var(--white); border-radius: 20px; padding: 24px; border: 1px solid var(--gray-200); margin-bottom: 32px; }
        .chart-container h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
        .chart-wrapper { height: 320px; position: relative; }
        
        /* Filtres */
        .portfolio-filters { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 20px; background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 30px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* Liste des investissements */
        .investments-list { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-200); overflow: hidden; }
        .investment-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--gray-200); transition: 0.2s; cursor: pointer; }
        .investment-item:hover { background: var(--gray-100); }
        .investment-info h4 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .investment-info p { font-size: 12px; color: var(--gray-500); }
        .investment-value { text-align: right; }
        .investment-amount { font-size: 18px; font-weight: 700; color: var(--primary); }
        .investment-change { font-size: 12px; margin-top: 4px; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-card { background: var(--white); border-radius: 24px; max-width: 500px; width: 100%; padding: 28px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: 10px; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; width: 100%; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        
        .footer { border-top: 1px solid var(--gray-200); background: var(--white); margin-top: 60px; padding: 24px; text-align: center; font-size: 12px; color: var(--gray-500); }
        
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        .live-badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-left: 12px; animation: pulse 1.5s infinite; }
        
        @media (max-width: 700px) { .investment-item { flex-direction: column; text-align: center; gap: 12px; } .investment-value { text-align: center; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="window.location.href='index.html'"><h1>OUENZE INVEST</h1></div>
    <div class="header-actions" id="headerActions"></div>
</div>

<div class="main" id="appContainer"></div>

<div class="footer">
    <p>© 2024 Ouenze Invest - Portefeuille personnel | Données en temps réel</p>
</div>

<script>
    let currentUser = JSON.parse(localStorage.getItem('ouenze_current_user') || 'null');
    let shops = JSON.parse(localStorage.getItem('ouenze_shops') || '[]');
    let portfolioInvestments = JSON.parse(localStorage.getItem('ouenze_portfolio_investments') || '[]');
    let withdrawalHistory = JSON.parse(localStorage.getItem('ouenze_withdrawal_history') || '[]');
    let currentPortfolioFilter = 'all';
    let portfolioChart = null;
    let liveUpdateInterval = null;
    
    // Vérifier si l'utilisateur est connecté
    if (!currentUser) {
        window.location.href = 'index.html';
    }
    
    // Fonction pour calculer la valeur actuelle d'un investissement
    function calculateCurrentValue(investment) {
        const shop = shops.find(s => s.id === investment.shopId);
        if (!shop) return investment.amount;
        const valuation = calculateShopValuation(shop);
        const sharePrice = valuation / 1000;
        return investment.shares * sharePrice;
    }
    
    function calculateShopValuation(shop) {
        const baseValue = 1000000;
        const productValue = (shop.products?.length || 0) * 50000;
        const ratingBonus = (shop.rating || 0) * 150000;
        const salesBonus = (shop.totalSales || 0) * 1000;
        const assetsValue = (shop.assets || []).reduce((sum, a) => sum + (a.value || 0), 0);
        return baseValue + productValue + ratingBonus + salesBonus + assetsValue;
    }
    
    // Générer l'historique des prix pour le graphique
    function generatePortfolioHistory() {
        const history = [];
        let totalValue = portfolioInvestments.reduce((sum, inv) => sum + inv.amount, 0);
        for (let i = 30; i >= 0; i--) {
            const change = (Math.random() - 0.48) * 0.03;
            totalValue = totalValue * (1 + change);
            history.push({
                date: new Date(Date.now() - i * 86400000).toISOString().split('T')[0],
                value: Math.max(totalValue, portfolioInvestments.reduce((s,inv)=>s+inv.amount,0) * 0.7)
            });
        }
        return history;
    }
    
    let portfolioHistory = generatePortfolioHistory();
    
    function updatePortfolioHistory() {
        const lastValue = portfolioHistory[portfolioHistory.length - 1].value;
        const change = (Math.random() - 0.48) * 0.02;
        const newValue = lastValue * (1 + change);
        portfolioHistory.push({
            date: new Date().toISOString().split('T')[0],
            value: Math.max(newValue, portfolioInvestments.reduce((s,inv)=>s+inv.amount,0) * 0.7)
        });
        if (portfolioHistory.length > 60) portfolioHistory.shift();
        localStorage.setItem('ouenze_portfolio_history', JSON.stringify(portfolioHistory));
        return portfolioHistory;
    }
    
    function loadPortfolioHistory() {
        const saved = localStorage.getItem('ouenze_portfolio_history');
        if (saved) {
            portfolioHistory = JSON.parse(saved);
        } else {
            portfolioHistory = generatePortfolioHistory();
            localStorage.setItem('ouenze_portfolio_history', JSON.stringify(portfolioHistory));
        }
    }
    
    function getTotalPortfolioValue() {
        return portfolioInvestments.reduce((sum, inv) => sum + calculateCurrentValue(inv), 0);
    }
    
    function getTotalInvested() {
        return portfolioInvestments.reduce((sum, inv) => sum + inv.amount, 0);
    }
    
    function getTotalProfit() {
        return getTotalPortfolioValue() - getTotalInvested();
    }
    
    function showPortfolioPage() {
        const totalValue = getTotalPortfolioValue();
        const totalInvested = getTotalInvested();
        const totalProfit = getTotalProfit();
        const profitPercent = totalInvested > 0 ? (totalProfit / totalInvested * 100) : 0;
        
        const filteredInvestments = currentPortfolioFilter === 'all' 
            ? portfolioInvestments 
            : portfolioInvestments.filter(inv => inv.shopId === parseInt(currentPortfolioFilter));
        
        document.getElementById('appContainer').innerHTML = `
            <div class="portfolio-stats">
                <div class="stat-card"><h3>Valeur totale du portefeuille</h3><div class="stat-value">${totalValue.toLocaleString()} FCFA</div><div class="stat-change ${totalProfit >= 0 ? 'positive' : 'negative'}">${totalProfit >= 0 ? '+' : ''}${totalProfit.toLocaleString()} FCFA</div></div>
                <div class="stat-card"><h3>Total investi</h3><div class="stat-value">${totalInvested.toLocaleString()} FCFA</div><div class="stat-change">${portfolioInvestments.length} investissement(s)</div></div>
                <div class="stat-card"><h3>Performance</h3><div class="stat-value ${profitPercent >= 0 ? 'positive' : 'negative'}">${profitPercent >= 0 ? '+' : ''}${profitPercent.toFixed(2)}%</div><div class="stat-change">depuis l'ouverture</div></div>
                <div class="stat-card"><h3>Retraits disponibles</h3><div class="stat-value">${totalValue.toLocaleString()} FCFA</div><div class="stat-change"><button class="filter-btn" onclick="openWithdrawModal()" style="margin-top:8px;">Retirer des fonds</button></div></div>
            </div>
            
            <div class="chart-container">
                <h3>Évolution du portefeuille <span class="live-badge">LIVE</span></h3>
                <div class="chart-wrapper"><canvas id="portfolioChart"></canvas></div>
            </div>
            
            <div class="portfolio-filters">
                <button class="filter-btn ${currentPortfolioFilter === 'all' ? 'active' : ''}" onclick="filterPortfolio('all')">Tous les investissements</button>
                ${shops.filter(s => portfolioInvestments.some(inv => inv.shopId === s.id)).map(shop => `
                    <button class="filter-btn ${currentPortfolioFilter == shop.id ? 'active' : ''}" onclick="filterPortfolio(${shop.id})">${escapeHtml(shop.name)}</button>
                `).join('')}
            </div>
            
            <div class="investments-list">
                ${filteredInvestments.length ? filteredInvestments.map(inv => {
                    const shop = shops.find(s => s.id === inv.shopId);
                    const currentValue = calculateCurrentValue(inv);
                    const profit = currentValue - inv.amount;
                    const profitPercent = (profit / inv.amount * 100);
                    return `
                        <div class="investment-item" onclick="showInvestmentDetail(${inv.shopId})">
                            <div class="investment-info">
                                <h4>${escapeHtml(shop?.name || 'Boutique inconnue')}</h4>
                                <p>${inv.shares} actions · Investi le ${new Date(inv.date).toLocaleDateString()}</p>
                            </div>
                            <div class="investment-value">
                                <div class="investment-amount">${currentValue.toLocaleString()} FCFA</div>
                                <div class="investment-change ${profit >= 0 ? 'positive' : 'negative'}">${profit >= 0 ? '+' : ''}${profit.toLocaleString()} FCFA (${profitPercent >= 0 ? '+' : ''}${profitPercent.toFixed(2)}%)</div>
                            </div>
                        </div>
                    `;
                }).join('') : '<div style="text-align:center;padding:40px;">Aucun investissement pour le moment</div>'}
            </div>
        `;
        
        drawPortfolioChart();
        startLiveUpdates();
    }
    
    function drawPortfolioChart() {
        const ctx = document.getElementById('portfolioChart')?.getContext('2d');
        if (!ctx) return;
        if (portfolioChart) portfolioChart.destroy();
        
        portfolioChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: portfolioHistory.map(h => h.date.slice(5)),
                datasets: [{
                    label: 'Valeur du portefeuille (FCFA)',
                    data: portfolioHistory.map(h => h.value),
                    borderColor: '#1e40af',
                    backgroundColor: 'rgba(30,64,175,0.05)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 2,
                    pointBackgroundColor: '#1e40af',
                    pointBorderColor: '#1e40af'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { position: 'top', labels: { font: { size: 11 } } },
                    tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toLocaleString()} FCFA` } }
                },
                scales: { y: { ticks: { callback: (val) => val.toLocaleString() } } }
            }
        });
    }
    
    function startLiveUpdates() {
        if (liveUpdateInterval) clearInterval(liveUpdateInterval);
        liveUpdateInterval = setInterval(() => {
            const newHistory = updatePortfolioHistory();
            if (portfolioChart) {
                portfolioChart.data.labels = newHistory.map(h => h.date.slice(5));
                portfolioChart.data.datasets[0].data = newHistory.map(h => h.value);
                portfolioChart.update('none');
            }
            // Mettre à jour les stats
            const totalValue = getTotalPortfolioValue();
            const totalInvested = getTotalInvested();
            const totalProfit = totalValue - totalInvested;
            const profitPercent = totalInvested > 0 ? (totalProfit / totalInvested * 100) : 0;
            const statElements = document.querySelectorAll('.stat-value');
            if (statElements[0]) statElements[0].innerText = totalValue.toLocaleString() + ' FCFA';
            if (statElements[2]) statElements[2].innerText = (profitPercent >= 0 ? '+' : '') + profitPercent.toFixed(2) + '%';
        }, 5000);
    }
    
    function filterPortfolio(filter) {
        currentPortfolioFilter = filter;
        showPortfolioPage();
    }
    
    function showInvestmentDetail(shopId) {
        const shop = shops.find(s => s.id === shopId);
        const investment = portfolioInvestments.find(inv => inv.shopId === shopId);
        if (!shop || !investment) return;
        
        const currentValue = calculateCurrentValue(investment);
        const profit = currentValue - investment.amount;
        
        document.getElementById('appContainer').innerHTML = `
            <button onclick="showPortfolioPage()" style="background:none;border:none;color:var(--primary);cursor:pointer;margin-bottom:20px;"><i class="fas fa-arrow-left"></i> Retour au portefeuille</button>
            <div class="shop-detail-container" style="background:var(--white);border-radius:24px;border:1px solid var(--gray-200);padding:24px;">
                <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap;margin-bottom:24px;">
                    <div style="width:80px;height:80px;background:var(--gray-100);border-radius:50%;display:flex;align-items:center;justify-content:center;">${shop.logo ? `<img src="${shop.logo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : '<i class="fas fa-store" style="font-size:40px;"></i>'}</div>
                    <div><h1>${escapeHtml(shop.name)}</h1><div class="shop-rating">${'⭐'.repeat(Math.floor(shop.rating || 0))} ${shop.rating || 0}/5</div><div>📍 ${escapeHtml(shop.city || 'Brazzaville')}</div></div>
                </div>
                <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;">
                    <div class="stat-card"><h3>Actions détenues</h3><div class="stat-value">${investment.shares}</div></div>
                    <div class="stat-card"><h3>Valeur actuelle</h3><div class="stat-value">${currentValue.toLocaleString()} FCFA</div></div>
                    <div class="stat-card"><h3>Plus-value</h3><div class="stat-value ${profit >= 0 ? 'positive' : 'negative'}">${profit >= 0 ? '+' : ''}${profit.toLocaleString()} FCFA</div></div>
                </div>
                <div class="chart-container" style="margin-bottom:24px;"><h3>Évolution de la valeur</h3><canvas id="detailChart"></canvas></div>
                <div class="action-buttons" style="display:flex;gap:12px;">
                    <button class="btn-primary" onclick="openSellFromPortfolio(${shop.id}, ${investment.shares}, ${currentValue / investment.shares})">Vendre des actions</button>
                    <button class="btn-success" onclick="window.location.href='invest.html'">Investir davantage</button>
                </div>
            </div>
        `;
        
        const detailHistory = generateInvestmentHistory(shop.id);
        setTimeout(() => {
            const ctx = document.getElementById('detailChart')?.getContext('2d');
            if (ctx) {
                new Chart(ctx, {
                    type: 'line',
                    data: { labels: detailHistory.map(h => h.date.slice(5)), datasets: [{ label: 'Valeur (FCFA)', data: detailHistory.map(h => h.value), borderColor: '#1e40af', fill: true, tension: 0.3 }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            }
        }, 100);
    }
    
    function generateInvestmentHistory(shopId) {
        const shop = shops.find(s => s.id === shopId);
        const valuation = calculateShopValuation(shop);
        const sharePrice = valuation / 1000;
        const history = [];
        let price = sharePrice;
        for (let i = 30; i >= 0; i--) {
            const change = (Math.random() - 0.48) * 0.03;
            price = price * (1 + change);
            history.push({ date: new Date(Date.now() - i * 86400000).toISOString().split('T')[0], value: price });
        }
        return history;
    }
    
    function openSellFromPortfolio(shopId, maxShares, sharePrice) {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <h3 style="margin-bottom:20px;">Vendre des actions</h3>
                <div class="form-group"><label>Nombre d'actions (max ${maxShares})</label><input type="number" id="sellQty" min="1" max="${maxShares}" value="1"></div>
                <div class="form-group"><label>Prix unitaire</label><input type="text" id="sharePrice" value="${Math.round(sharePrice)}" readonly disabled></div>
                <div class="form-group"><strong>Total: <span id="sellTotal">${Math.round(sharePrice)}</span> FCFA</strong></div>
                <button class="btn-danger" style="width:100%;margin-top:16px;" onclick="submitSellFromPortfolio(${shopId}, ${maxShares}, ${sharePrice})">Confirmer la vente</button>
                <button onclick="this.closest('.modal').remove()" style="margin-top:12px;background:none;border:none;cursor:pointer;">Annuler</button>
            </div>`;
        document.body.appendChild(modal);
        document.getElementById('sellQty').addEventListener('input', (e) => {
            const total = e.target.value * sharePrice;
            document.getElementById('sellTotal').innerText = total.toLocaleString();
        });
    }
    
    function submitSellFromPortfolio(shopId, maxShares, sharePrice) {
        const quantity = parseInt(document.getElementById('sellQty').value);
        if (!quantity || quantity < 1 || quantity > maxShares) { alert("Quantité invalide"); return; }
        const total = quantity * sharePrice;
        
        const investment = portfolioInvestments.find(inv => inv.shopId === shopId);
        if (investment) {
            if (quantity === investment.shares) {
                const index = portfolioInvestments.findIndex(inv => inv.shopId === shopId);
                portfolioInvestments.splice(index, 1);
            } else {
                investment.shares -= quantity;
                investment.amount = investment.shares * (investment.amount / (investment.shares + quantity));
            }
            localStorage.setItem('ouenze_portfolio_investments', JSON.stringify(portfolioInvestments));
            
            withdrawalHistory.push({
                id: Date.now(),
                shopId, quantity, amount: total,
                date: new Date().toISOString(),
                method: 'pending'
            });
            localStorage.setItem('ouenze_withdrawal_history', JSON.stringify(withdrawalHistory));
            
            alert(`✅ Vente de ${quantity} actions effectuée !\nMontant: ${total.toLocaleString()} FCFA\n\nLes fonds seront disponibles sous 48h sur votre compte.`);
            document.querySelector('.modal.active')?.remove();
            showPortfolioPage();
        }
    }
    
    function openWithdrawModal() {
        const totalValue = getTotalPortfolioValue();
        if (!currentUser.paymentMethod || !currentUser.paymentDetails) {
            openPaymentInfoModal(() => openWithdrawModal());
            return;
        }
        
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <h3 style="margin-bottom:20px;">Retirer des fonds</h3>
                <div class="form-group"><label>Montant à retirer (FCFA)</label><input type="number" id="withdrawAmount" min="10000" max="${totalValue}" value="${Math.min(100000, totalValue)}"></div>
                <div class="form-group"><label>Mode de retrait</label><select id="withdrawMethod"><option value="airtel">Airtel Money</option><option value="mtn">MTN Mobile Money</option><option value="paypal">PayPal</option><option value="bank">Virement bancaire</option></select></div>
                <div class="form-group"><label>Identifiant / Numéro</label><input type="text" id="withdrawAccount" placeholder="Numéro de compte ou email" value="${currentUser.paymentDetails || ''}"></div>
                <button class="btn-success" style="width:100%;margin-top:16px;" onclick="submitWithdraw(${totalValue})">Confirmer le retrait</button>
                <button onclick="this.closest('.modal').remove()" style="margin-top:12px;background:none;border:none;cursor:pointer;">Annuler</button>
            </div>`;
        document.body.appendChild(modal);
    }
    
    function openPaymentInfoModal(callback) {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>Informations de paiement requises</h3>
                <p style="margin-bottom:16px;">Veuillez renseigner vos coordonnées pour effectuer des retraits.</p>
                <div class="form-group"><label>Mode de paiement</label><select id="payMethod"><option value="airtel">Airtel Money</option><option value="mtn">MTN Mobile Money</option><option value="visa">Visa/Mastercard</option><option value="paypal">PayPal</option></select></div>
                <div class="form-group"><label>Identifiant / Numéro</label><input type="text" id="payDetails" placeholder="Numéro de compte ou email PayPal"></div>
                <button class="btn-primary" onclick="savePaymentInfoAndProceed('${callback}')">Enregistrer</button>
                <button onclick="this.closest('.modal').remove()" style="margin-top:12px;background:none;border:none;">Annuler</button>
            </div>`;
        document.body.appendChild(modal);
        window.savePaymentInfoAndProceed = (cb) => {
            const method = document.getElementById('payMethod').value;
            const details = document.getElementById('payDetails').value;
            if (!details) { alert("Veuillez entrer vos coordonnées"); return; }
            currentUser.paymentMethod = method;
            currentUser.paymentDetails = details;
            localStorage.setItem('ouenze_current_user', JSON.stringify(currentUser));
            modal.remove();
            if (cb) eval(cb)();
        };
    }
    
    function submitWithdraw(totalValue) {
        const amount = parseInt(document.getElementById('withdrawAmount').value);
        const method = document.getElementById('withdrawMethod').value;
        const account = document.getElementById('withdrawAccount').value;
        
        if (!amount || amount < 10000) { alert("Montant minimum 10 000 FCFA"); return; }
        if (amount > totalValue) { alert("Montant supérieur au solde disponible"); return; }
        if (!account) { alert("Veuillez entrer votre identifiant"); return; }
        
        withdrawalHistory.push({
            id: Date.now(),
            amount, method, account,
            date: new Date().toISOString(),
            status: 'pending'
        });
        localStorage.setItem('ouenze_withdrawal_history', JSON.stringify(withdrawalHistory));
        
        alert(`✅ Demande de retrait de ${amount.toLocaleString()} FCFA enregistrée !\n\nMode: ${method.toUpperCase()}\nCompte: ${account}\n\nTraitement sous 48h maximum.`);
        document.querySelector('.modal.active')?.remove();
    }
    
    function updateHeaderUI() {
        const container = document.getElementById('headerActions');
        if (currentUser) {
            container.innerHTML = `<div class="user-menu" onclick="window.location.href='vendor-dashboard.html'"><div class="user-avatar">${currentUser.name.charAt(0)}</div><div>${currentUser.name.split(' ')[0]}<br><small>Investisseur</small></div><button onclick="event.stopPropagation();logout()" style="background:none;border:none;cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button></div>`;
        } else {
            container.innerHTML = `<button class="auth-btn" onclick="openLoginModal()">Connexion</button>`;
        }
    }
    
    function openLoginModal() {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-card"><h3>Connexion</h3><div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div><div class="form-group"><input type="password" id="loginPassword" placeholder="Mot de passe"></div><button class="btn-primary" onclick="doLogin()">Se connecter</button><div style="text-align:center;margin-top:16px;"><a href="#" onclick="window.location.href='index.html'">Inscription</a></div></div>`;
        document.body.appendChild(modal);
        window.doLogin = () => {
            const email = document.getElementById('loginEmail').value.trim();
            if (email) { currentUser = { name: email.split('@')[0], email, type: 'investor' }; localStorage.setItem('ouenze_current_user', JSON.stringify(currentUser)); updateHeaderUI(); modal.remove(); showPortfolioPage(); alert(`Bienvenue ${currentUser.name}`); }
            else alert("Email requis");
        };
    }
    
    function logout() { currentUser = null; localStorage.removeItem('ouenze_current_user'); updateHeaderUI(); window.location.href = 'index.html'; }
    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    window.showPortfolioPage = showPortfolioPage;
    window.filterPortfolio = filterPortfolio;
    window.showInvestmentDetail = showInvestmentDetail;
    window.openSellFromPortfolio = openSellFromPortfolio;
    window.submitSellFromPortfolio = submitSellFromPortfolio;
    window.openWithdrawModal = openWithdrawModal;
    window.submitWithdraw = submitWithdraw;
    
    loadPortfolioHistory();
    
    if (shops.length === 0) {
        shops = [
            { id: 1, name: "Élégance Africaine", rating: 5.0, totalRatings: 342, products: [], city: "Brazzaville", assets: [], totalSales: 1250, hasPhysicalStore: true },
            { id: 2, name: "Tech Congo", rating: 4.8, totalRatings: 124, products: [], city: "Brazzaville", assets: [], totalSales: 342, hasPhysicalStore: false }
        ];
        localStorage.setItem('ouenze_shops', JSON.stringify(shops));
    }
    
    if (portfolioInvestments.length === 0 && currentUser) {
        portfolioInvestments = [
            { id: 1, shopId: 1, shopName: "Élégance Africaine", shares: 50, amount: 250000, date: new Date().toISOString() },
            { id: 2, shopId: 2, shopName: "Tech Congo", shares: 30, amount: 120000, date: new Date(Date.now() - 15*86400000).toISOString() }
        ];
        localStorage.setItem('ouenze_portfolio_investments', JSON.stringify(portfolioInvestments));
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        updateHeaderUI();
        showPortfolioPage();
    });
</script>
</body>
</html>
