<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ouenze | Mon portefeuille d'investissement</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1e293b; }
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --primary-light: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --white: #ffffff;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-500: #64748b;
            --gray-700: #334155;
            --gray-900: #0f172a;
        }
        
        .header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo h1 { font-size: 24px; font-weight: 800; color: var(--primary); cursor: pointer; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .auth-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--gray-100); border: none; }
        .user-menu { display: flex; align-items: center; gap: 12px; background: var(--gray-100); padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .user-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
        .nav-tabs { display: flex; gap: 4px; background: var(--white); padding: 8px 24px; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; }
        .nav-tab { padding: 8px 20px; background: none; border: none; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; color: var(--gray-500); }
        .nav-tab.active { background: var(--primary); color: white; }
        
        .main { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
        
        /* Cartes statistiques */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 28px; }
        .stat-card { background: var(--white); border-radius: 20px; padding: 20px; border: 1px solid var(--gray-200); transition: 0.2s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .stat-card h3 { font-size: 12px; font-weight: 600; color: var(--gray-500); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--gray-900); }
        .stat-change { font-size: 12px; margin-top: 6px; }
        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }
        
        /* Graphique */
        .chart-container { background: var(--white); border-radius: 20px; padding: 20px; border: 1px solid var(--gray-200); margin-bottom: 28px; }
        .chart-container h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--gray-900); }
        .chart-wrapper { height: 280px; position: relative; }
        
        /* Liste des investissements */
        .investments-list { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-200); overflow: hidden; margin-bottom: 28px; }
        .investment-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--gray-200); transition: 0.2s; }
        .investment-item:hover { background: var(--gray-100); }
        .investment-info h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .investment-info p { font-size: 12px; color: var(--gray-500); }
        .investment-value { text-align: right; }
        .investment-amount { font-size: 18px; font-weight: 700; color: var(--primary); }
        .investment-shares { font-size: 12px; color: var(--gray-500); }
        .investment-performance { font-size: 13px; font-weight: 600; margin-top: 4px; }
        .investment-performance.positive { color: var(--success); }
        .investment-performance.negative { color: var(--danger); }
        
        .btn-sm { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: var(--gray-100); border: 1px solid var(--gray-200); color: var(--gray-700); }
        .btn-outline:hover { background: var(--gray-200); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #059669; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-card { background: var(--white); border-radius: 24px; width: 100%; max-width: 500px; padding: 28px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--gray-700); }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid var(--gray-200); border-radius: 10px; font-size: 13px; }
        .btn-submit { background: var(--primary); color: white; padding: 12px; border-radius: 40px; border: none; width: 100%; cursor: pointer; font-weight: 600; margin-top: 8px; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-500); }
        .footer { border-top: 1px solid var(--gray-200); background: var(--white); margin-top: 48px; padding: 20px; text-align: center; font-size: 11px; color: var(--gray-500); }
        
        @media (max-width: 700px) {
            .investment-item { flex-direction: column; text-align: center; gap: 12px; }
            .investment-value { text-align: center; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="window.location.href='index.html'"><h1>OUENZE INVEST</h1></div>
    <div class="header-actions" id="headerActions"></div>
</div>

<div class="nav-tabs">
    <button class="nav-tab active" data-tab="overview">Vue d'ensemble</button>
    <button class="nav-tab" data-tab="holdings">Mes investissements</button>
    <button class="nav-tab" data-tab="history">Historique</button>
    <button class="nav-tab" data-tab="withdraw">Retirer des fonds</button>
</div>

<div id="appContainer" class="main"></div>

<div class="footer">
    <p>© 2024 Ouenze Invest - Portefeuille confidentiel | Données en temps réel</p>
</div>

<script>
    let currentUser = JSON.parse(localStorage.getItem('ouenze_current_user') || 'null');
    let shops = JSON.parse(localStorage.getItem('ouenze_shops') || '[]');
    let investments = JSON.parse(localStorage.getItem('ouenze_investments') || '[]');
    let transactions = JSON.parse(localStorage.getItem('ouenze_transactions') || '[]');
    let portfolioHistory = JSON.parse(localStorage.getItem('ouenze_portfolio_history') || '[]');
    let chartInstance = null;
    let portfolioChart = null;
    
    // Redirection si non connecté
    if(!currentUser) {
        window.location.href = 'index.html';
    }
    
    function updateHeaderUI() {
        const container = document.getElementById('headerActions');
        if (currentUser) {
            container.innerHTML = `<div class="user-menu" onclick="window.location.href='vendor-dashboard.html'"><div class="user-avatar">${currentUser.name.charAt(0)}</div><div>${currentUser.name.split(' ')[0]}<br><small>Investisseur</small></div><button onclick="event.stopPropagation();logout()" style="background:none;border:none;cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button></div>`;
        } else {
            container.innerHTML = `<button class="auth-btn" onclick="window.location.href='index.html'">Connexion</button>`;
        }
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem('ouenze_current_user');
        window.location.href = 'index.html';
    }
    
    function calculateValuation(shop) {
        const baseValue = 1000000;
        const productValue = (shop.products?.length || 0) * 50000;
        const ratingBonus = (shop.rating || 0) * 150000;
        const salesBonus = (shop.totalSales || 0) * 1000;
        const assetsValue = (shop.assets || []).reduce((sum, a) => sum + (a.value || 0), 0);
        return baseValue + productValue + ratingBonus + salesBonus + assetsValue;
    }
    
    function calculateSharePrice(valuation) {
        return Math.round(valuation / 1000);
    }
    
    // Récupérer les investissements de l'utilisateur
    function getUserHoldings() {
        const userInvestments = investments.filter(i => i.investor === currentUser.email && i.status === 'approved');
        const holdings = [];
        
        userInvestments.forEach(inv => {
            const shop = shops.find(s => s.id === inv.shopId);
            if(shop) {
                const valuation = calculateValuation(shop);
                const currentPrice = calculateSharePrice(valuation);
                const initialPrice = inv.pricePerShare || inv.amount / inv.quantity;
                const currentValue = inv.quantity * currentPrice;
                const performance = ((currentValue - inv.amount) / inv.amount) * 100;
                
                holdings.push({
                    id: inv.id,
                    shopId: shop.id,
                    shopName: shop.name,
                    shopLogo: shop.logo,
                    quantity: inv.quantity,
                    initialAmount: inv.amount,
                    currentValue: currentValue,
                    currentPrice: currentPrice,
                    initialPrice: initialPrice,
                    performance: performance,
                    date: inv.date
                });
            }
        });
        
        return holdings;
    }
    
    // Générer l'historique du portefeuille (simulation)
    function generatePortfolioHistory() {
        if(portfolioHistory.length > 0) return portfolioHistory;
        
        const history = [];
        let value = 1000000;
        for(let i = 30; i >= 0; i--) {
            const change = (Math.random() - 0.5) * 0.03;
            value = value * (1 + change);
            history.push({
                date: new Date(Date.now() - i * 86400000).toISOString().split('T')[0],
                value: Math.round(value)
            });
        }
        return history;
    }
    
    // Vérifier si l'utilisateur a des infos de paiement
    function hasPaymentInfo() {
        return currentUser && currentUser.paymentMethod && currentUser.paymentDetails;
    }
    
    // Sauvegarder les infos de paiement
    function savePaymentInfo(method, details) {
        currentUser.paymentMethod = method;
        currentUser.paymentDetails = details;
        localStorage.setItem('ouenze_current_user', JSON.stringify(currentUser));
    }
    
    // Vue d'ensemble
    function showOverview() {
        const holdings = getUserHoldings();
        const totalInvested = holdings.reduce((sum, h) => sum + h.initialAmount, 0);
        const currentTotal = holdings.reduce((sum, h) => sum + h.currentValue, 0);
        const totalPerformance = totalInvested > 0 ? ((currentTotal - totalInvested) / totalInvested) * 100 : 0;
        const history = generatePortfolioHistory();
        const lastValue = history[history.length-1]?.value || currentTotal;
        
        document.getElementById('appContainer').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><h3>Capital investi</h3><div class="stat-value">${totalInvested.toLocaleString()} FCFA</div><div class="stat-change">Total investi</div></div>
                <div class="stat-card"><h3>Valeur actuelle</h3><div class="stat-value">${currentTotal.toLocaleString()} FCFA</div><div class="stat-change ${totalPerformance >= 0 ? 'positive' : 'negative'}">${totalPerformance >= 0 ? '+' : ''}${totalPerformance.toFixed(2)}%</div></div>
                <div class="stat-card"><h3>Plus-value latente</h3><div class="stat-value ${(currentTotal - totalInvested) >= 0 ? 'positive' : 'negative'}">${(currentTotal - totalInvested) >= 0 ? '+' : ''}${(currentTotal - totalInvested).toLocaleString()} FCFA</div></div>
                <div class="stat-card"><h3>Boutiques</h3><div class="stat-value">${holdings.length}</div><div class="stat-change">investissements actifs</div></div>
            </div>
            
            <div class="chart-container">
                <h3>Évolution de mon portefeuille</h3>
                <div class="chart-wrapper"><canvas id="portfolioChart"></canvas></div>
            </div>
            
            <div class="investments-list">
                <div style="padding: 16px 20px; background: var(--gray-100); border-bottom: 1px solid var(--gray-200);">
                    <strong>Mes investissements</strong>
                </div>
                ${holdings.length > 0 ? holdings.map(h => `
                    <div class="investment-item">
                        <div class="investment-info">
                            <h4>${escapeHtml(h.shopName)}</h4>
                            <p>${h.quantity} actions | Investi le ${new Date(h.date).toLocaleDateString()}</p>
                        </div>
                        <div class="investment-value">
                            <div class="investment-amount">${h.currentValue.toLocaleString()} FCFA</div>
                            <div class="investment-shares">${h.quantity} parts à ${h.currentPrice.toLocaleString()} FCFA</div>
                            <div class="investment-performance ${h.performance >= 0 ? 'positive' : 'negative'}">${h.performance >= 0 ? '+' : ''}${h.performance.toFixed(2)}%</div>
                            <button class="btn-sm btn-outline" style="margin-top: 8px;" onclick="showShopDetail(${h.shopId})">Détails</button>
                            <button class="btn-sm btn-danger" style="margin-top: 8px; margin-left: 8px;" onclick="openSellModal(${h.shopId}, ${h.quantity}, ${h.currentPrice})">Vendre</button>
                        </div>
                    </div>
                `).join('') : '<div class="empty-state">Aucun investissement pour le moment. Rendez-vous sur la page Investir pour commencer.</div>'}
            </div>
        `;
        
        // Créer le graphique animé
        setTimeout(() => {
            const ctx = document.getElementById('portfolioChart')?.getContext('2d');
            if(ctx && portfolioChart) portfolioChart.destroy();
            if(ctx) {
                portfolioChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: history.map(h => h.date.slice(5)),
                        datasets: [{
                            label: 'Valeur du portefeuille (FCFA)',
                            data: history.map(h => h.value),
                            borderColor: '#1e40af',
                            backgroundColor: 'rgba(30,64,175,0.05)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 2,
                            pointBackgroundColor: '#1e40af'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { legend: { position: 'top', labels: { font: { size: 10 } } } },
                        animation: { duration: 1500, easing: 'easeOutQuart' }
                    }
                });
            }
        }, 100);
    }
    
    // Détail d'une boutique
    function showShopDetail(shopId) {
        const shop = shops.find(s => s.id === shopId);
        if(!shop) return;
        const holdings = getUserHoldings();
        const holding = holdings.find(h => h.shopId === shopId);
        if(!holding) return;
        
        const valuation = calculateValuation(shop);
        const sharePrice = calculateSharePrice(valuation);
        
        // Générer l'historique des prix
        const priceHistory = [];
        let price = sharePrice;
        for(let i = 30; i >= 0; i--) {
            const change = (Math.random() - 0.5) * 0.04;
            price = price * (1 + change);
            priceHistory.push({ date: new Date(Date.now() - i * 86400000).toISOString().split('T')[0], price: Math.max(50, Math.round(price)) });
        }
        
        document.getElementById('appContainer').innerHTML = `
            <button onclick="showOverview()" style="background:none;border:none;color:var(--primary);cursor:pointer;margin-bottom:20px;"><i class="fas fa-arrow-left"></i> Retour au portefeuille</button>
            <div class="chart-container">
                <h3>${escapeHtml(shop.name)} - Évolution du prix</h3>
                <div class="chart-wrapper"><canvas id="priceChart"></canvas></div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><h3>Mes parts</h3><div class="stat-value">${holding.quantity}</div><div class="stat-change">actions</div></div>
                <div class="stat-card"><h3>Valeur investie</h3><div class="stat-value">${holding.initialAmount.toLocaleString()} FCFA</div></div>
                <div class="stat-card"><h3>Valeur actuelle</h3><div class="stat-value ${holding.performance >= 0 ? 'positive' : 'negative'}">${holding.currentValue.toLocaleString()} FCFA</div></div>
                <div class="stat-card"><h3>Performance</h3><div class="stat-value ${holding.performance >= 0 ? 'positive' : 'negative'}">${holding.performance >= 0 ? '+' : ''}${holding.performance.toFixed(2)}%</div></div>
            </div>
            <div class="investments-list">
                <div style="padding: 16px 20px; background: var(--gray-100);"><strong>Actions détenues</strong></div>
                <div class="investment-item">
                    <div><strong>${escapeHtml(shop.name)}</strong><br><span style="font-size:12px;">Prix actuel: ${sharePrice.toLocaleString()} FCFA</span></div>
                    <div class="investment-value">
                        <div>${holding.quantity} actions</div>
                        <div class="investment-amount">${holding.currentValue.toLocaleString()} FCFA</div>
                        <button class="btn-sm btn-danger" style="margin-top:8px;" onclick="openSellModal(${shop.id}, ${holding.quantity}, ${sharePrice})">Vendre des parts</button>
                    </div>
                </div>
            </div>
        `;
        
        setTimeout(() => {
            const ctx = document.getElementById('priceChart')?.getContext('2d');
            if(ctx) {
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: priceHistory.map(h => h.date.slice(5)),
                        datasets: [{ label: 'Prix par action (FCFA)', data: priceHistory.map(h => h.price), borderColor: '#1e40af', backgroundColor: 'rgba(30,64,175,0.05)', fill: true, tension: 0.3 }]
                    },
                    options: { responsive: true, maintainAspectRatio: true, animation: { duration: 1200, easing: 'easeOutQuart' } }
                });
            }
        }, 100);
    }
    
    // Modale de vente
    function openSellModal(shopId, maxQuantity, currentPrice) {
        const shop = shops.find(s => s.id === shopId);
        if(!shop) return;
        
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <h3 style="margin-bottom: 20px;">Vendre des actions</h3>
                <div style="background:var(--gray-100);padding:12px;border-radius:12px;margin-bottom:16px;">
                    Boutique: ${escapeHtml(shop.name)}<br>
                    Prix actuel: ${currentPrice.toLocaleString()} FCFA/action<br>
                    Actions disponibles: ${maxQuantity}
                </div>
                <div class="form-group"><label>Nombre d'actions à vendre</label><input type="number" id="sellQuantity" min="1" max="${maxQuantity}" value="1"></div>
                <div class="form-group"><strong>Montant estimé: <span id="estimatedAmount">${currentPrice}</span> FCFA</strong></div>
                <div class="form-group"><label>Mode de réception des fonds</label>
                    <select id="withdrawMethod">
                        <option value="airtel">Airtel Money</option>
                        <option value="mtn">MTN Mobile Money</option>
                        <option value="paypal">PayPal</option>
                        <option value="bank">Virement bancaire</option>
                    </select>
                </div>
                <div id="paymentFields" style="display:block;">
                    <div class="form-group"><label>Identifiant / Numéro</label><input type="text" id="paymentAccount" placeholder="Numéro de téléphone ou email PayPal"></div>
                </div>
                <button class="btn-submit" onclick="submitSell(${shopId}, ${currentPrice}, ${maxQuantity})">Confirmer la vente</button>
                <button onclick="this.closest('.modal').remove()" style="margin-top:12px;background:none;border:none;color:var(--gray-500);cursor:pointer;">Annuler</button>
            </div>`;
        document.body.appendChild(modal);
        
        const qtyInput = document.getElementById('sellQuantity');
        const amountSpan = document.getElementById('estimatedAmount');
        qtyInput.addEventListener('input', () => {
            amountSpan.innerText = (qtyInput.value * currentPrice).toLocaleString();
        });
        
        const methodSelect = document.getElementById('withdrawMethod');
        const paymentFields = document.getElementById('paymentFields');
        methodSelect.addEventListener('change', () => {
            if(hasPaymentInfo() && (methodSelect.value === 'airtel' || methodSelect.value === 'mtn' || methodSelect.value === 'paypal')) {
                paymentFields.innerHTML = `<div class="form-group"><label>Vos coordonnées enregistrées</label><input type="text" value="${currentUser.paymentDetails}" readonly style="background:var(--gray-100);"></div>`;
            } else {
                paymentFields.innerHTML = `<div class="form-group"><label>Identifiant / Numéro</label><input type="text" id="paymentAccount" placeholder="Numéro de téléphone ou email PayPal"></div>`;
            }
        });
    }
    
    function submitSell(shopId, currentPrice, maxQuantity) {
        const quantity = parseInt(document.getElementById('sellQuantity').value);
        const withdrawMethod = document.getElementById('withdrawMethod').value;
        let paymentAccount = document.getElementById('paymentAccount')?.value;
        
        if(!quantity || quantity < 1 || quantity > maxQuantity) {
            alert("Quantité invalide");
            return;
        }
        
        if(!paymentAccount && !hasPaymentInfo()) {
            alert("Veuillez renseigner vos coordonnées de retrait");
            return;
        }
        
        const totalAmount = quantity * currentPrice;
        
        // Enregistrer la transaction de vente
        const sellTransaction = {
            id: Date.now(),
            type: 'sell',
            shopId: shopId,
            shopName: shops.find(s => s.id === shopId)?.name,
            investor: currentUser.email,
            quantity: quantity,
            pricePerShare: currentPrice,
            total: totalAmount,
            withdrawMethod: withdrawMethod,
            paymentAccount: paymentAccount || currentUser.paymentDetails,
            date: new Date().toISOString(),
            status: 'pending'
        };
        
        transactions.push(sellTransaction);
        localStorage.setItem('ouenze_transactions', JSON.stringify(transactions));
        
        // Mettre à jour les investissements
        const userInvestments = investments.filter(i => i.investor === currentUser.email && i.shopId === shopId && i.status === 'approved');
        let remainingQuantity = quantity;
        for(let inv of userInvestments) {
            if(remainingQuantity <= 0) break;
            const sellQty = Math.min(inv.quantity, remainingQuantity);
            inv.quantity -= sellQty;
            remainingQuantity -= sellQty;
        }
        localStorage.setItem('ouenze_investments', JSON.stringify(investments));
        
        alert(`✅ Demande de vente enregistrée !\n\n${quantity} actions vendues\nMontant: ${totalAmount.toLocaleString()} FCFA\nMode de retrait: ${withdrawMethod.toUpperCase()}\n\nLes fonds seront transférés sous 48h.`);
        
        document.querySelector('.modal.active')?.remove();
        showOverview();
    }
    
    // Historique des transactions
    function showHistory() {
        const userTransactions = transactions.filter(t => t.investor === currentUser.email).sort((a,b) => new Date(b.date) - new Date(a.date));
        
        document.getElementById('appContainer').innerHTML = `
            <div class="investments-list">
                <div style="padding: 16px 20px; background: var(--gray-100); border-bottom: 1px solid var(--gray-200);">
                    <strong>Historique des transactions</strong>
                </div>
                ${userTransactions.length > 0 ? userTransactions.map(t => `
                    <div class="investment-item">
                        <div class="investment-info">
                            <h4>${t.type === 'buy' ? 'Achat' : 'Vente'} - ${escapeHtml(t.shopName)}</h4>
                            <p>${new Date(t.date).toLocaleDateString()} | ${t.quantity} actions à ${t.pricePerShare.toLocaleString()} FCFA</p>
                        </div>
                        <div class="investment-value">
                            <div class="investment-amount">${t.total.toLocaleString()} FCFA</div>
                            <div class="investment-shares">Statut: ${t.status === 'approved' ? 'Confirmé' : 'En attente'}</div>
                            ${t.type === 'sell' ? `<div class="investment-shares">Retrait: ${t.withdrawMethod}</div>` : ''}
                        </div>
                    </div>
                `).join('') : '<div class="empty-state">Aucune transaction</div>'}
            </div>
        `;
    }
    
    // Retrait de fonds
    function showWithdraw() {
        const holdings = getUserHoldings();
        const totalValue = holdings.reduce((sum, h) => sum + h.currentValue, 0);
        
        document.getElementById('appContainer').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><h3>Valeur totale</h3><div class="stat-value">${totalValue.toLocaleString()} FCFA</div></div>
                <div class="stat-card"><h3>Disponible à retirer</h3><div class="stat-value">${Math.round(totalValue * 0.8).toLocaleString()} FCFA</div><div class="stat-change">80% du portefeuille</div></div>
            </div>
            <div class="chart-container">
                <h3>Retirer des fonds</h3>
                <div class="form-group"><label>Montant à retirer (FCFA)</label><input type="number" id="withdrawAmount" placeholder="0" min="5000" max="${Math.round(totalValue * 0.8)}"></div>
                <div class="form-group"><label>Mode de retrait</label>
                    <select id="withdrawMethod">
                        <option value="airtel">Airtel Money</option>
                        <option value="mtn">MTN Mobile Money</option>
                        <option value="paypal">PayPal</option>
                        <option value="bank">Virement bancaire</option>
                    </select>
                </div>
                <div id="withdrawPaymentFields">
                    <div class="form-group"><label>Identifiant / Numéro</label><input type="text" id="paymentAccount" placeholder="Numéro de téléphone ou email PayPal"></div>
                </div>
                <button class="btn-submit" onclick="requestWithdrawal()">Demander le retrait</button>
            </div>
        `;
        
        const methodSelect = document.getElementById('withdrawMethod');
        const paymentFields = document.getElementById('withdrawPaymentFields');
        methodSelect.addEventListener('change', () => {
            if(hasPaymentInfo() && (methodSelect.value === 'airtel' || methodSelect.value === 'mtn' || methodSelect.value === 'paypal')) {
                paymentFields.innerHTML = `<div class="form-group"><label>Vos coordonnées enregistrées</label><input type="text" value="${currentUser.paymentDetails}" readonly style="background:var(--gray-100);"></div>`;
            } else {
                paymentFields.innerHTML = `<div class="form-group"><label>Identifiant / Numéro</label><input type="text" id="paymentAccount" placeholder="Numéro de téléphone ou email PayPal"></div>`;
            }
        });
    }
    
    function requestWithdrawal() {
        const amount = parseInt(document.getElementById('withdrawAmount').value);
        const method = document.getElementById('withdrawMethod').value;
        let paymentAccount = document.getElementById('paymentAccount')?.value;
        
        if(!amount || amount < 5000) {
            alert("Montant minimum: 5 000 FCFA");
            return;
        }
        
        if(!paymentAccount && !hasPaymentInfo()) {
            alert("Veuillez renseigner vos coordonnées de retrait");
            return;
        }
        
        const withdrawRequest = {
            id: Date.now(),
            investor: currentUser.email,
            amount: amount,
            method: method,
            account: paymentAccount || currentUser.paymentDetails,
            date: new Date().toISOString(),
            status: 'pending'
        };
        
        let withdrawRequests = JSON.parse(localStorage.getItem('ouenze_withdraw_requests') || '[]');
        withdrawRequests.push(withdrawRequest);
        localStorage.setItem('ouenze_withdraw_requests', JSON.stringify(withdrawRequests));
        
        alert(`✅ Demande de retrait enregistrée !\n\nMontant: ${amount.toLocaleString()} FCFA\nMode: ${method.toUpperCase()}\n\nLes fonds seront transférés sous 72h.`);
        
        showOverview();
    }
    
    // Navigation
    document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const tabName = tab.dataset.tab;
            if(tabName === 'overview') showOverview();
            else if(tabName === 'holdings') showOverview();
            else if(tabName === 'history') showHistory();
            else if(tabName === 'withdraw') showWithdraw();
        });
    });
    
    function escapeHtml(s) { return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    window.showOverview = showOverview;
    window.showShopDetail = showShopDetail;
    window.openSellModal = openSellModal;
    
    updateHeaderUI();
    showOverview();
</script>
</body>
</html>
