    function initLocationMap(lat, lng, userLocation) {
        if (locationMap) locationMap.remove();
        locationMap = L.map('locationMap').setView([lat, lng], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>' }).addTo(locationMap);
        
        locationMarker = L.marker([lat, lng], { draggable: true }).addTo(locationMap);
        locationMarker.on('dragend', function(e) {
            const pos = e.target.getLatLng();
            document.getElementById('locationCoords').innerHTML = `Position sélectionnée: ${pos.lat.toFixed(6)}, ${pos.lng.toFixed(6)}`;
            window.tempLocation = { lat: pos.lat, lng: pos.lng };
        });
        
        locationMap.on('click', function(e) {
            locationMarker.setLatLng(e.latlng);
            document.getElementById('locationCoords').innerHTML = `Position sélectionnée: ${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
            window.tempLocation = { lat: e.latlng.lat, lng: e.latlng.lng };
        });
        
        if (userLocation.lat && userLocation.lng) {
            document.getElementById('locationCoords').innerHTML = `Position enregistrée: ${userLocation.lat.toFixed(6)}, ${userLocation.lng.toFixed(6)}`;
        }
    }
    
    function getCurrentLocation() {
        if (!navigator.geolocation) {
            alert("La géolocalisation n'est pas supportée par votre navigateur");
            return;
        }
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                if (locationMarker) locationMarker.setLatLng([lat, lng]);
                if (locationMap) locationMap.setView([lat, lng], 15);
                document.getElementById('locationCoords').innerHTML = `Position actuelle: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                window.tempLocation = { lat, lng };
                alert("Position actuelle obtenue ! Vous pouvez maintenant l'enregistrer.");
            },
            (error) => {
                alert("Impossible d'obtenir votre position: " + error.message);
            }
        );
    }
    
    function saveUserLocation() {
        if (!window.tempLocation && !locationMarker) {
            alert("Veuillez d'abord sélectionner une position sur la carte");
            return;
        }
        const pos = window.tempLocation || locationMarker.getLatLng();
        const city = document.querySelector('#profileTabLocation .info-value')?.innerText.split(',')[0] || 'Brazzaville';
        
        const locationData = {
            lat: pos.lat,
            lng: pos.lng,
            city: city,
            quartier: document.querySelector('#profileTabLocation .info-value:nth-child(2)')?.innerText || '',
            address: document.querySelector('#profileTabLocation .info-value:first-child')?.innerText || '',
            phone: document.querySelector('#profileTabInfo .info-value:nth-child(2)')?.innerText || ''
        };
        
        saveUserData({ location: locationData });
        alert("✅ Position enregistrée avec succès ! Les livreurs pourront maintenant vous localiser précisément.");
        showProfile();
    }
    
    function getUserData() {
        const allUsers = JSON.parse(localStorage.getItem('ouenze_all_users') || '[]');
        const user = allUsers.find(u => u.email === currentUser?.email);
        return user || {};
    }
    
    function saveUserData(updates) {
        const allUsers = JSON.parse(localStorage.getItem('ouenze_all_users') || '[]');
        const index = allUsers.findIndex(u => u.email === currentUser?.email);
        if (index !== -1) {
            allUsers[index] = { ...allUsers[index], ...updates };
            localStorage.setItem('ouenze_all_users', JSON.stringify(allUsers));
        }
        if (updates.fullName) currentUser.name = updates.fullName;
        if (updates.profilePhoto) currentUser.profilePhoto = updates.profilePhoto;
        saveData();
    }
    
    function editField(field) {
        const userData = getUserData();
        let currentValue = '';
        let inputType = 'text';
        let placeholder = '';
        
        switch(field) {
            case 'fullName': currentValue = userData.fullName || ''; placeholder = "Nom complet"; break;
            case 'phone': currentValue = userData.phone || ''; placeholder = "+242 06 XX XX XX"; inputType = "tel"; break;
            default: return;
        }
        
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>Modifier ${field === 'fullName' ? 'le nom' : 'le téléphone'}</h3>
                <div class="form-group"><input type="${inputType}" id="editValue" value="${escapeHtml(currentValue)}" placeholder="${placeholder}"></div>
                <button class="btn-submit" onclick="saveFieldValue('${field}')">Enregistrer</button>
                <button class="btn-submit btn-secondary" style="margin-top:8px; background:var(--gray-100); color:var(--gray-700);" onclick="this.closest('.modal').remove()">Annuler</button>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    function saveFieldValue(field) {
        const value = document.getElementById('editValue')?.value.trim();
        if (!value) { alert("Veuillez remplir le champ"); return; }
        
        let updates = {};
        if (field === 'fullName') updates.fullName = value;
        else if (field === 'phone') updates.phone = value;
        
        saveUserData(updates);
        document.querySelector('.modal')?.remove();
        showProfile();
    }
    
    function editProfilePhoto() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => saveUserData({ profilePhoto: ev.target.result });
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    
    function renderPaymentMethods() {
        const container = document.getElementById('paymentMethodsList');
        if (!container) return;
        const userData = getUserData();
        const methods = userData.paymentMethods || [];
        
        if (methods.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--gray-500);">Aucun moyen de paiement enregistré</div>';
            return;
        }
        
        container.innerHTML = methods.map((method, idx) => {
            let icon = '<i class="fas fa-credit-card"></i>';
            let displayInfo = '';
            if (method.type === 'mtn') { icon = '<i class="fas fa-mobile-alt"></i>'; displayInfo = method.number || ''; }
            else if (method.type === 'airtel') { icon = '<i class="fas fa-mobile-alt"></i>'; displayInfo = method.number || ''; }
            else if (method.type === 'paypal') { icon = '<i class="fab fa-paypal"></i>'; displayInfo = method.details || ''; }
            else if (method.type === 'visa') { icon = '<i class="fab fa-cc-visa"></i>'; displayInfo = `**** ${method.cardNumber?.slice(-4) || ''}`; }
            else if (method.type === 'mastercard') { icon = '<i class="fab fa-cc-mastercard"></i>'; displayInfo = `**** ${method.cardNumber?.slice(-4) || ''}`; }
            
            return `<div class="payment-item"><div class="payment-info"><div class="payment-icon">${icon}</div><div class="payment-details"><strong>${method.type === 'mtn' ? 'MTN' : method.type === 'airtel' ? 'Airtel' : method.type === 'paypal' ? 'PayPal' : method.type === 'visa' ? 'VISA' : 'Mastercard'}</strong><span>${escapeHtml(displayInfo)}</span></div></div><div class="payment-actions"><button onclick="editPaymentMethod(${idx})" style="color:var(--primary);"><i class="fas fa-edit"></i></button><button onclick="deletePaymentMethod(${idx})" style="color:var(--danger);"><i class="fas fa-trash"></i></button></div></div>`;
        }).join('');
    }
    
    function showAddPaymentModal() {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>Ajouter un moyen de paiement</h3>
                <div class="form-group"><label>Type</label><select id="paymentType"><option value="visa">VISA</option><option value="mastercard">Mastercard</option><option value="mtn">MTN Mobile Money</option><option value="airtel">Airtel Money</option><option value="paypal">PayPal</option></select></div>
                <div id="paymentTypeFields"><div class="form-group"><label>Numéro</label><input type="text" id="cardNumber" placeholder="XXXX XXXX XXXX XXXX"></div></div>
                <button class="btn-submit" onclick="addPaymentMethod()">Ajouter</button>
                <button class="btn-submit btn-secondary" style="margin-top:8px;" onclick="this.closest('.modal').remove()">Annuler</button>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    function addPaymentMethod() {
        const type = document.getElementById('paymentType').value;
        let method = { type };
        if (type === 'visa' || type === 'mastercard') {
            const cardNumber = document.getElementById('cardNumber')?.value.replace(/\s/g, '');
            if (!cardNumber || cardNumber.length !== 16) { alert("Numéro de carte invalide"); return; }
            method.cardNumber = cardNumber;
        } else {
            const number = document.getElementById('cardNumber')?.value.trim();
            if (!number) { alert("Numéro requis"); return; }
            method.number = number;
        }
        const userData = getUserData();
        const methods = userData.paymentMethods || [];
        methods.push(method);
        saveUserData({ paymentMethods: methods });
        document.querySelector('.modal')?.remove();
        showProfile();
    }
    
    function editPaymentMethod(index) {
        const userData = getUserData();
        const method = userData.paymentMethods?.[index];
        if (!method) return;
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-card"><h3>Modifier</h3><div class="form-group"><input type="text" id="editValue" value="${escapeHtml(method.number || method.cardNumber || '')}"></div><button class="btn-submit" onclick="updatePaymentMethod(${index})">Enregistrer</button><button class="btn-submit btn-secondary" onclick="this.closest('.modal').remove()">Annuler</button></div>`;
        document.body.appendChild(modal);
    }
    
    function updatePaymentMethod(index) {
        const value = document.getElementById('editValue')?.value.trim();
        if (!value) { alert("Veuillez remplir le champ"); return; }
        const userData = getUserData();
        const method = userData.paymentMethods?.[index];
        if (method) {
            if (method.number) method.number = value;
            else if (method.cardNumber) method.cardNumber = value.replace(/\s/g, '');
            saveUserData({ paymentMethods: userData.paymentMethods });
        }
        document.querySelector('.modal')?.remove();
        showProfile();
    }
    
    function deletePaymentMethod(index) {
        if (confirm("Supprimer ce moyen de paiement ?")) {
            const userData = getUserData();
            userData.paymentMethods.splice(index, 1);
            saveUserData({ paymentMethods: userData.paymentMethods });
            showProfile();
        }
    }
    
    function renderProfileOrders() {
        const container = document.getElementById('profileOrdersList');
        if (!container) return;
        const userOrders = orders.filter(o => o.userId === currentUser?.email);
        if (userOrders.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px;">Aucune commande</div>';
            return;
        }
        container.innerHTML = userOrders.map(o => `<div class="commande-item"><div><strong>${o.id}</strong> - ${new Date(o.date).toLocaleDateString()}</div><div>${o.items?.length || 0} article(s) - ${o.total?.toLocaleString() || '0'} FCFA</div><div style="color:var(--success);">${o.status || 'Confirmée'}</div><button onclick="viewOrderMap('${o.id}')" style="margin-top:8px; background:var(--primary); color:white; border:none; padding:4px 12px; border-radius:20px; cursor:pointer; font-size:10px;"><i class="fas fa-map-marker-alt"></i> Voir itinéraire</button></div>`).join('');
    }
    
    // ============ AUTHENTIFICATION ============
    function openLoginModal() {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-card"><h3>Connexion</h3><div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div><div class="form-group"><input type="password" id="loginPassword" placeholder="Mot de passe"></div><button class="btn-submit" onclick="doLogin()">Se connecter</button><div style="text-align:center;margin-top:12px;"><a onclick="this.closest('.modal').remove();openRegisterModal()" style="color:var(--primary);cursor:pointer;">Créer un compte</a></div></div>`;
        document.body.appendChild(modal);
    }
    
    function doLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const allUsers = JSON.parse(localStorage.getItem('ouenze_all_users') || '[]');
        const user = allUsers.find(u => u.email === email && u.password === password);
        if (!user) { alert("Email ou mot de passe incorrect"); return; }
        currentUser = { name: user.fullName || user.name, email: user.email, type: user.accountType || 'client', profilePhoto: user.profilePhoto };
        saveData();
        updateHeaderUI();
        document.querySelector('.modal')?.remove();
        resetToHome();
        alert(`Bienvenue ${currentUser.name}`);
    }
    
    function openRegisterModal() {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-card"><h3>Inscription</h3><div class="form-group"><input type="text" id="regName" placeholder="Nom complet"></div><div class="form-group"><input type="email" id="regEmail" placeholder="Email"></div><div class="form-group"><input type="tel" id="regPhone" placeholder="Téléphone"></div><div class="form-group"><input type="password" id="regPassword" placeholder="Mot de passe"></div><div class="form-group"><select id="regType"><option value="client">Client</option><option value="vendeur">Vendeur</option><option value="livreur">Livreur</option></select></div><button class="btn-submit" onclick="doRegister()">S'inscrire</button></div>`;
        document.body.appendChild(modal);
    }
    
    function doRegister() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const password = document.getElementById('regPassword').value;
        const type = document.getElementById('regType').value;
        if (!name || !email || !phone || !password) { alert("Tous les champs sont requis"); return; }
        const allUsers = JSON.parse(localStorage.getItem('ouenze_all_users') || '[]');
        if (allUsers.find(u => u.email === email)) { alert("Email déjà utilisé"); return; }
        const newUser = { fullName: name, email, phone, password, accountType: type, paymentMethods: [], location: null };
        allUsers.push(newUser);
        localStorage.setItem('ouenze_all_users', JSON.stringify(allUsers));
        currentUser = { name, email, type };
        saveData();
        updateHeaderUI();
        document.querySelector('.modal')?.remove();
        resetToHome();
        alert(`Inscription réussie ! Bienvenue ${name}`);
    }
    
    function updateHeaderUI() {
        const container = document.getElementById('headerActions');
        if (currentUser) {
            container.innerHTML = `<div class="user-menu" onclick="showProfile()"><div class="user-avatar">${currentUser.profilePhoto ? `<img src="${currentUser.profilePhoto}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : currentUser.name.charAt(0)}</div><div class="user-info"><div>${currentUser.name.split(' ')[0]}</div><small>${currentUser.type}</small></div><button onclick="event.stopPropagation();logout()" style="background:none;border:none;cursor:pointer;margin-left:4px;"><i class="fas fa-sign-out-alt"></i></button></div><div class="cart-icon" onclick="showCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count">${cart.reduce((s,i)=>s+i.quantity,0)}</span></div>`;
        } else {
            container.innerHTML = `<button class="auth-btn" onclick="openLoginModal()">Connexion</button><button class="auth-btn" onclick="openRegisterModal()">Inscription</button><div class="cart-icon" onclick="showCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count">0</span></div>`;
        }
        updateCartCount();
        updateVendorLink();
    }
    
    function logout() { currentUser = null; saveData(); updateHeaderUI(); resetToHome(); alert("Déconnexion réussie"); }
    
    function resetToHome() {
        const url = new URL(window.location.href);
        url.searchParams.delete('id');
        window.history.pushState({}, '', url);
        showHomePage();
    }
    
    function showAbout() { alert("À propos - Ouenze Marketplace Congo Brazzaville"); }
    function showHelp() { alert("Aide - Contactez-nous au +242 12345678"); }
    function showInvest() { alert("Investir dans Ouenze - Devenez partenaire"); }
    function showTracking() { alert("Suivi de livraison - Entrez votre numéro de commande"); }
    
    // Fonctions pour les livreurs
    function showDeliveryOrders() {
        const pendingOrders = orders.filter(o => o.status === 'confirmée');
        if (pendingOrders.length === 0) {
            document.getElementById('appContainer').innerHTML = `<div class="cart-container"><h3>Aucune commande en attente de livraison</h3><button onclick="resetToHome()" class="btn-submit">Retour</button></div>`;
            return;
        }
        document.getElementById('appContainer').innerHTML = `
            <div class="cart-container">
                <h2>Commandes à livrer</h2>
                ${pendingOrders.map(order => `
                    <div style="border:1px solid var(--gray-200);border-radius:12px;padding:12px;margin-bottom:12px;">
                        <div><strong>#${order.id}</strong> - ${new Date(order.date).toLocaleDateString()}</div>
                        <div>Client: ${order.userName}</div>
                        <div>Livraison: ${order.deliveryInfo?.quartier}, ${order.deliveryInfo?.city}</div>
                        <div>Total: ${order.total.toLocaleString()} FCFA</div>
                        <button onclick="acceptDelivery('${order.id}')" style="margin-top:8px; background:var(--success); color:white; border:none; padding:6px 12px; border-radius:20px; cursor:pointer;">Accepter la livraison</button>
                    </div>
                `).join('')}
                <button onclick="resetToHome()" class="btn-submit">Retour</button>
            </div>
        `;
    }
    
    // Initialisation
    window.showHomePage = showHomePage;
    window.viewShopDetail = viewShopDetail;
    window.openProductModal = openProductModal;
    window.addToCart = addToCart;
    window.setRanking = setRanking;
    window.resetToHome = resetToHome;
    window.performSearch = performSearch;
    window.goToVendorDashboard = goToVendorDashboard;
    window.showCart = showCart;
    window.showMyOrders = showMyOrders;
    window.updateQuantity = updateQuantity;
    window.removeFromCart = removeFromCart;
    window.showCheckout = showCheckout;
    window.validateAndPay = validateAndPay;
    window.showProfile = showProfile;
    window.editField = editField;
    window.saveFieldValue = saveFieldValue;
    window.editProfilePhoto = editProfilePhoto;
    window.editPaymentMethod = editPaymentMethod;
    window.updatePaymentMethod = updatePaymentMethod;
    window.deletePaymentMethod = deletePaymentMethod;
    window.showAddPaymentModal = showAddPaymentModal;
    window.addPaymentMethod = addPaymentMethod;
    window.acceptDelivery = acceptDelivery;
    window.viewOrderMap = viewOrderMap;
    window.openInGoogleMaps = openInGoogleMaps;
    window.getCurrentLocation = getCurrentLocation;
    window.saveUserLocation = saveUserLocation;
    window.showDeliveryOrders = showDeliveryOrders;
    window.showAbout = showAbout;
    window.showHelp = showHelp;
    window.showInvest = showInvest;
    window.showTracking = showTracking;
    
    document.addEventListener('DOMContentLoaded', () => {
        updateHeaderUI();
        const urlParams = new URLSearchParams(window.location.search);
        const shopId = parseInt(urlParams.get('id'));
        if (shopId && shops.find(s => s.id === shopId)) viewShopDetail(shopId);
        else showHomePage();
        
        document.getElementById('searchBtn').addEventListener('click', performSearch);
        document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') performSearch(); });
        
        const dropBtn = document.getElementById('dropdownBtn');
        const dropCont = document.getElementById('dropdownContent');
        if(dropBtn) {
            dropBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropCont.classList.toggle('show');
            });
            window.addEventListener('click', () => dropCont.classList.remove('show'));
        }
        
        const modalDiv = document.createElement('div');
        modalDiv.id = 'registerModal';
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-card"><div class="step-indicator"><div class="step">1. Informations</div><div class="step">2. Vérification</div><div class="step">3. Validation</div></div><div id="stepContent"></div></div>`;
        document.body.appendChild(modalDiv);
    });
</script>
</body>
