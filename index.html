<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ouenze | Marketplace Congo Brazzaville</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon/Icon.png">
    <link rel="apple-touch-icon" href="favicon/Icon.png">
    <!-- Polices et bibliothèques externes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <!-- Styles personnalisés -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
    <div class="header-top">
        <div class="logo" onclick="resetToHome()">
            <h1>OUENZE</h1>
            <span>Congo Brazzaville</span>
        </div>
        <div class="header-actions" id="headerActions"></div>
    </div>
    <div class="search-wrapper">
        <div class="search-tabs">
            <span class="search-tab active" data-type="all">Tous</span>
            <span class="search-tab" data-type="shop">Boutiques</span>
            <span class="search-tab" data-type="product">Produits</span>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Rechercher boutique ou produit...">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
    </div>
</div>

<div class="nav-row">
    <div class="nav-container">
        <div class="nav-links">
            <a href="#" onclick="resetToHome()" class="active">Accueil</a>
            <a href="#" onclick="resetToHome()">Boutiques</a>
            <a href="#" onclick="showCart()">Panier (<span id="cartCountHeader">0</span>)</a>
            <a href="#" onclick="showMyOrders()">Commandes</a>
            <a href="#" onclick="showProfile()">Mon Profil</a>
            <a href="vendor-dashboard.html" id="vendorLink" style="display:none;">Ma boutique</a>
            <a href="delivery-dashboard.html" id="deliveryDashboardLink" style="display:none;">Mes livraisons</a>
            <a href="delivery-register.html">Devenir livreur</a>
        </div>
        <div class="dropdown">
            <button class="dropdown-btn" id="dropdownBtn"><i class="fas fa-bars"></i> Menu</button>
            <div class="dropdown-content" id="dropdownContent">
                <a href="about.html">À propos</a>
                <a href="help.html">Aide</a>
                <a href="invest.html">Investir</a>
                <a href="tracking.html">Suivi livraison</a>
            </div>
        </div>
    </div>
</div>

<div id="appContainer" class="main"></div>

<div class="footer">
    
<!-- ============================================================
     SCRIPTS - ORDRE CORRECT
     ============================================================ -->

<!-- 1. SDK Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2. Configuration Supabase -->
<script src="js/supabase-config.js"></script>

<!-- 3. database.js ⚠️ AJOUTE CETTE LIGNE -->
<script src="js/database.js"></script>

<!-- 4. Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- 5. Autres scripts -->
<script src="js/script.js"></script>

<!-- 6. app.js -->
<script src="js/app.js"></script>
</body>
</html>
