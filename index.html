<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ouenze | Marketplace Congo Brazzaville</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1e293b; }
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --white: #ffffff;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-500: #64748b;
            --gray-700: #334155;
            --gold: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        /* Styles existants conservés */
        .header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 10px 16px; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
        .logo h1 { font-size: 20px; font-weight: 800; color: var(--primary); cursor: pointer; }
        .logo span { font-size: 9px; color: var(--gray-500); display: block; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .cart-icon { position: relative; cursor: pointer; font-size: 18px; color: var(--primary); }
        .cart-count { position: absolute; top: -6px; right: -10px; background: var(--danger); color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center; }
        .auth-btn { padding: 5px 12px; border-radius: 30px; font-size: 11px; font-weight: 500; cursor: pointer; background: var(--gray-100); border: none; }
        .user-menu { display: flex; align-items: center; gap: 8px; background: var(--gray-100); padding: 4px 10px; border-radius: 30px; cursor: pointer; }
        .user-avatar { width: 28px; height: 28px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 12px; }
        .user-info { font-size: 11px; line-height: 1.2; }
        .user-info small { font-size: 9px; color: var(--gray-500); }
        
        .search-wrapper { width: 100%; }
        .search-tabs { display: flex; gap: 6px; margin-bottom: 6px; }
        .search-tab { padding: 3px 10px; font-size: 10px; background: var(--gray-100); border-radius: 20px; cursor: pointer; color: var(--gray-500); }
        .search-tab.active { background: var(--primary); color: white; }
        .search-bar { display: flex; background: var(--gray-100); border-radius: 30px; border: 1px solid var(--gray-200); }
        .search-bar input { flex: 1; padding: 8px 14px; border: none; outline: none; background: transparent; font-size: 13px; }
        .search-bar button { background: none; border: none; padding: 0 12px; color: var(--primary); cursor: pointer; }
        
        .nav-row {
            border-top: 1px solid var(--border);
            background: var(--white);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            padding: 10px 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gray);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-btn {
            background: none;
            border: none;
            padding: 10px 0;
            font-size: 13px;
            cursor: pointer;
            color: var(--gray);
        }

        .dropdown-content {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--white);
            min-width: 200px;
            border: 1px solid var(--border);
            border-radius: 12px;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            z-index: 100;
        }

        .dropdown-content.show {
            opacity: 1;
            visibility: visible;
        }

        .dropdown-content a {
            display: block;
            padding: 12px 18px;
            text-decoration: none;
            color: var(--black);
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        
         .main { max-width: 1200px; margin: 16px auto; padding: 0 16px; }
        
        .ranking-bar { background: var(--white); border-radius: 16px; padding: 10px 16px; margin-bottom: 16px; border: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .ranking-filters { display: flex; gap: 8px; flex-wrap: wrap; }
        .ranking-btn { background: none; border: none; padding: 4px 8px; cursor: pointer; font-size: 11px; border-radius: 20px; color: var(--gray-500); }
        .ranking-btn.active { background: var(--primary); color: white; }
        .rating-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 20px; font-size: 9px; }
        .rating-badge.gold { background: #fef3c7; color: #b45309; }
        .rating-badge.silver { background: #f1f5f9; color: #475569; }
        .rating-badge.bronze { background: #ffedd5; color: #9a3412; }
        
        .shops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .shop-card { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-200); overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .shop-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .certification-badge { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: white; font-size: 12px; }
        .certification-badge.blue { background: var(--primary); color: white; }
        .certification-badge.gold { background: var(--gold); color: white; }
        .shop-logo-area { background: linear-gradient(135deg, #f8fafc, #f1f5f9); padding: 20px; text-align: center; }
        .shop-logo-img { width: 70px; height: 70px; margin: 0 auto; background: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--gray-200); }
        .shop-logo-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .shop-name { margin-top: 10px; font-size: 16px; font-weight: 700; }
        .shop-rating { margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 4px; font-size: 11px; }
        .stars { color: var(--gold); font-size: 10px; }
        .shop-details { padding: 12px; }
        .shop-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .metric { text-align: center; padding: 6px; background: var(--gray-100); border-radius: 10px; font-size: 10px; }
        .metric-value { font-weight: 700; font-size: 14px; color: var(--primary); }
        
        .back-btn { background: none; border: none; color: var(--primary); cursor: pointer; margin-bottom: 12px; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
        .shop-header-custom { background: linear-gradient(135deg, var(--primary-color, #1e40af), var(--primary-color, #1e40af)aa); border-radius: 20px; padding: 20px; margin-bottom: 20px; color: white; }
        .shop-header-content { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .shop-logo-large { width: 60px; height: 60px; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 12px; }
        .shop-logo-large img { width: 100%; height: 100%; object-fit: contain; }
        .shop-info h1 { font-size: 20px; margin-bottom: 2px; }
        .shop-info p { font-size: 11px; opacity: 0.9; }
        .share-link { background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 10px; border-radius: 30px; font-size: 10px; cursor: pointer; margin-top: 6px; display: inline-flex; align-items: center; gap: 4px; }
        
        .shop-menu { background: var(--menu-bg, #1e40af); color: var(--menu-text, white); border-radius: var(--menu-radius, 0px); margin-bottom: 16px; }
        .shop-menu-horizontal { display: flex; gap: 12px; flex-wrap: wrap; padding: 6px 12px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .shop-menu-vertical { width: 100%; float: none; margin-bottom: 12px; padding: 6px; overflow-x: auto; white-space: nowrap; }
        .shop-menu-item { position: relative; cursor: pointer; padding: 4px 0; font-size: 11px; display: inline-block; margin-right: 12px; }
        .shop-submenu { position: absolute; top: 100%; left: 0; background: var(--menu-bg); min-width: 130px; border-radius: 6px; padding: 4px 0; display: none; z-index: 100; }
        .shop-menu-item:hover .shop-submenu { display: block; }
        .shop-submenu-item { padding: 4px 10px; white-space: nowrap; font-size: 10px; }
        
        .carousel-container { position: relative; margin-bottom: 16px; overflow: hidden; border-radius: var(--carousel-radius, 12px); }
        .carousel-slide { display: none; width: 100%; height: var(--carousel-height, 200px); object-fit: cover; }
        .carousel-slide.active { display: block; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 12px; }
        .carousel-prev { left: 8px; }
        .carousel-next { right: 8px; }
        .carousel-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .carousel-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; }
        .carousel-dot.active { background: white; }
        
        .categories-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; clear: both; overflow-x: auto; padding-bottom: 4px; }
        .category-btn { padding: 4px 12px; background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 30px; cursor: pointer; font-size: 11px; white-space: nowrap; }
        .category-btn.active { background: var(--primary-color, #1e40af); color: white; }
        
        .products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .product-card { background: var(--white); border-radius: var(--product-radius, 12px); border: 1px solid var(--gray-200); overflow: hidden; cursor: pointer; transition: 0.2s; }
        .product-card:hover { transform: translateY(-2px); }
        .product-image { width: 100%; height: var(--product-img-height, 130px); object-fit: cover; }
        .product-info { padding: 8px; }
        .product-title { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
        .product-price { font-size: 14px; font-weight: 700; color: var(--primary-color, #1e40af); margin: 4px 0; }
        .product-stock { font-size: 9px; color: var(--gray-500); margin-bottom: 4px; }
        .product-badge { display: inline-block; background: #eef2ff; color: var(--primary); padding: 2px 6px; border-radius: 20px; font-size: 8px; margin-bottom: 4px; }
        .btn-add-cart { background: var(--button-color, #1e40af); color: white; border: none; padding: 5px; border-radius: var(--product-radius, 8px); font-weight: 500; cursor: pointer; width: 100%; font-size: 10px; }
        
        .reviews-section { background: var(--white); border-radius: 16px; padding: 16px; border: 1px solid var(--gray-200); margin-top: 16px; clear: both; }
        .reviews-section h3 { font-size: 13px; margin-bottom: 10px; }
        .review-item { padding: 8px 0; border-bottom: 1px solid var(--gray-200); }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; flex-wrap: wrap; gap: 4px; }
        .review-user { font-weight: 600; font-size: 11px; }
        .review-stars { color: var(--gold); font-size: 9px; }
        .review-date { font-size: 8px; color: var(--gray-500); }
        .review-comment { font-size: 11px; color: var(--gray-700); margin-top: 3px; }
        
        .product-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 12px; }
        .product-modal-content { background: var(--white); border-radius: 20px; max-width: 95%; width: 100%; max-height: 90vh; overflow-y: auto; cursor: default; padding: 16px; }
        .product-modal-body { display: flex; flex-direction: column; gap: 16px; }
        @media (min-width: 600px) { .product-modal-body { flex-direction: row; } .product-modal-body > div { flex: 1; } }
        .product-main-image { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; background: var(--gray-100); }
        .product-thumbnails { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .product-thumbnail { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .product-thumbnail.active { border-color: var(--primary); }
        .food-details { background: var(--gray-100); padding: 8px; border-radius: 10px; margin: 10px 0; font-size: 10px; }
        .variant-option { display: inline-block; margin: 3px; padding: 3px 8px; background: var(--gray-100); border-radius: 20px; cursor: pointer; font-size: 10px; }
        .btn-modal-add { background: var(--button-color, #1e40af); color: white; border: none; padding: 10px; border-radius: 40px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 12px; font-size: 12px; }
        
        .cart-container { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-200); padding: 20px; margin-bottom: 20px; }
        .cart-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; }
        .cart-item-info { flex: 1; }
        .cart-total { text-align: right; padding: 16px; font-size: 18px; font-weight: 700; border-top: 1px solid var(--gray-200); margin-top: 16px; }
        .payment-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 20px 0; }
        .payment-option { padding: 12px; background: var(--gray-100); border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .payment-option.selected { border-color: var(--primary); background: #eef2ff; }
        .card-details { background: var(--gray-100); border-radius: 12px; padding: 16px; margin-top: 12px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-card { background: var(--white); border-radius: 24px; width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; padding: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--gray-700); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--gray-200); border-radius: 10px; font-size: 13px; font-family: inherit; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .step-indicator { display: flex; gap: 8px; margin-bottom: 20px; }
        .step { flex: 1; text-align: center; padding: 8px; background: var(--gray-100); border-radius: 30px; font-size: 11px; font-weight: 500; color: var(--gray-500); }
        .step.active { background: var(--primary); color: white; }
        .step.completed { background: var(--success); color: white; }
        .step.error { background: var(--danger); color: white; }
        .btn-next, .btn-submit { padding: 12px; border-radius: 40px; font-weight: 600; border: none; cursor: pointer; background: var(--primary); color: white; width: 100%; font-size: 13px; transition: 0.2s; }
        .btn-next:hover, .btn-submit:hover { background: var(--primary-dark); }
        .btn-prev { background: var(--gray-100); color: var(--gray-700); width: 48%; padding: 12px; border-radius: 40px; font-weight: 500; border: none; cursor: pointer; transition: 0.2s; }
        .btn-prev:hover { background: var(--gray-200); }
        .button-group { display: flex; gap: 12px; margin-top: 16px; }
        .error-message { color: var(--danger); font-size: 11px; margin-top: 4px; display: none; }
        .error-message.show { display: block; }
        .success-message { color: var(--success); font-size: 11px; margin-top: 4px; }
        .info-text { font-size: 11px; color: var(--gray-500); margin-top: 4px; }
        .file-info { font-size: 10px; color: var(--gray-500); margin-top: 4px; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; }
        .status-pending { background: #fef3c7; color: #b45309; }
        .status-verified { background: #d1fae5; color: #059669; }
        .status-suspended { background: #fee2e2; color: #dc2626; }
        
        .footer { border-top: 1px solid var(--gray-200); background: var(--white); margin-top: 32px; padding: 16px; text-align: center; font-size: 10px; color: var(--gray-500); }
        
        /* Styles pour la carte */
        .location-map { height: 350px; border-radius: 16px; margin: 15px 0; z-index: 1; }
        .location-actions { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .location-actions button { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 30px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 8px; }
        .location-actions button i { font-size: 14px; }
        .location-info { background: var(--gray-100); padding: 12px; border-radius: 12px; margin: 10px 0; font-size: 12px; text-align: center; }
        .gps-link { display: inline-flex; align-items: center; gap: 6px; background: var(--success); color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-size: 12px; margin: 5px; }
        .shop-location-badge { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 2px 8px; font-size: 10px; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
        
        @media (max-width: 480px) {
            .shops-grid { grid-template-columns: 1fr; }
            .products-container { grid-template-columns: repeat(2, 1fr); }
            .dropdown-content { left: 0; right: auto; }
            .form-row { grid-template-columns: 1fr; gap: 8px; }
        }
    </style>
</head>

<div class="header">
    <div class="header-top">
        <div class="logo" onclick="resetToHome()">

            <span class="search-tab" data-type="product">Produits</span>

</div>
    </div>

<div class="nav-row">

            <div class="nav-links">
                 <a onclick="resetToHome()" class="active">Accueil</a>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ============ DONNÉES ============
    let currentUser = JSON.parse(localStorage.getItem('ouenze_current_user') || 'null');
    let shops = JSON.parse(localStorage.getItem('ouenze_shops') || '[]');
    let orders = JSON.parse(localStorage.getItem('ouenze_orders') || '[]');
    let cart = JSON.parse(localStorage.getItem('ouenze_cart') || '[]');
    let deliveryDrivers = JSON.parse(localStorage.getItem('ouenze_delivery_drivers') || '[]');
    let currentRanking = 'rating';
    let currentShop = null;
    let currentCategory = 'all';
    let carouselInterval = null;
    let selectedPayment = null;
    let lastAttemptTime = 0;
    let attemptCount = 0;
    let currentLocationMap = null;
    let currentLocationMarker = null;
    let tempDeliveryLocation = null;
    
    const DEFAULT_LAT = -4.2634;
    const DEFAULT_LNG = 15.2429;
    
    // ============ FONCTIONS DE BASE ============
    function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
    function validatePhone(phone) { return /^(\+242|0)[56]\d{8}$/.test(phone.replace(/\s/g, '')); }
    function sendEmail(to, subject, body) { console.log(`📧 ${subject} -> ${to}`); return true; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    // ============ BOUTIQUES INIT ============
    if (shops.length === 0) {
        shops = [
            { id: 1, name: "Élégance Africaine", city: "Brazzaville", quartier: "Moungali", rating: 5.0, totalRatings: 342, totalSales: 1250, 
              products: [{ id: 1, name: "Boubou Cérémonie", price: "65000", photos: [], stock: 25, colors: ["Or", "Bleu Royal"], sizes: ["S", "M", "L", "XL"], description: "Boubou traditionnel", productType: "standard" }], 
              categories: ["Boubou", "Accessoires"], reviews: [{ user: "Marie K.", rating: 5, comment: "Superbe qualité !", date: "2024-03-15" }], verified: true,
              location: { lat: -4.2634, lng: 15.2429, address: "Moungali, Brazzaville" } },
            { id: 2, name: "Tech Congo", city: "Brazzaville", quartier: "Centre-ville", rating: 4.8, totalRatings: 124, totalSales: 342, 
              products: [{ id: 1, name: "Smartphone", price: "85000", photos: [], stock: 10, colors: ["Noir", "Bleu"], sizes: [], description: "Smartphone haute performance", productType: "standard" }], 
              categories: ["Electronique"], reviews: [], verified: true,
              location: { lat: -4.2690, lng: 15.2430, address: "Centre-ville, Brazzaville" } }
        ];
        localStorage.setItem('ouenze_shops', JSON.stringify(shops));
    }
    
    function saveData() {
        localStorage.setItem('ouenze_shops', JSON.stringify(shops));
        localStorage.setItem('ouenze_orders', JSON.stringify(orders));
        localStorage.setItem('ouenze_cart', JSON.stringify(cart));
        if (currentUser) localStorage.setItem('ouenze_current_user', JSON.stringify(currentUser));
        else localStorage.removeItem('ouenze_current_user');
        updateCartCount();
        updateVendorLink();
    }
    
    function updateCartCount() {
        const count = cart.reduce((s, i) => s + i.quantity, 0);
        document.querySelectorAll('#cartCountHeader, .cart-count').forEach(el => { if(el) el.innerText = count; });
    }
    
    function updateVendorLink() {
        const vendorLink = document.getElementById('vendorLink');
        const deliveryLink = document.getElementById('deliveryLink');
        if (currentUser && currentUser.type === 'vendeur') vendorLink.style.display = 'inline-block';
        else vendorLink.style.display = 'none';
        if (currentUser && currentUser.type === 'livreur') deliveryLink.style.display = 'inline-block';
        else deliveryLink.style.display = 'none';
    }
    
    function generateStars(rating) {
        const full = Math.floor(rating);
        let stars = '';
        for (let i = 0; i < full; i++) stars += '<i class="fas fa-star"></i>';
        if (rating % 1 >= 0.5) stars += '<i class="fas fa-star-half-alt"></i>';
        for (let i = 0; i < 5 - Math.ceil(rating); i++) stars += '<i class="far fa-star"></i>';
        return stars;
    }
    
    function sortShops(shopsList, sortBy) {
        return [...shopsList].sort((a, b) => {
            if (sortBy === 'rating') return (b.rating || 0) - (a.rating || 0);
            if (sortBy === 'sales') return (b.totalSales || 0) - (a.totalSales || 0);
            return 0;
        });
    }
    
    // ============ VUE ACCUEIL ============

        const rankedShops = sortShops(shops, currentRanking);
        document.getElementById('appContainer').innerHTML = `

                </div>
                <div style="display:flex; gap:6px;">
                    <span class="rating-badge gold"><i class="fas fa-crown"></i> Or</span>
                    <span class="rating-badge silver"><i class="fas fa-star"></i> Argent</span>
                    <span class="rating-badge bronze"><i class="fas fa-star-half-alt"></i> Bronze</span>

            </div>
            <div id="shopsGrid" class="shops-grid"></div>
        `;

    function setRanking(type) { currentRanking = type; showHomePage(); }
    
    function displayShops(shopsList) {

    // ============ VUE BOUTIQUE ============

    function openShopLocationMap(lat, lng, name) {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-card" style="max-width:700px;"><h3>Localisation - ${escapeHtml(name)}</h3><div id="shopLocationMap" style="height:400px; border-radius:12px;"></div><div class="location-actions"><button onclick="window.open('https://www.google.com/maps?q=${lat},${lng}', '_blank')" style="background:var(--success);"><i class="fab fa-google"></i> Ouvrir dans Google Maps</button><button onclick="this.closest('.modal').remove()">Fermer</button></div></div>`;
        document.body.appendChild(modal);
        setTimeout(() => {
            const map = L.map('shopLocationMap').setView([lat, lng], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(map);
            L.marker([lat, lng]).addTo(map).bindPopup(`<b>${escapeHtml(name)}</b>`).openPopup();
        }, 100);
    }
    
    function displayShopProducts() {
        const container = document.getElementById('shopProductsContainer');
        if (!container) return;
        let products = currentShop.products || [];
        if (currentCategory !== 'all') products = products.filter(p => p.category === currentCategory);
        if (!products.length) { container.innerHTML = '<div style="text-align:center;padding:30px;">Aucun produit</div>'; return; }
        container.innerHTML = products.map(p => `
            <div class="product-card" onclick="openProductModal(${currentShop.id}, ${p.id})">
                <img src="${p.photos?.[0] || 'https://via.placeholder.com/300x200'}" class="product-image">
                <div class="product-info">
                    <div class="product-title">${escapeHtml(p.name)}</div>
                    <div class="product-price">${p.price} FCFA</div>
                    <button class="btn-add-cart" onclick="event.stopPropagation();addToCart(${currentShop.id}, ${p.id}, '${escapeHtml(p.name)}', '${p.price}')">Ajouter</button>
                </div>
            </div>
        `).join('');
    }
    
    function openProductModal(shopId, productId) {
        const shop = shops.find(s => s.id === shopId);
        const product = shop?.products?.find(p => p.id === productId);
        if (!product) return;
        const modal = document.createElement('div'); modal.className = 'product-modal';
        modal.innerHTML = `<div class="product-modal-content"><div style="display:flex; justify-content:flex-end;"><span style="font-size:22px;cursor:pointer;" onclick="this.closest('.product-modal').remove()">&times;</span></div><div class="product-modal-body"><div><img src="${product.photos?.[0] || 'https://via.placeholder.com/300x200'}" class="product-main-image"></div><div><h2>${escapeHtml(product.name)}</h2><div class="product-price">${product.price} FCFA</div><div class="product-stock">Stock: ${product.stock || 0}</div><div class="product-description">${escapeHtml(product.description || '')}</div><button class="btn-modal-add" onclick="addToCartFromModal(${shop.id}, ${product.id}, '${escapeHtml(product.name)}', '${product.price}')">Ajouter au panier</button></div></div></div>`;
        document.body.appendChild(modal);
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }
    
    function addToCartFromModal(shopId, productId, productName, price) {
        if (!currentUser) { alert("Connectez-vous"); openLoginModal(); return; }
        addToCart(shopId, productId, productName, price);
        document.querySelector('.product-modal')?.remove();
    }
    
    function addToCart(shopId, productId, productName, price) {
        if (!currentUser) { alert("Connectez-vous"); openLoginModal(); return; }
        const existing = cart.find(i => i.productId === productId && i.shopId === shopId);
        if (existing) existing.quantity++;
        else cart.push({ productId, productName, price: parseFloat(price), quantity: 1, shopId, shopName: shops.find(s=>s.id===shopId)?.name });
        saveData();
        alert(`${productName} ajouté au panier`);
    }
    
    // ============ PANIER AVEC CARTE GPS ============
    function showCart() {
        if (cart.length === 0) {
            document.getElementById('appContainer').innerHTML = `<div class="cart-container" style="text-align:center;padding:40px;"><i class="fas fa-shopping-cart" style="font-size:48px;"></i><h3>Votre panier est vide</h3><button onclick="resetToHome()" class="btn-submit" style="margin-top:16px;">Continuer</button></div>`;
            return;
        }
        let subtotal = cart.reduce((s,i)=>s+i.price*i.quantity,0);
        let total = subtotal * 1.1;
        document.getElementById('appContainer').innerHTML = `
            <div class="cart-container"><h2>Mon panier</h2>
            ${cart.map((item, idx) => `<div class="cart-item"><div class="cart-item-info"><h4>${escapeHtml(item.productName)}</h4><div>${item.price} FCFA</div><div>${escapeHtml(item.shopName)}</div><div><button onclick="updateQuantity(${idx}, -1)">-</button> ${item.quantity} <button onclick="updateQuantity(${idx}, 1)">+</button> <button onclick="removeFromCart(${idx})"><i class="fas fa-trash"></i></button></div></div></div>`).join('')}
            <div class="cart-total"><div>Total: ${total.toLocaleString()} FCFA</div></div>
            <button class="btn-submit" onclick="showLocationSelection(${total})">Passer à la caisse</button>
            <button onclick="resetToHome()" style="margin-top:12px;">Continuer</button></div>`;
    }
    
    function updateQuantity(idx, delta) { cart[idx].quantity += delta; if (cart[idx].quantity <= 0) cart.splice(idx,1); saveData(); showCart(); }
    function removeFromCart(idx) { cart.splice(idx,1); saveData(); showCart(); }
    
    // ============ SÉLECTION DE LOCALISATION AVEC CARTE ============
    function showLocationSelection(total) {
        tempDeliveryLocation = null;
        document.getElementById('appContainer').innerHTML = `
            <div class="cart-container">
                <h2>📍 Où souhaitez-vous être livré ?</h2>
                <div class="info-text">Déplacez le marqueur ou cliquez sur la carte pour indiquer votre position exacte</div>
                <div id="deliveryLocationMap" class="location-map"></div>
                <div class="location-actions">
                    <button onclick="getCurrentUserLocation()"><i class="fas fa-location-dot"></i> Ma position actuelle</button>
                    <button onclick="searchAddressLocation()"><i class="fas fa-search"></i> Chercher une adresse</button>
                </div>
                <div id="locationInfo" class="location-info"></div>
                <div class="form-row">
                    <div class="form-group"><label>Ville</label><input type="text" id="deliveryCity" placeholder="Brazzaville"></div>
                    <div class="form-group"><label>Quartier</label><input type="text" id="deliveryQuartier" placeholder="Moungali"></div>
                </div>
                <div class="form-group"><label>Adresse détaillée</label><input type="text" id="deliveryAddress" placeholder="Rue, numéro, point de repère"></div>
                <div class="form-group"><label>Téléphone</label><input type="tel" id="deliveryPhone" placeholder="+242 06 XX XX XX"></div>
                <button class="btn-submit" onclick="goToPayment(${total})">Continuer vers paiement</button>
                <button onclick="showCart()" style="margin-top:12px;">Retour</button>
            </div>
        `;
        
        // Initialiser la carte
        setTimeout(() => {
            if (currentLocationMap) currentLocationMap.remove();
            currentLocationMap = L.map('deliveryLocationMap').setView([DEFAULT_LAT, DEFAULT_LNG], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(currentLocationMap);
            currentLocationMarker = L.marker([DEFAULT_LAT, DEFAULT_LNG], { draggable: true }).addTo(currentLocationMap);
            currentLocationMarker.on('dragend', function(e) {
                const pos = e.target.getLatLng();
                tempDeliveryLocation = { lat: pos.lat, lng: pos.lng };
                document.getElementById('locationInfo').innerHTML = `<i class="fas fa-check-circle" style="color:var(--success);"></i> Position sélectionnée: ${pos.lat.toFixed(6)}, ${pos.lng.toFixed(6)}`;
                reverseGeocode(pos.lat, pos.lng);
            });
            currentLocationMap.on('click', function(e) {
                currentLocationMarker.setLatLng(e.latlng);
                tempDeliveryLocation = { lat: e.latlng.lat, lng: e.latlng.lng };
                document.getElementById('locationInfo').innerHTML = `<i class="fas fa-check-circle" style="color:var(--success);"></i> Position sélectionnée: ${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
                reverseGeocode(e.latlng.lat, e.latlng.lng);
            });
        }, 100);
    }
    
    function getCurrentUserLocation() {
        if (!navigator.geolocation) { alert("Géolocalisation non supportée"); return; }
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                if (currentLocationMarker) currentLocationMarker.setLatLng([lat, lng]);
                if (currentLocationMap) currentLocationMap.setView([lat, lng], 15);
                tempDeliveryLocation = { lat, lng };
                document.getElementById('locationInfo').innerHTML = `<i class="fas fa-check-circle" style="color:var(--success);"></i> Position actuelle: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                reverseGeocode(lat, lng);
            },
            () => alert("Impossible d'obtenir votre position")
        );
    }
    
    function searchAddressLocation() {
        const address = prompt("Entrez votre adresse (ex: Moungali, Brazzaville)");
        if (!address) return;
        document.getElementById('locationInfo').innerHTML = `<i class="fas fa-spinner fa-spin"></i> Recherche en cours...`;
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`;
        fetch(url).then(r => r.json()).then(data => {
            if (data && data.length > 0) {
                const lat = parseFloat(data[0].lat), lng = parseFloat(data[0].lon);
                if (currentLocationMarker) currentLocationMarker.setLatLng([lat, lng]);
                if (currentLocationMap) currentLocationMap.setView([lat, lng], 15);
                tempDeliveryLocation = { lat, lng };
                document.getElementById('locationInfo').innerHTML = `<i class="fas fa-check-circle" style="color:var(--success);"></i> Adresse trouvée: ${data[0].display_name.substring(0, 100)}`;
            } else { document.getElementById('locationInfo').innerHTML = `<i class="fas fa-exclamation-triangle"></i> Adresse non trouvée`; }
        }).catch(() => { document.getElementById('locationInfo').innerHTML = `<i class="fas fa-exclamation-triangle"></i> Erreur de recherche`; });
    }
    
    function reverseGeocode(lat, lng) {
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
            .then(r => r.json()).then(data => {
                if (data && data.display_name) {
                    const cityInput = document.getElementById('deliveryCity');
                    if (cityInput && !cityInput.value) {
                        const cityMatch = data.display_name.match(/([^,]+),?.*(Brazzaville|Pointe-Noire)/i);
                        if (cityMatch) cityInput.value = cityMatch[2] || 'Brazzaville';
                    }
                }
            }).catch(() => {});
    }
    
    // ============ PAIEMENT ============
    function goToPayment(total) {
        if (!tempDeliveryLocation) { alert("Veuillez sélectionner votre position sur la carte"); return; }
        const city = document.getElementById('deliveryCity')?.value.trim() || 'Brazzaville';
        const quartier = document.getElementById('deliveryQuartier')?.value.trim() || '';
        const address = document.getElementById('deliveryAddress')?.value.trim() || '';
        const phone = document.getElementById('deliveryPhone')?.value.trim();
        if (!phone) { alert("Veuillez entrer votre numéro de téléphone"); return; }
        if (!validatePhone(phone)) { alert("Numéro invalide. Format: +242 06 XX XX XX"); return; }
        
        window.tempDeliveryInfo = { city, quartier, address, phone, location: tempDeliveryLocation };
        showPaymentSelection(total);
    }
    
    function showPaymentSelection(total) {
        selectedPayment = null;
        document.getElementById('appContainer').innerHTML = `
            <div class="cart-container">
                <h2>💳 Mode de paiement</h2>
                <div class="payment-options" id="paymentOptions">
                    <div class="payment-option" data-payment="card"><i class="fas fa-credit-card"></i> Carte bancaire</div>
                    <div class="payment-option" data-payment="mobile"><i class="fas fa-mobile-alt"></i> Mobile Money</div>
                    <div class="payment-option" data-payment="cash"><i class="fas fa-money-bill"></i> Espèce</div>
                </div>
                <div id="paymentDetailsContainer" style="display:none;"></div>
                <div class="cart-total">Total: ${total.toLocaleString()} FCFA</div>
                <button class="btn-submit" onclick="validateOrder(${total})">Confirmer la commande</button>
                <button onclick="showLocationSelection(${total})" style="margin-top:12px;">Retour</button>
            </div>
        `;
        document.querySelectorAll('.payment-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedPayment = opt.dataset.payment;
                showPaymentDetails(selectedPayment);
            });
        });
    }
    
    function showPaymentDetails(type) {
        const container = document.getElementById('paymentDetailsContainer');
        if (!container) return;
        if (type === 'card') {
            container.style.display = 'block';
            container.innerHTML = `<div class="card-details"><div class="form-group"><label>Nom sur la carte</label><input type="text" id="cardName" placeholder="JEAN DUPONT"></div><div class="form-group"><label>Numéro de carte</label><input type="text" id="cardNumber" maxlength="19" placeholder="XXXX XXXX XXXX XXXX"></div><div class="form-row"><div class="form-group"><label>Expiration</label><input type="text" id="cardExpiry" placeholder="MM/AA"></div><div class="form-group"><label>CVV</label><input type="password" id="cardCvv" maxlength="3" placeholder="XXX"></div></div></div>`;
        } else if (type === 'mobile') {
            container.style.display = 'block';
            container.innerHTML = `<div class="card-details"><div class="form-group"><label>Opérateur</label><select id="mobileOperator"><option value="mtn">MTN</option><option value="airtel">Airtel</option></select></div><div class="form-group"><label>Numéro</label><input type="tel" id="mobileNumber" placeholder="+242 06 XX XX XX"></div></div>`;
        } else if (type === 'cash') {
            container.style.display = 'block';
            container.innerHTML = `<div class="card-details"><p>💰 Paiement à la livraison en espèces</p></div>`;
        }
    }
    
    function validateOrder(total) {
        if (!selectedPayment) { alert("Choisissez un mode de paiement"); return; }
        if (selectedPayment === 'card') {
            const cardNumber = document.getElementById('cardNumber')?.value.replace(/\s/g, '');
            const cardExpiry = document.getElementById('cardExpiry')?.value;
            const cardCvv = document.getElementById('cardCvv')?.value;
            if (!cardNumber || cardNumber.length !== 16) { alert("Numéro de carte invalide"); return; }
            if (!/^\d{2}\/\d{2}$/.test(cardExpiry)) { alert("Date d'expiration invalide (MM/AA)"); return; }
            if (!cardCvv || cardCvv.length !== 3) { alert("CVV invalide"); return; }
        }
        if (selectedPayment === 'mobile') {
            const mobileNumber = document.getElementById('mobileNumber')?.value.trim();
            if (!mobileNumber || !validatePhone(mobileNumber)) { alert("Numéro Mobile Money invalide"); return; }
        }
        
        const orderId = 'CMD-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
        const subtotal = cart.reduce((s,i)=>s+i.price*i.quantity,0);
        const deliveryFees = subtotal * 0.1;
        
        // Récupérer les boutiques concernées
        const shopIds = [...new Set(cart.map(i => i.shopId))];
        const shopsInfo = shopIds.map(sid => {
            const shop = shops.find(s => s.id === sid);
            return { shopId: sid, shopName: shop?.name, shopLocation: shop?.location || null };
        });
        
        const newOrder = {
            id: orderId, userId: currentUser?.email, userName: currentUser?.name,
            items: cart.map(i => ({ productId: i.productId, productName: i.productName, price: i.price, quantity: i.quantity, shopId: i.shopId, shopName: i.shopName })),
            shops: shopsInfo,
            subtotal, deliveryFees, total: subtotal + deliveryFees,
            deliveryInfo: { ...window.tempDeliveryInfo },
            paymentMethod: selectedPayment,
            date: new Date().toISOString(), status: 'confirmée',
            statusHistory: [{ status: 'Commande confirmée', date: new Date().toISOString() }]
        };
        
        orders.push(newOrder);
        localStorage.setItem('ouenze_orders', JSON.stringify(orders));
        cart = [];
        saveData();
        
        // Générer les liens GPS pour le livreur
        let gpsLinks = [];
        shopsInfo.forEach(shop => {
            if (shop.shopLocation) {
                gpsLinks.push(`🛍️ ${shop.shopName}: https://www.google.com/maps?q=${shop.shopLocation.lat},${shop.shopLocation.lng}`);
            }
        });
        if (window.tempDeliveryInfo.location) {
            gpsLinks.push(`🏠 Client: https://www.google.com/maps?q=${window.tempDeliveryInfo.location.lat},${window.tempDeliveryInfo.location.lng}`);
        }
        
        const emailBody = `Bonjour,\n\nVotre commande #${orderId} a été confirmée.\nTotal: ${newOrder.total.toLocaleString()} FCFA\n\nItinéraire pour le livreur:\n${gpsLinks.join('\n')}\n\nMerci de votre confiance !`;
        sendEmail(currentUser?.email, `Confirmation #${orderId}`, emailBody);
        
        alert(`✅ Commande #${orderId} confirmée !\n\nTotal: ${newOrder.total.toLocaleString()} FCFA\n\nUn email avec les informations de livraison a été envoyé.`);
        resetToHome();
    }
    
    // ============ COMMANDES ET LIVRAISON ============
    function showMyOrders() {
        const userOrders = orders.filter(o => o.userId === currentUser?.email);
        if (userOrders.length === 0) {
            document.getElementById('appContainer').innerHTML = `<div class="cart-container"><h3>Aucune commande</h3><button onclick="resetToHome()" class="btn-submit">Retour</button></div>`;
            return;
        }
        document.getElementById('appContainer').innerHTML = `
            <div class="cart-container"><h2>Mes commandes</h2>
            ${userOrders.map(order => `
                <div style="border:1px solid var(--gray-200);border-radius:12px;padding:12px;margin-bottom:12px;">
                    <div><strong>#${order.id}</strong> - ${new Date(order.date).toLocaleDateString()}</div>
                    <div>Total: ${order.total.toLocaleString()} FCFA</div>
                    <div>Statut: <span style="color:var(--success);">${order.status}</span></div>
                    ${order.deliveryInfo?.location ? `<button onclick="viewOrderOnMap(${order.deliveryInfo.location.lat}, ${order.deliveryInfo.location.lng})" style="margin-top:8px;background:var(--primary);color:white;border:none;padding:4px 12px;border-radius:20px;cursor:pointer;"><i class="fas fa-map-marker-alt"></i> Voir ma position</button>` : ''}
                    <button onclick="trackOrder('${order.id}')" style="margin-top:8px;">Suivre la livraison</button>
                </div>
            `).join('')}
            <button onclick="resetToHome()" class="btn-submit">Continuer</button></div>`;
    }
    
    function viewOrderOnMap(lat, lng) {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-card" style="max-width:600px;"><h3>Ma position de livraison</h3><div id="orderMap" style="height:350px; border-radius:12px;"></div><button onclick="window.open('https://www.google.com/maps?q=${lat},${lng}', '_blank')" style="margin-top:10px;width:100%;">Ouvrir dans Google Maps</button><button onclick="this.closest('.modal').remove()">Fermer</button></div>`;
        document.body.appendChild(modal);
        setTimeout(() => {
            const map = L.map('orderMap').setView([lat, lng], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.marker([lat, lng]).addTo(map).bindPopup('📍 Votre position').openPopup();
        }, 100);
    }
    
    function trackOrder(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        let gpsLinks = [];
        if (order.shops) {
            order.shops.forEach(shop => {
                if (shop.shopLocation) gpsLinks.push(`🛍️ ${shop.shopName}: https://www.google.com/maps?q=${shop.shopLocation.lat},${shop.shopLocation.lng}`);
            });
        }
        if (order.deliveryInfo?.location) {
            gpsLinks.push(`🏠 Client: https://www.google.com/maps?q=${order.deliveryInfo.location.lat},${order.deliveryInfo.location.lng}`);
        }
        alert(`📍 Itinéraire de livraison:\n\n${gpsLinks.join('\n\n')}\n\n${order.status === 'confirmée' ? 'En attente d\'un livreur' : 'En cours de livraison'}`);
    }
    
    function showDeliveryDashboard() {
        if (!currentUser || currentUser.type !== 'livreur') { alert("Espace réservé aux livreurs"); return; }
        const pendingOrders = orders.filter(o => o.status === 'confirmée');
        if (pendingOrders.length === 0) {
            document.getElementById('appContainer').innerHTML = `<div class="cart-container"><h3>Aucune commande à livrer</h3><button onclick="resetToHome()">Retour</button></div>`;
            return;
        }
        document.getElementById('appContainer').innerHTML = `
            <div class="cart-container"><h2>📦 Commandes à livrer</h2>
            ${pendingOrders.map(order => `
                <div style="border:1px solid var(--gray-200);border-radius:12px;padding:12px;margin-bottom:12px;">
                    <div><strong>#${order.id}</strong> - ${new Date(order.date).toLocaleDateString()}</div>
                    <div>Client: ${order.userName}</div>
                    <div>Livraison: ${order.deliveryInfo?.quartier}, ${order.deliveryInfo?.city}</div>
                    <div>Total: ${order.total.toLocaleString()} FCFA</div>
                    <button onclick="showDeliveryRoute(${JSON.stringify(order).replace(/"/g, '&quot;')})" style="margin-top:8px;background:var(--primary);color:white;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;"><i class="fas fa-route"></i> Voir itinéraire</button>
                    <button onclick="acceptDeliveryOrder('${order.id}')" style="margin-top:8px;background:var(--success);color:white;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;">Accepter la livraison</button>
                </div>
            `).join('')}
            <button onclick="resetToHome()">Retour</button></div>`;
    }
    
    function showDeliveryRoute(order) {
        const orderObj = typeof order === 'string' ? JSON.parse(order) : order;
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-card" style="max-width:800px;"><h3>📍 Itinéraire - ${orderObj.id}</h3><div id="routeMap" style="height:450px; border-radius:12px;"></div><div class="location-actions">${orderObj.shops?.map(shop => shop.shopLocation ? `<button onclick="window.open('https://www.google.com/maps?q=${shop.shopLocation.lat},${shop.shopLocation.lng}', '_blank')" style="background:#1e40af;"><i class="fas fa-store"></i> ${shop.shopName}</button>` : '').join('')}${orderObj.deliveryInfo?.location ? `<button onclick="window.open('https://www.google.com/maps?q=${orderObj.deliveryInfo.location.lat},${orderObj.deliveryInfo.location.lng}', '_blank')" style="background:#10b981;"><i class="fas fa-home"></i> Client</button>` : ''}</div><button onclick="this.closest('.modal').remove()" style="margin-top:10px;">Fermer</button></div>`;
        document.body.appendChild(modal);
        setTimeout(() => {
            const map = L.map('routeMap').setView([DEFAULT_LAT, DEFAULT_LNG], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            const bounds = [];
            orderObj.shops?.forEach(shop => {
                if (shop.shopLocation) {
                    L.marker([shop.shopLocation.lat, shop.shopLocation.lng], { icon: L.divIcon({ html: '<div style="background:#1e40af;color:white;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;">🛍️</div>', iconSize: [30,30] }) }).addTo(map).bindPopup(`<b>${shop.shopName}</b><br><a href="https://www.google.com/maps?q=${shop.shopLocation.lat},${shop.shopLocation.lng}" target="_blank">Ouvrir dans Google Maps</a>`);
                    bounds.push([shop.shopLocation.lat, shop.shopLocation.lng]);
                }
            });
            if (orderObj.deliveryInfo?.location) {
                L.marker([orderObj.deliveryInfo.location.lat, orderObj.deliveryInfo.location.lng], { icon: L.divIcon({ html: '<div style="background:#10b981;color:white;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;">🏠</div>', iconSize: [30,30] }) }).addTo(map).bindPopup(`<b>Client</b><br>${orderObj.deliveryInfo.address}<br><a href="https://www.google.com/maps?q=${orderObj.deliveryInfo.location.lat},${orderObj.deliveryInfo.location.lng}" target="_blank">Ouvrir dans Google Maps</a>`);
                bounds.push([orderObj.deliveryInfo.location.lat, orderObj.deliveryInfo.location.lng]);
            }
            if (bounds.length) map.fitBounds(bounds);
        }, 100);
    }
    
    function acceptDeliveryOrder(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        order.status = 'en_livraison';
        order.deliveryDriver = currentUser?.email;
        localStorage.setItem('ouenze_orders', JSON.stringify(orders));
        let gpsMsg = `📦 Commande #${orderId}\n\n`;
        if (order.shops) order.shops.forEach(shop => { if(shop.shopLocation) gpsMsg += `🛍️ ${shop.shopName}: https://www.google.com/maps?q=${shop.shopLocation.lat},${shop.shopLocation.lng}\n`; });
        if (order.deliveryInfo?.location) gpsMsg += `🏠 Client: https://www.google.com/maps?q=${order.deliveryInfo.location.lat},${order.deliveryInfo.location.lng}\n`;
        alert(`✅ Livraison acceptée !\n\n${gpsMsg}\n\nUn email avec l'itinéraire a été envoyé.`);
        sendEmail(currentUser?.email, `Livraison #${orderId}`, gpsMsg);
        showDeliveryDashboard();
    }
    
    // ============ PROFIL ============
    function showProfile() {
        if (!currentUser) { alert("Connectez-vous"); openLoginModal(); return; }
        document.getElementById('appContainer').innerHTML = `
            <div class="profile-container" style="background:white; border-radius:20px; padding:20px;">
                <div style="text-align:center; margin-bottom:20px;"><div class="user-avatar" style="width:80px;height:80px;margin:0 auto;font-size:32px;">${currentUser.name.charAt(0)}</div><h3>${escapeHtml(currentUser.name)}</h3><p>${currentUser.email}</p><p>Type: ${currentUser.type}</p></div>
                <div class="info-card"><h4>Informations personnelles</h4><div class="info-row"><div class="info-label">Nom</div><div class="info-value">${escapeHtml(currentUser.name)}</div></div><div class="info-row"><div class="info-label">Email</div><div class="info-value">${currentUser.email}</div></div></div>
                <button onclick="logout()" class="btn-submit">Se déconnecter</button>
            </div>`;
    }
    
    // ============ AUTH ============
    function openLoginModal() {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-card"><h3>Connexion</h3><div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div><div class="form-group"><input type="password" id="loginPassword" placeholder="Mot de passe"></div><button class="btn-submit" onclick="doLogin()">Se connecter</button><div style="text-align:center;margin-top:12px;"><a onclick="this.closest('.modal').remove();openRegisterModal()" style="color:var(--primary);cursor:pointer;">Créer un compte</a></div></div>`;
        document.body.appendChild(modal);
    }
    
    function doLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const allUsers = JSON.parse(localStorage.getItem('ouenze_all_users') || '[]');
        const user = allUsers.find(u => u.email === email && u.password === password);
        if (!user) { alert("Email ou mot de passe incorrect"); return; }
        currentUser = { name: user.fullName || user.name, email: user.email, type: user.accountType || 'client' };
        saveData();
        updateHeaderUI();
        document.querySelector('.modal')?.remove();
        resetToHome();
        alert(`Bienvenue ${currentUser.name}`);
    }
    
    function openRegisterModal() {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-card"><h3>Inscription</h3><div class="form-group"><input type="text" id="regName" placeholder="Nom complet"></div><div class="form-group"><input type="email" id="regEmail" placeholder="Email"></div><div class="form-group"><input type="tel" id="regPhone" placeholder="Téléphone"></div><div class="form-group"><input type="password" id="regPassword" placeholder="Mot de passe"></div><div class="form-group"><select id="regType"><option value="client">Client</option><option value="vendeur">Vendeur</option><option value="livreur">Livreur</option></select></div><button class="btn-submit" onclick="doRegister()">S'inscrire</button></div>`;
        document.body.appendChild(modal);
    }
    
    function doRegister() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const password = document.getElementById('regPassword').value;
        const type = document.getElementById('regType').value;
        if (!name || !email || !phone || !password) { alert("Tous les champs requis"); return; }
        const allUsers = JSON.parse(localStorage.getItem('ouenze_all_users') || '[]');
        if (allUsers.find(u => u.email === email)) { alert("Email déjà utilisé"); return; }
        allUsers.push({ fullName: name, email, phone, password, accountType: type });
        localStorage.setItem('ouenze_all_users', JSON.stringify(allUsers));
        currentUser = { name, email, type };
        saveData();
        updateHeaderUI();
        document.querySelector('.modal')?.remove();
        resetToHome();
        alert(`Inscription réussie !`);
    }
    
    function updateHeaderUI() {
        const container = document.getElementById('headerActions');
        if (currentUser) {
            container.innerHTML = `<div class="user-menu" onclick="showProfile()"><div class="user-avatar">${currentUser.name.charAt(0)}</div><div class="user-info"><div>${currentUser.name.split(' ')[0]}</div><small>${currentUser.type}</small></div><button onclick="event.stopPropagation();logout()" style="background:none;border:none;cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button></div><div class="cart-icon" onclick="showCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count">${cart.reduce((s,i)=>s+i.quantity,0)}</span></div>`;
        } else {
            container.innerHTML = `<button class="auth-btn" onclick="openLoginModal()">Connexion</button><button class="auth-btn" onclick="openRegisterModal()">Inscription</button><div class="cart-icon" onclick="showCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count">0</span></div>`;
        }
        updateCartCount();
        updateVendorLink();
    }
    
    function logout() { currentUser = null; saveData(); updateHeaderUI(); resetToHome(); alert("Déconnexion réussie"); }
    function resetToHome() { showHomePage(); }
    function goToVendorDashboard() { window.location.href = 'vendor-dashboard.html'; }
    function showAbout() { alert("À propos - Ouenze Marketplace"); }
    function showHelp() { alert("Aide - Contactez-nous"); }
    function showInvest() { alert("Investir dans Ouenze"); }
    function showTracking() { alert("Suivi de livraison"); }
    
    // ============ INITIALISATION ============
    window.showHomePage = showHomePage;
    window.viewShopDetail = viewShopDetail;
    window.addToCart = addToCart;
    window.setRanking = setRanking;
    window.resetToHome = resetToHome;
    window.showCart = showCart;
    window.showMyOrders = showMyOrders;
    window.showProfile = showProfile;
    window.showDeliveryDashboard = showDeliveryDashboard;
    window.showDeliveryRoute = showDeliveryRoute;
    window.acceptDeliveryOrder = acceptDeliveryOrder;
    window.viewOrderOnMap = viewOrderOnMap;
    window.trackOrder = trackOrder;
    window.getCurrentUserLocation = getCurrentUserLocation;
    window.searchAddressLocation = searchAddressLocation;
    window.goToPayment = goToPayment;
    window.validateOrder = validateOrder;
    window.updateQuantity = updateQuantity;
    window.removeFromCart = removeFromCart;
    window.doLogin = doLogin;
    window.doRegister = doRegister;
    window.logout = logout;
    window.goToVendorDashboard = goToVendorDashboard;
    window.showAbout = showAbout;
    window.showHelp = showHelp;
    window.showInvest = showInvest;
    window.showTracking = showTracking;
    
    document.addEventListener('DOMContentLoaded', () => {
        updateHeaderUI();
        showHomePage();
        document.getElementById('searchBtn').addEventListener('click', () => alert("Recherche: " + document.getElementById('searchInput').value));
        const dropBtn = document.getElementById('dropdownBtn');
        const dropCont = document.getElementById('dropdownContent');
        if(dropBtn) {
            dropBtn.addEventListener('click', (e) => { e.stopPropagation(); dropCont.classList.toggle('show'); });
            window.addEventListener('click', () => dropCont.classList.remove('show'));
        }
    });
</script>
</body>
</html>
