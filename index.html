<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ouenze | Marketplace Congo Brazzaville</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1e293b; }
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --white: #ffffff;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-500: #64748b;
            --gray-700: #334155;
            --gold: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        /* Styles existants conservés */
        .header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 10px 16px; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
        .logo h1 { font-size: 20px; font-weight: 800; color: var(--primary); cursor: pointer; }
        .logo span { font-size: 9px; color: var(--gray-500); display: block; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .cart-icon { position: relative; cursor: pointer; font-size: 18px; color: var(--primary); }
        .cart-count { position: absolute; top: -6px; right: -10px; background: var(--danger); color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center; }
        .auth-btn { padding: 5px 12px; border-radius: 30px; font-size: 11px; font-weight: 500; cursor: pointer; background: var(--gray-100); border: none; }
        .user-menu { display: flex; align-items: center; gap: 8px; background: var(--gray-100); padding: 4px 10px; border-radius: 30px; cursor: pointer; }
        .user-avatar { width: 28px; height: 28px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 12px; }
        .user-info { font-size: 11px; line-height: 1.2; }
        .user-info small { font-size: 9px; color: var(--gray-500); }
        
        .search-wrapper { width: 100%; }
        .search-tabs { display: flex; gap: 6px; margin-bottom: 6px; }
        .search-tab { padding: 3px 10px; font-size: 10px; background: var(--gray-100); border-radius: 20px; cursor: pointer; color: var(--gray-500); }
        .search-tab.active { background: var(--primary); color: white; }
        .search-bar { display: flex; background: var(--gray-100); border-radius: 30px; border: 1px solid var(--gray-200); }
        .search-bar input { flex: 1; padding: 8px 14px; border: none; outline: none; background: transparent; font-size: 13px; }
        .search-bar button { background: none; border: none; padding: 0 12px; color: var(--primary); cursor: pointer; }
        
        .nav-row {
            border-top: 1px solid var(--border);
            background: var(--white);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            padding: 10px 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gray);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-btn {
            background: none;
            border: none;
            padding: 10px 0;
            font-size: 13px;
            cursor: pointer;
            color: var(--gray);
        }

        .dropdown-content {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--white);
            min-width: 200px;
            border: 1px solid var(--border);
            border-radius: 12px;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            z-index: 100;
        }

        .dropdown-content.show {
            opacity: 1;
            visibility: visible;
        }

        .dropdown-content a {
            display: block;
            padding: 12px 18px;
            text-decoration: none;
            color: var(--black);
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        
        .main { max-width: 1200px; margin: 16px auto; padding: 0 16px; }
        
        .ranking-bar { background: var(--white); border-radius: 16px; padding: 10px 16px; margin-bottom: 16px; border: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .ranking-filters { display: flex; gap: 8px; flex-wrap: wrap; }
        .ranking-btn { background: none; border: none; padding: 4px 8px; cursor: pointer; font-size: 11px; border-radius: 20px; color: var(--gray-500); }
        .ranking-btn.active { background: var(--primary); color: white; }
        .rating-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 20px; font-size: 9px; }
        .rating-badge.gold { background: #fef3c7; color: #b45309; }
        .rating-badge.silver { background: #f1f5f9; color: #475569; }
        .rating-badge.bronze { background: #ffedd5; color: #9a3412; }
        
        .shops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .shop-card { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-200); overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .shop-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .certification-badge { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: white; font-size: 12px; }
        .certification-badge.blue { background: var(--primary); color: white; }
        .certification-badge.gold { background: var(--gold); color: white; }
        .shop-logo-area { background: linear-gradient(135deg, #f8fafc, #f1f5f9); padding: 20px; text-align: center; }
        .shop-logo-img { width: 70px; height: 70px; margin: 0 auto; background: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--gray-200); }
        .shop-logo-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .shop-name { margin-top: 10px; font-size: 16px; font-weight: 700; }
        .shop-rating { margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 4px; font-size: 11px; }
        .stars { color: var(--gold); font-size: 10px; }
        .shop-details { padding: 12px; }
        .shop-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .metric { text-align: center; padding: 6px; background: var(--gray-100); border-radius: 10px; font-size: 10px; }
        .metric-value { font-weight: 700; font-size: 14px; color: var(--primary); }
        
        .back-btn { background: none; border: none; color: var(--primary); cursor: pointer; margin-bottom: 12px; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
        .shop-header-custom { background: linear-gradient(135deg, var(--primary-color, #1e40af), var(--primary-color, #1e40af)aa); border-radius: 20px; padding: 20px; margin-bottom: 20px; color: white; }
        .shop-header-content { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .shop-logo-large { width: 60px; height: 60px; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 12px; }
        .shop-logo-large img { width: 100%; height: 100%; object-fit: contain; }
        .shop-info h1 { font-size: 20px; margin-bottom: 2px; }
        .shop-info p { font-size: 11px; opacity: 0.9; }
        .share-link { background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 10px; border-radius: 30px; font-size: 10px; cursor: pointer; margin-top: 6px; display: inline-flex; align-items: center; gap: 4px; }
        
        .shop-menu { background: var(--menu-bg, #1e40af); color: var(--menu-text, white); border-radius: var(--menu-radius, 0px); margin-bottom: 16px; }
        .shop-menu-horizontal { display: flex; gap: 12px; flex-wrap: wrap; padding: 6px 12px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .shop-menu-vertical { width: 100%; float: none; margin-bottom: 12px; padding: 6px; overflow-x: auto; white-space: nowrap; }
        .shop-menu-item { position: relative; cursor: pointer; padding: 4px 0; font-size: 11px; display: inline-block; margin-right: 12px; }
        .shop-submenu { position: absolute; top: 100%; left: 0; background: var(--menu-bg); min-width: 130px; border-radius: 6px; padding: 4px 0; display: none; z-index: 100; }
        .shop-menu-item:hover .shop-submenu { display: block; }
        .shop-submenu-item { padding: 4px 10px; white-space: nowrap; font-size: 10px; }
        
        .carousel-container { position: relative; margin-bottom: 16px; overflow: hidden; border-radius: var(--carousel-radius, 12px); }
        .carousel-slide { display: none; width: 100%; height: var(--carousel-height, 200px); object-fit: cover; }
        .carousel-slide.active { display: block; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 12px; }
        .carousel-prev { left: 8px; }
        .carousel-next { right: 8px; }
        .carousel-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .carousel-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; }
        .carousel-dot.active { background: white; }
        
        .categories-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; clear: both; overflow-x: auto; padding-bottom: 4px; }
        .category-btn { padding: 4px 12px; background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 30px; cursor: pointer; font-size: 11px; white-space: nowrap; }
        .category-btn.active { background: var(--primary-color, #1e40af); color: white; }
        
        .products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .product-card { background: var(--white); border-radius: var(--product-radius, 12px); border: 1px solid var(--gray-200); overflow: hidden; cursor: pointer; transition: 0.2s; }
        .product-card:hover { transform: translateY(-2px); }
        .product-image { width: 100%; height: var(--product-img-height, 130px); object-fit: cover; }
        .product-info { padding: 8px; }
        .product-title { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
        .product-price { font-size: 14px; font-weight: 700; color: var(--primary-color, #1e40af); margin: 4px 0; }
        .product-stock { font-size: 9px; color: var(--gray-500); margin-bottom: 4px; }
        .product-badge { display: inline-block; background: #eef2ff; color: var(--primary); padding: 2px 6px; border-radius: 20px; font-size: 8px; margin-bottom: 4px; }
        .btn-add-cart { background: var(--button-color, #1e40af); color: white; border: none; padding: 5px; border-radius: var(--product-radius, 8px); font-weight: 500; cursor: pointer; width: 100%; font-size: 10px; }
        
        .reviews-section { background: var(--white); border-radius: 16px; padding: 16px; border: 1px solid var(--gray-200); margin-top: 16px; clear: both; }
        .reviews-section h3 { font-size: 13px; margin-bottom: 10px; }
        .review-item { padding: 8px 0; border-bottom: 1px solid var(--gray-200); }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; flex-wrap: wrap; gap: 4px; }
        .review-user { font-weight: 600; font-size: 11px; }
        .review-stars { color: var(--gold); font-size: 9px; }
        .review-date { font-size: 8px; color: var(--gray-500); }
        .review-comment { font-size: 11px; color: var(--gray-700); margin-top: 3px; }
        
        .product-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 12px; }
        .product-modal-content { background: var(--white); border-radius: 20px; max-width: 95%; width: 100%; max-height: 90vh; overflow-y: auto; cursor: default; padding: 16px; }
        .product-modal-body { display: flex; flex-direction: column; gap: 16px; }
        @media (min-width: 600px) { .product-modal-body { flex-direction: row; } .product-modal-body > div { flex: 1; } }
        .product-main-image { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; background: var(--gray-100); }
        .product-thumbnails { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .product-thumbnail { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .product-thumbnail.active { border-color: var(--primary); }
        .food-details { background: var(--gray-100); padding: 8px; border-radius: 10px; margin: 10px 0; font-size: 10px; }
        .variant-option { display: inline-block; margin: 3px; padding: 3px 8px; background: var(--gray-100); border-radius: 20px; cursor: pointer; font-size: 10px; }
        .btn-modal-add { background: var(--button-color, #1e40af); color: white; border: none; padding: 10px; border-radius: 40px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 12px; font-size: 12px; }
        
        .cart-container { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-200); padding: 20px; margin-bottom: 20px; }
        .cart-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; }
        .cart-item-info { flex: 1; }
        .cart-total { text-align: right; padding: 16px; font-size: 18px; font-weight: 700; border-top: 1px solid var(--gray-200); margin-top: 16px; }
        .payment-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 20px 0; }
        .payment-option { padding: 12px; background: var(--gray-100); border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .payment-option.selected { border-color: var(--primary); background: #eef2ff; }
        .card-details { background: var(--gray-100); border-radius: 12px; padding: 16px; margin-top: 12px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-card { background: var(--white); border-radius: 24px; width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; padding: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--gray-700); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--gray-200); border-radius: 10px; font-size: 13px; font-family: inherit; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .step-indicator { display: flex; gap: 8px; margin-bottom: 20px; }
        .step { flex: 1; text-align: center; padding: 8px; background: var(--gray-100); border-radius: 30px; font-size: 11px; font-weight: 500; color: var(--gray-500); }
        .step.active { background: var(--primary); color: white; }
        .step.completed { background: var(--success); color: white; }
        .step.error { background: var(--danger); color: white; }
        .btn-next, .btn-submit { padding: 12px; border-radius: 40px; font-weight: 600; border: none; cursor: pointer; background: var(--primary); color: white; width: 100%; font-size: 13px; transition: 0.2s; }
        .btn-next:hover, .btn-submit:hover { background: var(--primary-dark); }
        .btn-prev { background: var(--gray-100); color: var(--gray-700); width: 48%; padding: 12px; border-radius: 40px; font-weight: 500; border: none; cursor: pointer; transition: 0.2s; }
        .btn-prev:hover { background: var(--gray-200); }
        .button-group { display: flex; gap: 12px; margin-top: 16px; }
        .error-message { color: var(--danger); font-size: 11px; margin-top: 4px; display: none; }
        .error-message.show { display: block; }
        .success-message { color: var(--success); font-size: 11px; margin-top: 4px; }
        .info-text { font-size: 11px; color: var(--gray-500); margin-top: 4px; }
        .file-info { font-size: 10px; color: var(--gray-500); margin-top: 4px; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; }
        .status-pending { background: #fef3c7; color: #b45309; }
        .status-verified { background: #d1fae5; color: #059669; }
        .status-suspended { background: #fee2e2; color: #dc2626; }
        
        .footer { border-top: 1px solid var(--gray-200); background: var(--white); margin-top: 32px; padding: 16px; text-align: center; font-size: 10px; color: var(--gray-500); }
        
        /* Styles pour le profil */
        .profile-container { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-200); overflow: hidden; }
        .profile-header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 30px 20px; text-align: center; color: white; }
        .profile-avatar { width: 100px; height: 100px; margin: 0 auto 15px; position: relative; }
        .profile-avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid white; background: white; }
        .edit-avatar-btn { position: absolute; bottom: 0; right: 0; background: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .profile-tabs { display: flex; border-bottom: 1px solid var(--gray-200); background: var(--white); padding: 0 20px; gap: 20px; overflow-x: auto; }
        .profile-tab { padding: 12px 0; font-size: 13px; font-weight: 500; color: var(--gray-500); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
        .profile-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .profile-section { padding: 20px; display: none; }
        .profile-section.active { display: block; }
        .info-card { background: var(--gray-100); border-radius: 16px; padding: 16px; margin-bottom: 20px; }
        .info-row { display: flex; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--gray-200); }
        .info-label { width: 120px; font-weight: 600; font-size: 12px; color: var(--gray-700); }
        .info-value { flex: 1; font-size: 13px; color: var(--gray-700); }
        .info-actions { text-align: right; }
        .edit-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 11px; }
        .payment-methods-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .payment-item { background: var(--gray-100); border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .payment-info { display: flex; align-items: center; gap: 10px; }
        .payment-icon { width: 40px; height: 40px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .payment-details { font-size: 12px; }
        .payment-details strong { display: block; font-size: 13px; }
        .payment-actions button { background: none; border: none; cursor: pointer; margin-left: 8px; font-size: 14px; }
        .btn-add-payment { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 30px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
        .commandes-list { display: flex; flex-direction: column; gap: 12px; }
        .commande-item { background: var(--gray-100); border-radius: 12px; padding: 12px; border-left: 3px solid var(--success); }
        
        /* Styles pour la carte de localisation */
        .location-map { height: 300px; border-radius: 12px; margin-bottom: 15px; z-index: 1; }
        .location-actions { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .location-actions button { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
        .location-coords { background: var(--gray-100); padding: 10px; border-radius: 10px; font-size: 11px; margin-top: 10px; text-align: center; }
        .gps-link { display: inline-block; background: var(--success); color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-size: 12px; margin-top: 10px; }
        
        @media (max-width: 480px) {
            .shops-grid { grid-template-columns: 1fr; }
            .products-container { grid-template-columns: repeat(2, 1fr); }
            .dropdown-content { left: 0; right: auto; }
            .form-row { grid-template-columns: 1fr; gap: 8px; }
            .info-row { flex-direction: column; }
            .info-label { width: auto; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div class="logo" onclick="resetToHome()">
            <h1>OUENZE</h1>
            <span>Congo Brazzaville</span>
        </div>
        <div class="header-actions" id="headerActions"></div>
    </div>
    <div class="search-wrapper">
        <div class="search-tabs">
            <span class="search-tab active" data-type="all">Tous</span>
            <span class="search-tab" data-type="shop">Boutiques</span>
            <span class="search-tab" data-type="product">Produits</span>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Rechercher boutique ou produit...">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
    </div>
</div>
    </div>

<div class="nav-row">
        <div class="nav-container">
            <div class="nav-links">
                 <a onclick="resetToHome()" class="active">Accueil</a>
            <a onclick="resetToHome()">Boutiques</a>
            <a onclick="showCart()">Panier (<span id="cartCountHeader">0</span>)</a>
            <a onclick="showMyOrders()">Commandes</a>
            <a onclick="showProfile()">Mon Profil</a>
            <a onclick="goToVendorDashboard()" id="vendorLink" style="display:none;">Ma boutique</a>
            <a onclick="showDeliveryDashboard()" id="deliveryLink" style="display:none;">Livraisons</a>
            <a onclick="goToDeliveryDashboard()" id="deliveryLink" style="display:none;">Mes livraisons</a>
            <a href="delivery-register.html">Devenir livreur</a>
            </div>
            <div class="dropdown">
               <button class="dropdown-btn" id="dropdownBtn"><i class="fas fa-bars"></i> Menu</button>
            <div class="dropdown-content" id="dropdownContent">
                <a onclick="showAbout()">À propos</a>
                <a onclick="showHelp()">Aide</a>
                <a onclick="showInvest()">Investir</a>
                <a onclick="showTracking()">Suivi livraison</a>
            </div>
        </div>
    </div>
</div>

<div id="appContainer" class="main"></div>

<div class="footer">
    <p>© 2024 Ouenze Marketplace - Brazzaville, Congo</p>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ============ DONNÉES ============
    let currentUser = JSON.parse(localStorage.getItem('ouenze_current_user') || 'null');
    let shops = JSON.parse(localStorage.getItem('ouenze_shops') || '[]');
    let orders = JSON.parse(localStorage.getItem('ouenze_orders') || '[]');
    let cart = JSON.parse(localStorage.getItem('ouenze_cart') || '[]');
    let deliveryDrivers = JSON.parse(localStorage.getItem('ouenze_delivery_drivers') || '[]');
    let currentRanking = 'rating';
    let currentShop = null;
    let currentCategory = 'all';
    let carouselInterval = null;
    let selectedPayment = null;
    let lastAttemptTime = 0;
    let attemptCount = 0;
    let locationMap = null;
    let locationMarker = null;
    
    // Coordonnées par défaut (Brazzaville)
    const DEFAULT_LAT = -4.2634;
    const DEFAULT_LNG = 15.2429;
    
    // ============ FONCTIONS DE VÉRIFICATION ============
    function checkRateLimit() {
        const now = Date.now();
        if (now - lastAttemptTime < 5000) {
            attemptCount++;
            if (attemptCount > 3) return false;
        } else {
            attemptCount = 1;
            lastAttemptTime = now;
        }
        return true;
    }
    
    function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
    }
    
    function validatePhone(phone) {
        const clean = phone.replace(/\s/g, '');
        return /^(\+242|0)[56]\d{8}$/.test(clean);
    }
    
    function sendEmail(to, subject, body) {
        console.log(`📧 EMAIL ENVOYÉ À: ${to}`);
        console.log(`📧 OBJET: ${subject}`);
        console.log(`📧 MESSAGE: ${body}`);
        return true;
    }
    
    function showError(elementId, message) {
        const errorEl = document.getElementById(elementId);
        if (errorEl) {
            errorEl.innerText = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 5000);
        }
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    // ============ BOUTIQUES ============
    if (shops.length === 0) {
        shops = [
            { id: 1, name: "Élégance Africaine", city: "Brazzaville", quartier: "Moungali", rating: 5.0, totalRatings: 342, totalSales: 1250, 
              products: [{ id: 1, name: "Boubou Cérémonie", price: "65000", photos: [], stock: 25, colors: ["Or", "Bleu Royal"], sizes: ["S", "M", "L", "XL"], description: "Boubou traditionnel", productType: "standard" }], 
              categories: ["Boubou", "Accessoires"], reviews: [{ user: "Marie K.", rating: 5, comment: "Superbe qualité !", date: "2024-03-15" }], verified: true,
              location: { lat: -4.2634, lng: 15.2429, address: "Moungali, Brazzaville" } },
            { id: 2, name: "Tech Congo", city: "Brazzaville", quartier: "Centre-ville", rating: 4.8, totalRatings: 124, totalSales: 342, 
              products: [{ id: 1, name: "Smartphone", price: "85000", photos: [], stock: 10, colors: ["Noir", "Bleu"], sizes: [], description: "Smartphone haute performance", productType: "standard" }], 
              categories: ["Electronique"], reviews: [], verified: true,
              location: { lat: -4.2690, lng: 15.2430, address: "Centre-ville, Brazzaville" } }
        ];
        localStorage.setItem('ouenze_shops', JSON.stringify(shops));
    }
    
    function saveData() {
        localStorage.setItem('ouenze_shops', JSON.stringify(shops));
        localStorage.setItem('ouenze_orders', JSON.stringify(orders));
        localStorage.setItem('ouenze_cart', JSON.stringify(cart));
        localStorage.setItem('ouenze_delivery_drivers', JSON.stringify(deliveryDrivers));
        if (currentUser) localStorage.setItem('ouenze_current_user', JSON.stringify(currentUser));
        else localStorage.removeItem('ouenze_current_user');
        updateCartCount();
        updateVendorLink();
    }
    
    function updateCartCount() {
        const count = cart.reduce((s, i) => s + i.quantity, 0);
        document.querySelectorAll('#cartCountHeader, .cart-count').forEach(el => { if(el) el.innerText = count; });
    }
    
    function updateVendorLink() {
        const vendorLink = document.getElementById('vendorLink');
        const deliveryLink = document.getElementById('deliveryLink');
        if (currentUser && currentUser.type === 'vendeur') vendorLink.style.display = 'inline-block';
        else vendorLink.style.display = 'none';
        if (currentUser && currentUser.type === 'livreur') deliveryLink.style.display = 'inline-block';
        else deliveryLink.style.display = 'none';
    }
    
    function goToVendorDashboard() { window.location.href = 'vendor-dashboard.html'; }
    function showDeliveryDashboard() { 
        if (currentUser && currentUser.type === 'livreur') {
            showDeliveryOrders();
        } else {
            alert("Vous n'avez pas de compte livreur");
        }
    }
    
    function generateStars(rating) {
        const full = Math.floor(rating);
        let stars = '';
        for (let i = 0; i < full; i++) stars += '<i class="fas fa-star"></i>';
        if (rating % 1 >= 0.5) stars += '<i class="fas fa-star-half-alt"></i>';
        for (let i = 0; i < 5 - Math.ceil(rating); i++) stars += '<i class="far fa-star"></i>';
        return stars;
    }
    
    function getShopLevel(shop) {
        const rating = shop.rating || 0;
        if (rating >= 4.5) return { level: 'gold', name: 'Or', ouenzeFee: 21, color: '#f59e0b' };
        else if (rating >= 4) return { level: 'silver', name: 'Argent', ouenzeFee: 21.5, color: '#94a3b8' };
        else if (rating >= 3) return { level: 'bronze', name: 'Bronze', ouenzeFee: 22, color: '#b45309' };
        return { level: null, name: 'Non éligible', ouenzeFee: 22, color: '#64748b' };
    }
    
    function getCertificationBadge(rating, verified) {
        if (verified) return '<div class="certification-badge blue" title="Certifiée"><i class="fas fa-check-circle"></i></div>';
        if (rating >= 4.5) return '<div class="certification-badge gold" title="Top vendeur"><i class="fas fa-crown"></i></div>';
        return '';
    }
    
    function sortShops(shopsList, sortBy) {
        return [...shopsList].sort((a, b) => {
            if (sortBy === 'rating') return (b.rating || 0) - (a.rating || 0);
            if (sortBy === 'date') return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
            if (sortBy === 'sales') return (b.totalSales || 0) - (a.totalSales || 0);
            return 0;
        });
    }
    
    // ============ VUE ACCUEIL ============
    function showHomePage() {
        const rankedShops = sortShops(shops, currentRanking);
        document.getElementById('appContainer').innerHTML = `
            <div class="ranking-bar">
                <div class="ranking-filters">
                    <button class="ranking-btn ${currentRanking === 'rating' ? 'active' : ''}" onclick="setRanking('rating')">Par note</button>
                    <button class="ranking-btn ${currentRanking === 'date' ? 'active' : ''}" onclick="setRanking('date')">Récent</button>
                    <button class="ranking-btn ${currentRanking === 'sales' ? 'active' : ''}" onclick="setRanking('sales')">Ventes</button>
                </div>
                <div style="display:flex; gap:6px;">
                    <span class="rating-badge gold"><i class="fas fa-crown"></i> Or</span>
                    <span class="rating-badge silver"><i class="fas fa-star"></i> Argent</span>
                    <span class="rating-badge bronze"><i class="fas fa-star-half-alt"></i> Bronze</span>
                </div>
            </div>
            <div id="shopsGrid" class="shops-grid"></div>
            <div id="productsGrid" class="products-grid" style="display:none;"></div>
        `;
        displayShops(rankedShops);
        
        window.currentSearchType = 'all';
        document.querySelectorAll('.search-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.search-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                window.currentSearchType = tab.dataset.type;
                performSearch();
            });
        });
    }
    
    function setRanking(type) {
        currentRanking = type;
        showHomePage();
    }
    
    function displayShops(shopsList) {
        const grid = document.getElementById('shopsGrid');
        if (!grid) return;
        if (!shopsList.length) { grid.innerHTML = '<div style="text-align:center;padding:30px;">Aucune boutique</div>'; return; }
        grid.innerHTML = shopsList.map(shop => {
            const level = getShopLevel(shop);
            const levelBadge = level.level ? `<span style="display:inline-block; margin-left:6px; padding:2px 8px; border-radius:20px; font-size:9px; background:${level.color}20; color:${level.color};"><i class="fas fa-crown"></i> ${level.name}</span>` : '';
            return `
                <div class="shop-card" onclick="viewShopDetail(${shop.id})" style="position:relative;">
                    ${getCertificationBadge(shop.rating || 0, shop.verified)}
                    <div class="shop-logo-area">
                        <div class="shop-logo-img">${shop.logo ? `<img src="${shop.logo}">` : '<i class="fas fa-store" style="font-size:28px;"></i>'}</div>
                        <div class="shop-name">${escapeHtml(shop.name)}${levelBadge}</div>
                        <div class="shop-rating">
                            <div class="stars">${generateStars(shop.rating || 0)}</div>
                            <span>(${shop.totalRatings || 0})</span>
                        </div>
                        <div style="font-size:10px;color:var(--gray-500);margin-top:4px;">
                            <i class="fas fa-map-marker-alt"></i> ${escapeHtml(shop.city || 'Brazzaville')}
                        </div>
                    </div>
                    <div class="shop-details">
                        <div class="shop-metrics">
                            <div class="metric"><div class="metric-value">${shop.products?.length || 0}</div><div>Produits</div></div>
                            <div class="metric"><div class="metric-value">${shop.totalSales || 0}</div><div>Ventes</div></div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function displayProducts(productsList) {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        grid.style.display = 'grid';
        document.getElementById('shopsGrid').style.display = 'none';
        if (!productsList.length) { grid.innerHTML = '<div style="text-align:center;padding:30px;">Aucun produit</div>'; return; }
        grid.innerHTML = productsList.map(p => `
            <div class="product-card" onclick="openProductModal(${p.shopId}, ${p.id})">
                <img src="${p.photos?.[0] || 'https://via.placeholder.com/300x200'}" class="product-image">
                <div class="product-info">
                    <div class="product-title">${escapeHtml(p.name)}</div>
                    <div class="product-price">${p.price} FCFA</div>
                    <div style="font-size:9px;color:var(--gray-500);">${escapeHtml(p.shopName)}</div>
                    <button class="btn-custom" style="background:var(--primary);padding:5px;border-radius:30px;width:100%;margin-top:5px;border:none;color:white;cursor:pointer;" onclick="event.stopPropagation();addToCart(${p.shopId}, ${p.id}, '${escapeHtml(p.name)}', '${p.price}')">Ajouter</button>
                </div>
            </div>
        `).join('');
    }
    
    function performSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        if (!query) { displayShops(sortShops(shops, currentRanking)); document.getElementById('productsGrid').style.display = 'none'; document.getElementById('shopsGrid').style.display = 'grid'; return; }
        
        if (window.currentSearchType === 'shop') {
            const filtered = shops.filter(s => s.name.toLowerCase().includes(query));
            displayShops(filtered);
            document.getElementById('productsGrid').style.display = 'none';
            document.getElementById('shopsGrid').style.display = 'grid';
        } else if (window.currentSearchType === 'product') {
            const allProducts = [];
            shops.forEach(shop => {
                (shop.products || []).forEach(p => {
                    if (p.name.toLowerCase().includes(query)) allProducts.push({ ...p, shopId: shop.id, shopName: shop.name });
                });
            });
            displayProducts(allProducts);
        } else {
            const filteredShops = shops.filter(s => s.name.toLowerCase().includes(query));
            const allProducts = [];
            shops.forEach(shop => {
                (shop.products || []).forEach(p => {
                    if (p.name.toLowerCase().includes(query)) allProducts.push({ ...p, shopId: shop.id, shopName: shop.name });
                });
            });
            if (filteredShops.length > 0) { displayShops(filteredShops); document.getElementById('productsGrid').style.display = 'none'; }
            else if (allProducts.length > 0) displayProducts(allProducts);
            else displayShops([]);
        }
    }
    
    // ============ VUE BOUTIQUE DÉTAILLÉE ============
    function viewShopDetail(shopId) {
        const shop = shops.find(s => s.id === shopId);
        if (!shop) return;
        
        const url = new URL(window.location.href);
        url.searchParams.set('id', shopId);
        window.history.pushState({}, '', url);
        
        currentShop = shop;
        currentCategory = 'all';
        
        document.getElementById('appContainer').innerHTML = `
            <button class="back-btn" onclick="resetToHome()"><i class="fas fa-arrow-left"></i> Retour</button>
            <div class="shop-header-custom" style="background: linear-gradient(135deg, #1e40af, #1e40afaa);">
                <div class="shop-header-content">
                    <div class="shop-logo-large">
                        ${shop.logo ? `<img src="${shop.logo}">` : '<i class="fas fa-store" style="font-size:28px;"></i>'}
                    </div>
                    <div class="shop-info">
                        <h1>${escapeHtml(shop.name)}</h1>
                        <p>${escapeHtml(shop.description || '')}</p>
                        <div class="shop-rating">
                            <div class="stars">${generateStars(shop.rating || 0)}</div>
                            <span>${shop.rating || 0} (${shop.totalRatings || 0})</span>
                            ${shop.verified ? '<span style="background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:20px;margin-left:6px;font-size:10px;"><i class="fas fa-check-circle"></i> Certifiée</span>' : ''}
                        </div>
                        <div style="margin-top:4px; font-size:10px;"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(shop.address || shop.city + ', ' + shop.quartier)}</div>
                        ${shop.location ? `<button class="share-link" onclick="openInGoogleMaps(${shop.location.lat}, ${shop.location.lng}, '${escapeHtml(shop.name)}')"><i class="fas fa-directions"></i> Voir sur la carte</button>` : ''}
                    </div>
                </div>
            </div>
            <div class="categories-filter" id="shopCategoriesFilter">
                <button class="category-btn active" data-cat="all">Tous</button>
                ${(shop.categories || []).map(cat => `<button class="category-btn" data-cat="${escapeHtml(cat)}">${escapeHtml(cat)}</button>`).join('')}
            </div>
            <div id="shopProductsContainer" class="products-container"></div>
            <div class="reviews-section">
                <h3>Avis clients</h3>
                ${(shop.reviews || []).length ? shop.reviews.map(r => `
                    <div class="review-item">
                        <div class="review-header">
                            <span class="review-user">${escapeHtml(r.user)}</span>
                            <div class="review-stars">${generateStars(r.rating)}</div>
                            <span class="review-date">${new Date(r.date).toLocaleDateString()}</span>
                        </div>
                        <div class="review-comment">${escapeHtml(r.comment || '')}</div>
                    </div>
                `).join('') : '<p style="color:var(--gray-500);">Aucun avis pour le moment</p>'}
            </div>
        `;
        
        displayShopProducts();
        
        document.querySelectorAll('#shopCategoriesFilter .category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#shopCategoriesFilter .category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.cat;
                displayShopProducts();
            });
        });
    }
    
    function displayShopProducts() {
        const container = document.getElementById('shopProductsContainer');
        if (!container) return;
        let products = currentShop.products || [];
        if (currentCategory !== 'all') products = products.filter(p => p.category === currentCategory);
        
        if (!products.length) {
            container.innerHTML = '<div style="text-align:center;padding:30px;">Aucun produit</div>';
            return;
        }
        
        container.innerHTML = products.map(p => `
            <div class="product-card" onclick="openProductModal(${currentShop.id}, ${p.id})">
                <img src="${p.photos?.[0] || 'https://via.placeholder.com/300x200'}" class="product-image" style="height:130px;">
                <div class="product-info">
                    ${p.productType === 'food' ? '<div class="product-badge">Alimentaire</div>' : ''}
                    <div class="product-title">${escapeHtml(p.name)}</div>
                    <div class="product-price">${p.price} FCFA</div>
                    <div class="product-stock">Stock: ${p.stock || 0}</div>
                    <button class="btn-add-cart" style="background:#1e40af; border-radius:12px;" onclick="event.stopPropagation();addToCart(${currentShop.id}, ${p.id}, '${escapeHtml(p.name)}', '${p.price}')">Ajouter</button>
                </div>
            </div>
        `).join('');
    }
    
    function openProductModal(shopId, productId) {
        const shop = shops.find(s => s.id === shopId);
        const product = shop?.products?.find(p => p.id === productId);
        if (!product) return;
        const photos = product.photos && product.photos.length ? product.photos : ['https://via.placeholder.com/600x400'];
        
        const modal = document.createElement('div'); modal.className = 'product-modal';
        modal.innerHTML = `
            <div class="product-modal-content">
                <div style="display:flex; justify-content:flex-end;"><span style="font-size:22px;cursor:pointer;" onclick="this.closest('.product-modal').remove()">&times;</span></div>
                <div class="product-modal-body">
                    <div>
                        <img id="modalMainImage" src="${photos[0]}" class="product-main-image">
                        <div class="product-thumbnails">
                            ${photos.map((p, i) => `<img src="${p}" class="product-thumbnail" data-index="${i}">`).join('')}
                        </div>
                    </div>
                    <div>
                        <h2 style="font-size:18px;">${escapeHtml(product.name)}</h2>
                        <div class="product-price" style="font-size:18px;">${product.price} FCFA</div>
                        <div class="product-stock">Stock: ${product.stock || 0}</div>
                        <div class="product-description" style="margin:10px 0; font-size:12px;">${escapeHtml(product.description || 'Aucune description')}</div>
                        <button class="btn-modal-add" style="background:#1e40af;" onclick="addToCartFromModal(${shop.id}, ${product.id}, '${escapeHtml(product.name)}', '${product.price}')">Ajouter au panier</button>
                    </div>
                </div>
            </div>`;
        document.body.appendChild(modal);
        
        document.querySelectorAll('.product-thumbnail').forEach((thumb, idx) => {
            thumb.addEventListener('click', () => {
                document.getElementById('modalMainImage').src = thumb.src;
                document.querySelectorAll('.product-thumbnail').forEach(t => t.classList.remove('active'));
                thumb.classList.add('active');
            });
        });
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }
    
    function addToCartFromModal(shopId, productId, productName, price) {
        if (!currentUser) { alert("Connectez-vous"); openLoginModal(); return; }
        const existing = cart.find(i => i.productId === productId && i.shopId === shopId);
        if (existing) existing.quantity++;
        else cart.push({ productId, productName, price: parseFloat(price), quantity: 1, shopId, shopName: shops.find(s=>s.id===shopId)?.name });
        saveData();
        alert(`${productName} ajouté au panier`);
        document.querySelector('.product-modal')?.remove();
    }
    
    function addToCart(shopId, productId, productName, price) {
        if (!currentUser) { alert("Connectez-vous"); openLoginModal(); return; }
        const existing = cart.find(i => i.productId === productId && i.shopId === shopId);
        if (existing) existing.quantity++;
        else cart.push({ productId, productName, price: parseFloat(price), quantity: 1, shopId, shopName: shops.find(s=>s.id===shopId)?.name });
        saveData();
        alert(`${productName} ajouté au panier`);
    }
    
    // ============ PANIER ET PAIEMENT ============
    function showCart() {
        if (cart.length === 0) {
            document.getElementById('appContainer').innerHTML = `<div class="cart-container" style="text-align:center;padding:40px;"><i class="fas fa-shopping-cart" style="font-size:48px;color:var(--gray-500);margin-bottom:16px;"></i><h3>Votre panier est vide</h3><button onclick="resetToHome()" class="btn-submit" style="margin-top:16px;width:auto;padding:8px 24px;">Continuer vos achats</button></div>`;
            return;
        }
        
        let subtotal = cart.reduce((s,i) => s + i.price * i.quantity, 0);
        const deliveryFees = subtotal * 0.1;
        const total = subtotal + deliveryFees;
        
        const itemsHtml = cart.map((item, idx) => `
            <div class="cart-item">
                <div class="cart-item-info">
                    <h4 style="font-size:14px;">${escapeHtml(item.productName)}</h4>
                    <div style="font-size:12px;color:var(--primary);">${item.price} FCFA</div>
                    <div style="font-size:10px;color:var(--gray-500);">${escapeHtml(item.shopName)}</div>
                    <div style="display:flex;align-items:center;gap:10px;margin-top:6px;">
                        <button onclick="updateQuantity(${idx}, -1)" style="background:var(--gray-100);border:none;width:24px;height:24px;border-radius:50%;cursor:pointer;">-</button>
                        <span style="font-size:12px;">${item.quantity}</span>
                        <button onclick="updateQuantity(${idx}, 1)" style="background:var(--gray-100);border:none;width:24px;height:24px;border-radius:50%;cursor:pointer;">+</button>
                        <button onclick="removeFromCart(${idx})" style="background:none;border:none;color:var(--danger);cursor:pointer;margin-left:8px;"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>
        `).join('');
        
        document.getElementById('appContainer').innerHTML = `
            <div class="cart-container">
                <h2 style="font-size:18px;margin-bottom:16px;">Mon panier</h2>
                ${itemsHtml}
                <div class="cart-total">
                    <div>Sous-total: ${subtotal.toLocaleString()} FCFA</div>
                    <div style="font-size:11px;color:var(--gray-500);">Frais de livraison (10%): ${deliveryFees.toLocaleString()} FCFA</div>
                    <div style="font-size:20px;margin-top:8px;">Total: ${total.toLocaleString()} FCFA</div>
                </div>
                <button class="btn-submit" onclick="showCheckout(${total})">Passer à la caisse</button>
                <button onclick="resetToHome()" style="margin-top:12px;background:none;border:none;color:var(--primary);cursor:pointer;font-size:11px;">Continuer mes achats</button>
            </div>
        `;
    }
    
    function updateQuantity(index, delta) {
        cart[index].quantity += delta;
        if (cart[index].quantity <= 0) cart.splice(index, 1);
        saveData();
        showCart();
    }
    
    function removeFromCart(index) {
        cart.splice(index, 1);
        saveData();
        showCart();
    }
    
    function showCheckout(total) {
        const userLocation = getUserData().location || {};
        document.getElementById('appContainer').innerHTML = `
            <div class="cart-container">
                <h2 style="font-size:18px;margin-bottom:16px;">Livraison et paiement</h2>
                <div class="form-group"><label>Ville *</label><input type="text" id="deliveryCity" placeholder="Brazzaville" value="${escapeHtml(userLocation.city || '')}"></div>

    function validateAndPay(total) {
        const city = document.getElementById('deliveryCity')?.value.trim();
        const quartier = document.getElementById('deliveryQuartier')?.value.trim();
        const address = document.getElementById('deliveryAddress')?.value.trim();
        const phone = document.getElementById('deliveryPhone')?.value.trim();
        
        if (!city || !quartier || !address || !phone) {
            alert("Veuillez remplir toutes les informations de livraison");
            return;
        }
        
        if (!selectedPayment) {
            alert("Veuillez choisir un mode de paiement");
            return;
        }
        
        if (selectedPayment === 'card') {
            const cardName = document.getElementById('cardName')?.value.trim();
            const cardNumber = document.getElementById('cardNumber')?.value.replace(/\s/g, '');
            const cardExpiry = document.getElementById('cardExpiry')?.value.trim();
            const cardCvv = document.getElementById('cardCvv')?.value.trim();
            if (!cardName || !cardNumber || !cardExpiry || !cardCvv) { alert("Veuillez remplir toutes les informations de la carte"); return; }
            if (cardNumber.length !== 16) { alert("Numéro de carte invalide"); return; }
            if (!/^\d{2}\/\d{2}$/.test(cardExpiry)) { alert("Date d'expiration invalide (MM/AA)"); return; }
            if (cardCvv.length !== 3) { alert("CVV invalide"); return; }
        }
        
        if (selectedPayment === 'mobile') {
            const mobileNumber = document.getElementById('mobileNumber')?.value.trim();
            if (!mobileNumber) { alert("Numéro Mobile Money requis"); return; }
        }
        
        if (selectedPayment === 'paypal') {
            const paypalEmail = document.getElementById('paypalEmail')?.value.trim();
            if (!paypalEmail || !validateEmail(paypalEmail)) { alert("Email PayPal invalide"); return; }
        }
        
        const subtotal = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
        const deliveryFees = subtotal * 0.1;
        const finalTotal = subtotal + deliveryFees;
        const orderId = 'CMD-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
        
        // Récupérer les positions des boutiques
        const shopItems = cart.map(item => {
            const shop = shops.find(s => s.id === item.shopId);
            return { shopId: item.shopId, shopName: item.shopName, shopLocation: shop?.location || null };
        });
        const uniqueShops = [...new Map(shopItems.map(s => [s.shopId, s])).values()];
        
        const newOrder = {
            id: orderId, userId: currentUser?.email, userName: currentUser?.name,
            items: cart.map(item => ({ productId: item.productId, productName: item.productName, price: item.price, quantity: item.quantity, shopId: item.shopId, shopName: item.shopName })),
            subtotal, deliveryFees, total: finalTotal,
            deliveryInfo: { city, quartier, address, phone, location: getUserData().location || null },
            shops: uniqueShops,
            paymentMethod: selectedPayment,
            date: new Date().toISOString(), status: 'confirmée', trackingStep: 1,
            statusHistory: [{ status: 'Commande confirmée', date: new Date().toISOString(), message: `Votre commande #${orderId} a été confirmée` }],
            rated: false
        };
        
        orders.push(newOrder);
        localStorage.setItem('ouenze_orders', JSON.stringify(orders));
        
        cart = [];
        saveData();
        
        sendEmail(currentUser?.email, `Confirmation commande #${orderId}`, `Bonjour,\n\nVotre commande #${orderId} a été confirmée.\nTotal: ${finalTotal.toLocaleString()} FCFA\n\nMerci de votre confiance !`);
        
        alert(`✅ Commande ${orderId} confirmée !\n\nTotal: ${finalTotal.toLocaleString()} FCFA`);
        resetToHome();
    }
    
    function showMyOrders() {
        const userOrders = orders.filter(o => o.userId === currentUser?.email);
        if (userOrders.length === 0) {
            document.getElementById('appContainer').innerHTML = `<div class="cart-container" style="text-align:center;padding:40px;"><i class="fas fa-truck" style="font-size:48px;color:var(--gray-500);"></i><h3>Aucune commande</h3><button onclick="resetToHome()" class="btn-submit" style="margin-top:16px;">Commencer</button></div>`;
            return;
        }
        
        document.getElementById('appContainer').innerHTML = `
            <div class="cart-container">
                <h2>Mes commandes</h2>
                ${userOrders.map(order => `
                    <div style="border:1px solid var(--gray-200);border-radius:12px;padding:12px;margin-bottom:12px;">
                        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;"><strong>#${order.id}</strong><span>${new Date(order.date).toLocaleDateString()}</span></div>
                        <div>Total: ${order.total.toLocaleString()} FCFA</div>
                        <div>Statut: <span style="color:var(--success);">${order.status}</span></div>
                        ${order.status === 'confirmée' ? `<button onclick="acceptDelivery('${order.id}')" style="margin-top:8px; background:var(--primary); color:white; border:none; padding:6px 12px; border-radius:20px; cursor:pointer;">Accepter la livraison</button>` : ''}
                        <button onclick="viewOrderMap('${order.id}')" style="margin-top:8px; background:var(--success); color:white; border:none; padding:4px 12px; border-radius:20px; cursor:pointer; font-size:10px;"><i class="fas fa-map-marker-alt"></i> Voir sur la carte</button>
                    </div>
                `).join('')}
                <button onclick="resetToHome()" class="btn-submit">Continuer</button>
            </div>
        `;
    }
    
    // ============ LIVREUR - ACCEPTATION DE COMMANDE AVEC GPS ============
    function acceptDelivery(orderId) {
        if (!currentUser || currentUser.type !== 'livreur') {
            alert("Seuls les livreurs peuvent accepter les livraisons");
            return;
        }
        
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        
        order.status = 'en_livraison';
        order.deliveryDriver = currentUser.email;
        order.trackingStep = 2;
        order.statusHistory.push({ status: 'Livreur assigné', date: new Date().toISOString(), message: `Le livreur ${currentUser.name} a pris en charge votre commande` });
        localStorage.setItem('ouenze_orders', JSON.stringify(orders));
        
        // Générer le lien GPS pour le livreur
        let gpsLinks = [];
        if (order.shops && order.shops.length) {
            order.shops.forEach(shop => {
                if (shop.shopLocation) {
                    gpsLinks.push(`🛍️ Boutique ${shop.shopName}: https://www.google.com/maps?q=${shop.shopLocation.lat},${shop.shopLocation.lng}`);
                }
            });
        }
        if (order.deliveryInfo?.location) {
            gpsLinks.push(`🏠 Client: https://www.google.com/maps?q=${order.deliveryInfo.location.lat},${order.deliveryInfo.location.lng}`);
        } else if (order.deliveryInfo?.address) {
            gpsLinks.push(`🏠 Client: ${order.deliveryInfo.address}, ${order.deliveryInfo.quartier}, ${order.deliveryInfo.city}`);
        }
        
        const gpsMessage = `📦 Commande #${orderId}\n\nItinéraire de livraison:\n${gpsLinks.join('\n\n')}\n\nMerci de suivre le GPS pour la livraison.`;
        
        alert(`✅ Commande #${orderId} acceptée !\n\nUn lien GPS a été généré.\n\n${gpsMessage}`);
        sendEmail(currentUser.email, `Livraison #${orderId}`, gpsMessage);
        
        showMyOrders();
    }
    
    function viewOrderMap(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        
        let gpsLinks = [];
        if (order.shops && order.shops.length) {
            order.shops.forEach(shop => {
                if (shop.shopLocation) {
                    gpsLinks.push({ type: 'shop', name: shop.shopName, lat: shop.shopLocation.lat, lng: shop.shopLocation.lng });
                }
            });
        }
        if (order.deliveryInfo?.location) {
            gpsLinks.push({ type: 'client', name: 'Client', lat: order.deliveryInfo.location.lat, lng: order.deliveryInfo.location.lng });
        }
        
        if (gpsLinks.length === 0) {
            alert("Aucune position GPS disponible pour cette commande");
            return;
        }
        
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card" style="max-width: 700px;">
                <h3>Itinéraire de livraison - ${order.id}</h3>
                <div id="deliveryMap" style="height: 400px; border-radius: 12px; margin: 15px 0;"></div>
                <div class="location-actions">
                    ${gpsLinks.map(link => `<button onclick="openInGoogleMaps(${link.lat}, ${link.lng}, '${link.name}')" style="background:var(--primary); color:white; border:none; padding:8px 12px; border-radius:30px; cursor:pointer;"><i class="fas fa-directions"></i> ${link.type === 'shop' ? 'Aller à la boutique ' + link.name : 'Aller chez le client'}</button>`).join('')}
                </div>
                <button class="btn-submit btn-secondary" onclick="this.closest('.modal').remove()">Fermer</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        // Initialiser la carte
        setTimeout(() => {
            const map = L.map('deliveryMap').setView([gpsLinks[0].lat, gpsLinks[0].lng], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>' }).addTo(map);
            
            gpsLinks.forEach(link => {
                const icon = L.divIcon({ html: link.type === 'shop' ? '🛍️' : '🏠', className: 'custom-div-icon', iconSize: [30, 30] });
                L.marker([link.lat, link.lng], { icon: L.divIcon({ html: `<div style="background:${link.type === 'shop' ? '#1e40af' : '#10b981'}; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-size:16px;">${link.type === 'shop' ? '🛍️' : '🏠'}</div>`, className: '', iconSize: [30, 30] }) }).addTo(map).bindPopup(link.name);
            });
        }, 100);
    }
    
    function openInGoogleMaps(lat, lng, name) {
        window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
    }
