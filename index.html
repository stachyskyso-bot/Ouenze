<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ouenze | Marketplace Congo Brazzaville</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1e293b; }
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --white: #ffffff;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-500: #64748b;
            --gray-700: #334155;
            --gold: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
        }
        
        .header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 100; }
        .logo h1 { font-size: 22px; font-weight: 800; color: var(--primary); cursor: pointer; }
        .search-wrapper { flex: 1; max-width: 350px; }
        .search-tabs { display: flex; gap: 8px; margin-bottom: 6px; }
        .search-tab { padding: 4px 12px; font-size: 11px; background: var(--gray-100); border-radius: 20px; cursor: pointer; color: var(--gray-500); }
        .search-tab.active { background: var(--primary); color: white; }
        .search-bar { display: flex; background: var(--gray-100); border-radius: 40px; border: 1px solid var(--gray-200); }
        .search-bar input { flex: 1; padding: 8px 16px; border: none; outline: none; background: transparent; font-size: 13px; }
        .search-bar button { background: none; border: none; padding: 0 14px; color: var(--primary); cursor: pointer; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .cart-icon { position: relative; cursor: pointer; font-size: 20px; color: var(--primary); }
        .cart-count { position: absolute; top: -8px; right: -12px; background: var(--danger); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        .auth-btn { padding: 6px 14px; border-radius: 40px; font-size: 12px; font-weight: 500; cursor: pointer; background: var(--gray-100); border: none; }
        .user-menu { display: flex; align-items: center; gap: 10px; background: var(--gray-100); padding: 4px 12px; border-radius: 40px; cursor: pointer; }
        .user-avatar { width: 32px; height: 32px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }
        .nav-row { border-top: 1px solid var(--gray-200); background: var(--white); }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; }
        .nav-links { display: flex; gap: 20px; padding: 8px 0; }
        .nav-links a { text-decoration: none; color: var(--gray-500); font-size: 12px; font-weight: 500; cursor: pointer; }
        .nav-links a.active { color: var(--primary); font-weight: 600; }
        .dropdown { position: relative; }
        .dropdown-btn { background: none; border: none; padding: 8px 0; font-size: 12px; cursor: pointer; color: var(--gray-500); }
        .dropdown-content { position: absolute; top: 100%; right: 0; background: var(--white); min-width: 180px; border: 1px solid var(--gray-200); border-radius: 12px; opacity: 0; visibility: hidden; transition: 0.2s; z-index: 100; }
        .dropdown-content.show { opacity: 1; visibility: visible; }
        .dropdown-content a { display: block; padding: 10px 16px; text-decoration: none; color: var(--gray-700); font-size: 12px; border-bottom: 1px solid var(--gray-200); cursor: pointer; }
        
        .main { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        
        /* Classement */
        .ranking-bar { background: var(--white); border-radius: 16px; padding: 12px 20px; margin-bottom: 20px; border: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .ranking-filters { display: flex; gap: 12px; }
        .ranking-btn { background: none; border: none; padding: 4px 10px; cursor: pointer; font-size: 12px; border-radius: 20px; color: var(--gray-500); }
        .ranking-btn.active { background: var(--primary); color: white; }
        .rating-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
        .rating-badge.gold { background: #fef3c7; color: #b45309; }
        .rating-badge.silver { background: #f1f5f9; color: #475569; }
        .rating-badge.bronze { background: #ffedd5; color: #9a3412; }
        
        /* Grille boutiques */
        .shops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .shop-card { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-200); overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .shop-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
        .certification-badge { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: white; }
        .certification-badge.blue { background: var(--primary); color: white; }
        .certification-badge.gold { background: var(--gold); color: white; }
        .shop-logo-area { background: linear-gradient(135deg, #f8fafc, #f1f5f9); padding: 24px; text-align: center; }
        .shop-logo-img { width: 70px; height: 70px; margin: 0 auto; background: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--gray-200); }
        .shop-logo-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .shop-name { margin-top: 10px; font-size: 16px; font-weight: 700; }
        .shop-rating { margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; font-size: 12px; }
        .stars { color: var(--gold); font-size: 11px; }
        .shop-details { padding: 16px; }
        .shop-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 8px 0; }
        .metric { text-align: center; padding: 6px; background: var(--gray-100); border-radius: 10px; font-size: 11px; }
        .metric-value { font-weight: 700; font-size: 16px; color: var(--primary); }
        
        /* Vue boutique détaillée */
        .back-btn { background: none; border: none; color: var(--primary); cursor: pointer; margin-bottom: 16px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
        .shop-header-custom { background: linear-gradient(135deg, var(--primary-color, #1e40af), var(--primary-color, #1e40af)aa); border-radius: 20px; padding: 24px; margin-bottom: 24px; color: white; }
        .shop-header-content { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .shop-logo-large { width: 70px; height: 70px; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 12px; }
        .shop-logo-large img { width: 100%; height: 100%; object-fit: contain; }
        .shop-info h1 { font-size: 22px; margin-bottom: 4px; }
        .shop-info p { font-size: 12px; opacity: 0.9; }
        
        /* Menu boutique */
        .shop-menu { background: var(--menu-bg, #1e40af); color: var(--menu-text, white); border-radius: var(--menu-radius, 0px); margin-bottom: 20px; }
        .shop-menu-horizontal { display: flex; gap: 16px; flex-wrap: wrap; padding: 8px 16px; }
        .shop-menu-vertical { width: 180px; float: left; margin-right: 20px; padding: 8px; }
        .shop-menu-item { position: relative; cursor: pointer; padding: 5px 0; font-size: 12px; }
        .shop-submenu { position: absolute; top: 100%; left: 0; background: var(--menu-bg); min-width: 140px; border-radius: 6px; padding: 5px 0; display: none; z-index: 100; }
        .shop-menu-item:hover .shop-submenu { display: block; }
        .shop-submenu-item { padding: 5px 12px; white-space: nowrap; font-size: 11px; }
        
        /* Carrousel */
        .carousel-container { position: relative; margin-bottom: 20px; overflow: hidden; border-radius: var(--carousel-radius, 12px); }
        .carousel-slide { display: none; width: 100%; height: var(--carousel-height, 250px); object-fit: cover; }
        .carousel-slide.active { display: block; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; }
        .carousel-prev { left: 10px; }
        .carousel-next { right: 10px; }
        .carousel-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; }
        .carousel-dot.active { background: white; }
        
        /* Catégories */
        .categories-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; clear: both; }
        .category-btn { padding: 5px 14px; background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 30px; cursor: pointer; font-size: 12px; }
        .category-btn.active { background: var(--primary-color, #1e40af); color: white; }
        
        /* Produits */
        .products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .product-card { background: var(--white); border-radius: var(--product-radius, 12px); border: 1px solid var(--gray-200); overflow: hidden; cursor: pointer; transition: 0.2s; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .product-image { width: 100%; height: var(--product-img-height, 150px); object-fit: cover; }
        .product-info { padding: 10px; }
        .product-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .product-price { font-size: 16px; font-weight: 700; color: var(--primary-color, #1e40af); margin: 5px 0; }
        .product-stock { font-size: 10px; color: var(--gray-500); margin-bottom: 6px; }
        .product-badge { display: inline-block; background: #eef2ff; color: var(--primary); padding: 2px 8px; border-radius: 20px; font-size: 9px; margin-bottom: 4px; }
        .btn-add-cart { background: var(--button-color, #1e40af); color: white; border: none; padding: 6px; border-radius: var(--product-radius, 8px); font-weight: 500; cursor: pointer; width: 100%; font-size: 11px; }
        
        /* Avis */
        .reviews-section { background: var(--white); border-radius: 20px; padding: 20px; border: 1px solid var(--gray-200); margin-top: 20px; clear: both; }
        .reviews-section h3 { font-size: 14px; margin-bottom: 12px; }
        .review-item { padding: 10px 0; border-bottom: 1px solid var(--gray-200); }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; flex-wrap: wrap; gap: 6px; }
        .review-user { font-weight: 600; font-size: 12px; }
        .review-stars { color: var(--gold); font-size: 10px; }
        .review-date { font-size: 9px; color: var(--gray-500); }
        .review-comment { font-size: 12px; color: var(--gray-700); margin-top: 4px; }
        
        /* Modale produit */
        .product-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 16px; }
        .product-modal-content { background: var(--white); border-radius: 24px; max-width: 850px; width: 100%; max-height: 85vh; overflow-y: auto; cursor: default; padding: 20px; }
        .product-modal-body { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .product-main-image { width: 100%; height: 250px; object-fit: cover; border-radius: 16px; background: var(--gray-100); }
        .product-thumbnails { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .product-thumbnail { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .product-thumbnail.active { border-color: var(--primary); }
        .food-details { background: var(--gray-100); padding: 10px; border-radius: 12px; margin: 12px 0; font-size: 11px; }
        .variant-option { display: inline-block; margin: 3px; padding: 4px 10px; background: var(--gray-100); border-radius: 20px; cursor: pointer; font-size: 11px; }
        .btn-modal-add { background: var(--button-color, #1e40af); color: white; border: none; padding: 10px; border-radius: 40px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 16px; font-size: 13px; }
        
        .footer { border-top: 1px solid var(--gray-200); background: var(--white); margin-top: 48px; padding: 16px; text-align: center; font-size: 10px; color: var(--gray-500); }
        
        @media (max-width: 768px) {
            .product-modal-body { grid-template-columns: 1fr; }
            .carousel-slide { height: 180px; }
            .shop-header-custom { padding: 16px; }
            .shop-logo-large { width: 50px; height: 50px; }
            .shop-info h1 { font-size: 18px; }
            .products-container { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
            .shop-menu-vertical { width: 100%; float: none; margin-right: 0; margin-bottom: 12px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="resetToHome()"><h1>OUENZE</h1></div>
    <div class="search-wrapper">
        <div class="search-tabs">
            <span class="search-tab active" data-type="all">Tous</span>
            <span class="search-tab" data-type="shop">Boutiques</span>
            <span class="search-tab" data-type="product">Produits</span>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Rechercher boutique ou produit...">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
    </div>
    <div class="header-actions" id="headerActions"></div>
</div>
<div class="nav-row">
    <div class="nav-container">
        <div class="nav-links">
            <a onclick="resetToHome()" class="active">Accueil</a>
            <a onclick="resetToHome()">Boutiques</a>
            <a onclick="showCart()">Panier (<span id="cartCountHeader">0</span>)</a>
            <a onclick="showMyOrders()">Commandes</a>
            <a onclick="goToVendorDashboard()" id="vendorLink" style="display:none;">Ma boutique</a>
        </div>
        <div class="dropdown">
            <button class="dropdown-btn" id="dropdownBtn"><i class="fas fa-bars"></i> Menu</button>
            <div class="dropdown-content" id="dropdownContent">
                <a href="about.html">À propos</a>
                <a href="privacy.html">Confidentialité</a>
                <a href="help.html">Aide</a>
                <a href="invest.html">Investir</a>
                <a href="tracking.html">Suivi livraison</a>
            </div>
        </div>
    </div>
</div>

<div id="appContainer" class="main"></div>

<div class="footer">
    <p>© 2024 Ouenze Marketplace - Brazzaville, Congo</p>
</div>

<script>
    // ============ DONNÉES ============
    let currentUser = JSON.parse(localStorage.getItem('ouenze_current_user') || 'null');
    let shops = JSON.parse(localStorage.getItem('ouenze_shops') || '[]');
    let orders = JSON.parse(localStorage.getItem('ouenze_orders') || '[]');
    let cart = JSON.parse(localStorage.getItem('ouenze_cart') || '[]');
    let currentRanking = 'rating';
    let currentShop = null;
    let currentCategory = 'all';
    let carouselInterval = null;
    
    // Boutiques par défaut
    if (shops.length === 0) {
        shops = [
            { id: 1, name: "Élégance Africaine", city: "Brazzaville", quartier: "Moungali", rating: 5.0, totalRatings: 342, totalSales: 1250, 
              products: [{ id: 1, name: "Boubou Cérémonie", price: "65000", photos: [], stock: 25, colors: ["Or", "Bleu Royal"], sizes: ["S", "M", "L", "XL"], description: "Boubou traditionnel", productType: "standard" }], 
              categories: ["Boubou", "Accessoires"], reviews: [{ user: "Marie K.", rating: 5, comment: "Superbe qualité !", date: "2024-03-15" }], verified: true },
            { id: 2, name: "Tech Congo", city: "Brazzaville", quartier: "Centre-ville", rating: 4.8, totalRatings: 124, totalSales: 342, 
              products: [{ id: 1, name: "Smartphone", price: "85000", photos: [], stock: 10, colors: ["Noir", "Bleu"], sizes: [], description: "Smartphone haute performance", productType: "standard" }], 
              categories: ["Electronique"], reviews: [], verified: true }
        ];
        localStorage.setItem('ouenze_shops', JSON.stringify(shops));
    }
    
    function saveData() {
        localStorage.setItem('ouenze_shops', JSON.stringify(shops));
        localStorage.setItem('ouenze_orders', JSON.stringify(orders));
        localStorage.setItem('ouenze_cart', JSON.stringify(cart));
        if (currentUser) localStorage.setItem('ouenze_current_user', JSON.stringify(currentUser));
        else localStorage.removeItem('ouenze_current_user');
        updateCartCount();
        updateVendorLink();
    }
    
    function updateCartCount() {
        const count = cart.reduce((s, i) => s + i.quantity, 0);
        document.querySelectorAll('#cartCountHeader, .cart-count').forEach(el => { if(el) el.innerText = count; });
    }
    
    function updateVendorLink() {
        const vendorLink = document.getElementById('vendorLink');
        if (currentUser && currentUser.type === 'vendeur') vendorLink.style.display = 'inline-block';
        else vendorLink.style.display = 'none';
    }
    
    function goToVendorDashboard() { window.location.href = 'vendor-dashboard.html'; }
    
    function generateStars(rating) {
        const full = Math.floor(rating);
        let stars = '';
        for (let i = 0; i < full; i++) stars += '<i class="fas fa-star"></i>';
        if (rating % 1 >= 0.5) stars += '<i class="fas fa-star-half-alt"></i>';
        for (let i = 0; i < 5 - Math.ceil(rating); i++) stars += '<i class="far fa-star"></i>';
        return stars;
    }
    
    function getCertificationBadge(rating, verified) {
        if (verified) return '<div class="certification-badge blue" title="Certifiée"><i class="fas fa-check-circle"></i></div>';
        if (rating >= 4.5) return '<div class="certification-badge gold" title="Top vendeur"><i class="fas fa-crown"></i></div>';
        return '';
    }
    
    function sortShops(shopsList, sortBy) {
        return [...shopsList].sort((a, b) => {
            if (sortBy === 'rating') return (b.rating || 0) - (a.rating || 0);
            if (sortBy === 'date') return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
            if (sortBy === 'sales') return (b.totalSales || 0) - (a.totalSales || 0);
            return 0;
        });
    }
    
    // ============ VUE ACCUEIL (GRILLE) ============
    function showHomePage() {
        const rankedShops = sortShops(shops, currentRanking);
        document.getElementById('appContainer').innerHTML = `
            <div class="ranking-bar">
                <div class="ranking-filters">
                    <button class="ranking-btn ${currentRanking === 'rating' ? 'active' : ''}" onclick="setRanking('rating')">⭐ Par note</button>
                    <button class="ranking-btn ${currentRanking === 'date' ? 'active' : ''}" onclick="setRanking('date')">🕐 Plus récent</button>
                    <button class="ranking-btn ${currentRanking === 'sales' ? 'active' : ''}" onclick="setRanking('sales')">📈 Plus vendues</button>
                </div>
                <div style="display:flex; gap:8px;">
                    <span class="rating-badge gold"><i class="fas fa-crown"></i> Or >4.5</span>
                    <span class="rating-badge silver"><i class="fas fa-star"></i> Argent 3-4.5</span>
                    <span class="rating-badge bronze"><i class="fas fa-star-half-alt"></i> Bronze 1.5-3</span>
                </div>
            </div>
            <div id="shopsGrid" class="shops-grid"></div>
            <div id="productsGrid" class="products-grid" style="display:none;"></div>
        `;
        displayShops(rankedShops);
        
        window.currentSearchType = 'all';
        document.querySelectorAll('.search-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.search-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                window.currentSearchType = tab.dataset.type;
                performSearch();
            });
        });
    }
    
    function setRanking(type) {
        currentRanking = type;
        showHomePage();
    }
    
    function displayShops(shopsList) {
        const grid = document.getElementById('shopsGrid');
        if (!grid) return;
        if (!shopsList.length) { grid.innerHTML = '<div style="text-align:center;padding:40px;">Aucune boutique</div>'; return; }
        grid.innerHTML = shopsList.map(shop => `
            <div class="shop-card" onclick="viewShopDetail(${shop.id})">
                ${getCertificationBadge(shop.rating || 0, shop.verified)}
                <div class="shop-logo-area">
                    <div class="shop-logo-img">${shop.logo ? `<img src="${shop.logo}">` : '<i class="fas fa-store" style="font-size:28px;"></i>'}</div>
                    <div class="shop-name">${escapeHtml(shop.name)}</div>
                    <div class="shop-rating">
                        <div class="stars">${generateStars(shop.rating || 0)}</div>
                        <span>(${shop.totalRatings || 0} avis)</span>
                    </div>
                    <div style="font-size:11px;color:var(--gray-500);margin-top:4px;"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(shop.city || 'Brazzaville')}</div>
                </div>
                <div class="shop-details">
                    <div class="shop-metrics">
                        <div class="metric"><div class="metric-value">${shop.products?.length || 0}</div><div>Produits</div></div>
                        <div class="metric"><div class="metric-value">${shop.totalSales || 0}</div><div>Ventes</div></div>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    function displayProducts(productsList) {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        grid.style.display = 'grid';
        document.getElementById('shopsGrid').style.display = 'none';
        if (!productsList.length) { grid.innerHTML = '<div style="text-align:center;padding:40px;">Aucun produit</div>'; return; }
        grid.innerHTML = productsList.map(p => `
            <div class="product-card" onclick="openProductModal(${p.shopId}, ${p.id})">
                <img src="${p.photos?.[0] || 'https://via.placeholder.com/300x200'}" class="product-image">
                <div class="product-info">
                    <div class="product-title">${escapeHtml(p.name)}</div>
                    <div class="product-price">${p.price} FCFA</div>
                    <div style="font-size:10px;color:var(--gray-500);">${escapeHtml(p.shopName)}</div>
                    <button class="btn-custom" style="background:var(--primary);padding:6px;border-radius:30px;width:100%;margin-top:6px;border:none;color:white;cursor:pointer;" onclick="event.stopPropagation();addToCart(${p.shopId}, ${p.id}, '${escapeHtml(p.name)}', '${p.price}')">Ajouter au panier</button>
                </div>
            </div>
        `).join('');
    }
    
    function performSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        if (!query) { displayShops(sortShops(shops, currentRanking)); document.getElementById('productsGrid').style.display = 'none'; document.getElementById('shopsGrid').style.display = 'grid'; return; }
        
        if (window.currentSearchType === 'shop') {
            const filtered = shops.filter(s => s.name.toLowerCase().includes(query));
            displayShops(filtered);
            document.getElementById('productsGrid').style.display = 'none';
            document.getElementById('shopsGrid').style.display = 'grid';
        } else if (window.currentSearchType === 'product') {
            const allProducts = [];
            shops.forEach(shop => {
                (shop.products || []).forEach(p => {
                    if (p.name.toLowerCase().includes(query)) allProducts.push({ ...p, shopId: shop.id, shopName: shop.name });
                });
            });
            displayProducts(allProducts);
        } else {
            const filteredShops = shops.filter(s => s.name.toLowerCase().includes(query));
            const allProducts = [];
            shops.forEach(shop => {
                (shop.products || []).forEach(p => {
                    if (p.name.toLowerCase().includes(query)) allProducts.push({ ...p, shopId: shop.id, shopName: shop.name });
                });
            });
            if (filteredShops.length > 0) { displayShops(filteredShops); document.getElementById('productsGrid').style.display = 'none'; }
            else if (allProducts.length > 0) displayProducts(allProducts);
            else displayShops([]);
        }
    }
    
    // ============ VUE BOUTIQUE DÉTAILLÉE ============
    function viewShopDetail(shopId) {
        const shop = shops.find(s => s.id === shopId);
        if (!shop) return;
        currentShop = shop;
        currentCategory = 'all';
        
        const design = shop.design || {};
        const menu = shop.menu || { categories: [], position: 'horizontal', bg: design.primary || '#1e40af', text: '#ffffff', radius: 0 };
        const primaryColor = design.primary || '#1e40af';
        const buttonColor = design.button || primaryColor;
        const productRadius = design.prodRadius || 12;
        const productImgHeight = design.prodImgHeight || 150;
        const productWidth = design.prodWidth || 220;
        const productGap = design.prodGap || 20;
        const layout = design.layout || 'grid';
        const carouselRadius = design.carouselRadius || 12;
        const carouselHeight = design.carouselHeight || 250;
        const logoBorderRadius = design.logoShape === 'square' ? '0px' : design.logoShape === 'circle' ? '50%' : '12px';
        
        const isHorizontal = menu.position === 'horizontal';
        const isVerticalLeft = menu.position === 'vertical-left';
        const isVerticalRight = menu.position === 'vertical-right';
        
        let menuHtml = '';
        if (menu.categories && menu.categories.length > 0) {
            if (isHorizontal) {
                menuHtml = `<div class="shop-menu shop-menu-horizontal" style="background:${menu.bg}; color:${menu.text}; border-radius:${menu.radius}px;">
                    ${menu.categories.map(cat => `
                        <div class="shop-menu-item">
                            ${escapeHtml(cat.name)}
                            ${cat.subcategories && cat.subcategories.length ? `<div class="shop-submenu">${cat.subcategories.map(sub => `<div class="shop-submenu-item">${escapeHtml(sub)}</div>`).join('')}</div>` : ''}
                        </div>
                    `).join('')}
                </div>`;
            } else {
                const floatStyle = isVerticalLeft ? 'float: left; margin-right: 20px;' : 'float: right; margin-left: 20px;';
                menuHtml = `<div class="shop-menu shop-menu-vertical" style="background:${menu.bg}; color:${menu.text}; border-radius:${menu.radius}px; ${floatStyle} width:180px;">
                    ${menu.categories.map(cat => `
                        <div class="shop-menu-item">
                            ${escapeHtml(cat.name)}
                            ${cat.subcategories && cat.subcategories.length ? `<div class="shop-submenu">${cat.subcategories.map(sub => `<div class="shop-submenu-item">${escapeHtml(sub)}</div>`).join('')}</div>` : ''}
                        </div>
                    `).join('')}
                </div>`;
            }
        }
        
        const contentMargin = isVerticalLeft ? 'margin-left: 200px;' : (isVerticalRight ? 'margin-right: 200px;' : '');
        
        document.getElementById('appContainer').innerHTML = `
            <button class="back-btn" onclick="resetToHome()"><i class="fas fa-arrow-left"></i> Retour aux boutiques</button>
            <style>
                .shop-header-custom { background: linear-gradient(135deg, ${primaryColor}, ${primaryColor}aa); }
                .category-btn.active { background: ${primaryColor}; }
                .btn-add-cart { background: ${buttonColor}; border-radius: ${productRadius}px; }
                .product-card { border-radius: ${productRadius}px; }
                .product-image { height: ${productImgHeight}px; }
                .products-container { display: ${layout === 'grid' ? 'grid' : 'flex'}; ${layout === 'grid' ? `grid-template-columns: repeat(auto-fill, minmax(${productWidth}px, 1fr));` : 'flex-direction: column;'} gap: ${productGap}px; }
                .carousel-container { border-radius: ${carouselRadius}px; height: ${carouselHeight}px; }
                .carousel-slide { height: ${carouselHeight}px; }
                .shop-logo-large { border-radius: ${logoBorderRadius}; }
            </style>
            <div class="shop-header-custom">
                <div class="shop-header-content">
                    <div class="shop-logo-large">
                        ${shop.logo ? `<img src="${shop.logo}">` : '<i class="fas fa-store" style="font-size:32px;"></i>'}
                    </div>
                    <div class="shop-info">
                        <h1>${escapeHtml(shop.name)}</h1>
                        <p>${escapeHtml(shop.description || '')}</p>
                        <div class="shop-rating">
                            <div class="stars">${generateStars(shop.rating || 0)}</div>
                            <span>${shop.rating || 0} (${shop.totalRatings || 0} avis)</span>
                            ${shop.verified ? '<span class="certification-badge" style="background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:20px;margin-left:8px;"><i class="fas fa-check-circle"></i> Certifiée</span>' : ''}
                        </div>
                        <div style="margin-top:4px; font-size:11px;"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(shop.address || shop.city + ', ' + shop.quartier)}</div>
                    </div>
                </div>
            </div>
            ${menuHtml}
            <div class="${isHorizontal ? '' : 'clearfix'}" style="${contentMargin}">
                ${shop.carousel && shop.carousel.length ? `
                <div class="carousel-container" id="shopCarousel">
                    ${shop.carousel.map((media, idx) => `
                        ${media.type === 'image' ? 
                            `<img src="${media.src}" class="carousel-slide ${idx === 0 ? 'active' : ''}">` : 
                            `<video src="${media.src}" class="carousel-slide ${idx === 0 ? 'active' : ''}" autoplay muted loop></video>`
                        }
                    `).join('')}
                    <button class="carousel-btn carousel-prev" onclick="changeCarouselSlide(-1)">❮</button>
                    <button class="carousel-btn carousel-next" onclick="changeCarouselSlide(1)">❯</button>
                    <div class="carousel-dots">
                        ${shop.carousel.map((_, idx) => `<div class="carousel-dot ${idx === 0 ? 'active' : ''}" onclick="goToCarouselSlide(${idx})"></div>`).join('')}
                    </div>
                </div>
                ` : ''}
                
                <div class="categories-filter" id="shopCategoriesFilter">
                    <button class="category-btn active" data-cat="all">Tous</button>
                    ${(shop.categories || []).map(cat => `<button class="category-btn" data-cat="${escapeHtml(cat)}">${escapeHtml(cat)}</button>`).join('')}
                </div>
                
                <div id="shopProductsContainer" class="products-container"></div>
                
                <div class="reviews-section">
                    <h3><i class="fas fa-star" style="color:var(--gold);"></i> Avis clients</h3>
                    ${(shop.reviews || []).length ? shop.reviews.map(r => `
                        <div class="review-item">
                            <div class="review-header">
                                <span class="review-user">${escapeHtml(r.user)}</span>
                                <div class="review-stars">${generateStars(r.rating)}</div>
                                <span class="review-date">${new Date(r.date).toLocaleDateString()}</span>
                            </div>
                            <div class="review-comment">${escapeHtml(r.comment || '')}</div>
                        </div>
                    `).join('') : '<p style="color:var(--gray-500);">Aucun avis pour le moment</p>'}
                </div>
            </div>
        `;
        
        displayShopProducts();
        
        document.querySelectorAll('#shopCategoriesFilter .category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#shopCategoriesFilter .category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.cat;
                displayShopProducts();
            });
        });
        
        startShopCarousel();
    }
    
    function displayShopProducts() {
        const container = document.getElementById('shopProductsContainer');
        if (!container) return;
        let products = currentShop.products || [];
        if (currentCategory !== 'all') products = products.filter(p => p.category === currentCategory);
        
        const design = currentShop.design || {};
        const buttonColor = design.button || '#1e40af';
        const productRadius = design.prodRadius || 12;
        const productImgHeight = design.prodImgHeight || 150;
        
        if (!products.length) {
            container.innerHTML = '<div style="text-align:center;padding:40px;">Aucun produit dans cette catégorie</div>';
            return;
        }
        
        container.innerHTML = products.map(p => `
            <div class="product-card" onclick="openProductModal(${currentShop.id}, ${p.id})">
                <img src="${p.photos?.[0] || 'https://via.placeholder.com/300x200'}" class="product-image" style="height:${productImgHeight}px;">
                <div class="product-info">
                    ${p.productType === 'food' ? '<div class="product-badge"><i class="fas fa-utensils"></i> Alimentaire</div>' : ''}
                    <div class="product-title">${escapeHtml(p.name)}</div>
                    <div class="product-price">${p.price} FCFA</div>
                    <div class="product-stock">Stock: ${p.stock || 0}</div>
                    <button class="btn-add-cart" style="background:${buttonColor}; border-radius:${productRadius}px;" onclick="event.stopPropagation();addToCart(${currentShop.id}, ${p.id}, '${escapeHtml(p.name)}', '${p.price}')">Ajouter au panier</button>
                </div>
            </div>
        `).join('');
    }
    
    function startShopCarousel() {
        if (carouselInterval) clearInterval(carouselInterval);
        const speed = currentShop.design?.carouselSpeed || 0;
        if (speed > 0 && currentShop.carousel && currentShop.carousel.length > 1) {
            carouselInterval = setInterval(() => {
                const slides = document.querySelectorAll('#shopCarousel .carousel-slide');
                if (!slides.length) return;
                let activeIdx = Array.from(slides).findIndex(s => s.classList.contains('active'));
                slides[activeIdx].classList.remove('active');
                const nextIdx = (activeIdx + 1) % slides.length;
                slides[nextIdx].classList.add('active');
                document.querySelectorAll('#shopCarousel .carousel-dot').forEach((dot, i) => {
                    dot.classList.toggle('active', i === nextIdx);
                });
            }, speed * 1000);
        }
    }
    
    window.changeCarouselSlide = function(direction) {
        const slides = document.querySelectorAll('#shopCarousel .carousel-slide');
        if (!slides.length) return;
        let activeIdx = Array.from(slides).findIndex(s => s.classList.contains('active'));
        slides[activeIdx].classList.remove('active');
        let newIdx = (activeIdx + direction + slides.length) % slides.length;
        slides[newIdx].classList.add('active');
        document.querySelectorAll('#shopCarousel .carousel-dot').forEach((dot, i) => {
            dot.classList.toggle('active', i === newIdx);
        });
        if (carouselInterval) { clearInterval(carouselInterval); startShopCarousel(); }
    };
    
    window.goToCarouselSlide = function(idx) {
        const slides = document.querySelectorAll('#shopCarousel .carousel-slide');
        if (!slides.length) return;
        slides.forEach(s => s.classList.remove('active'));
        slides[idx].classList.add('active');
        document.querySelectorAll('#shopCarousel .carousel-dot').forEach((dot, i) => {
            dot.classList.toggle('active', i === idx);
        });
        if (carouselInterval) { clearInterval(carouselInterval); startShopCarousel(); }
    };
    
    // ============ MODALE PRODUIT ============
    function openProductModal(shopId, productId) {
        const shop = shops.find(s => s.id === shopId);
        const product = shop?.products?.find(p => p.id === productId);
        if (!product) return;
        const photos = product.photos && product.photos.length ? product.photos : ['https://via.placeholder.com/600x400'];
        const design = shop.design || {};
        const buttonColor = design.button || '#1e40af';
        
        const modal = document.createElement('div'); modal.className = 'product-modal';
        modal.innerHTML = `
            <div class="product-modal-content">
                <div style="display:flex; justify-content:flex-end;"><span style="font-size:24px;cursor:pointer;" onclick="this.closest('.product-modal').remove()">&times;</span></div>
                <div class="product-modal-body">
                    <div>
                        <img id="modalMainImage" src="${photos[0]}" class="product-main-image">
                        <div class="product-thumbnails">
                            ${photos.map((p, i) => `<img src="${p}" class="product-thumbnail" data-index="${i}">`).join('')}
                        </div>
                    </div>
                    <div>
                        <h2>${escapeHtml(product.name)}</h2>
                        <div class="product-price" style="font-size:20px;">${product.price} FCFA</div>
                        <div class="product-stock">Stock: ${product.stock || 0}</div>
                        ${product.productType === 'food' ? `
                        <div class="food-details">
                            <strong><i class="fas fa-utensils"></i> Informations alimentaires</strong><br>
                            ${product.expiryDate ? `📅 Expiration: ${escapeHtml(product.expiryDate)}<br>` : ''}
                            ${product.weight ? `⚖️ Poids: ${escapeHtml(product.weight)}<br>` : ''}
                            ${product.origin ? `🌍 Origine: ${escapeHtml(product.origin)}<br>` : ''}
                            ${product.ingredients ? `📋 Ingrédients: ${escapeHtml(product.ingredients)}` : ''}
                        </div>
                        ` : ''}
                        ${product.colors && product.colors.length ? `
                            <div class="variant-selector"><strong>Couleurs:</strong><br>
                                ${product.colors.map(c => `<span class="variant-option" style="background:${c}; color:white;">${c}</span>`).join('')}
                            </div>
                        ` : ''}
                        ${product.sizes && product.sizes.length ? `
                            <div class="variant-selector"><strong>Tailles:</strong><br>
                                ${product.sizes.map(s => `<span class="variant-option">${s}</span>`).join('')}
                            </div>
                        ` : ''}
                        <div class="product-description" style="margin:12px 0;">${escapeHtml(product.description || 'Aucune description disponible')}</div>
                        <button class="btn-modal-add" style="background:${buttonColor};" onclick="addToCartFromModal(${shop.id}, ${product.id}, '${escapeHtml(product.name)}', '${product.price}')">Ajouter au panier</button>
                    </div>
                </div>
            </div>`;
        document.body.appendChild(modal);
        
        document.querySelectorAll('.product-thumbnail').forEach((thumb, idx) => {
            thumb.addEventListener('click', () => {
                document.getElementById('modalMainImage').src = thumb.src;
                document.querySelectorAll('.product-thumbnail').forEach(t => t.classList.remove('active'));
                thumb.classList.add('active');
            });
        });
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }
    
    function addToCartFromModal(shopId, productId, productName, price) {
        if (!currentUser) { alert("Connectez-vous"); openLoginModal(); return; }
        const existing = cart.find(i => i.productId === productId && i.shopId === shopId);
        if (existing) existing.quantity++;
        else cart.push({ productId, productName, price: parseFloat(price), quantity: 1, shopId, shopName: shops.find(s=>s.id===shopId)?.name });
        saveData();
        alert(`${productName} ajouté au panier`);
        document.querySelector('.product-modal')?.remove();
    }
    
    function addToCart(shopId, productId, productName, price) {
        if (!currentUser) { alert("Connectez-vous"); openLoginModal(); return; }
        const existing = cart.find(i => i.productId === productId && i.shopId === shopId);
        if (existing) existing.quantity++;
        else cart.push({ productId, productName, price: parseFloat(price), quantity: 1, shopId, shopName: shops.find(s=>s.id===shopId)?.name });
        saveData();
        alert(`${productName} ajouté au panier`);
    }
    
    // ============ PANIER ET COMMANDES ============
    function showCart() { alert("Fonctionnalité panier à venir"); }
    function showMyOrders() { alert("Fonctionnalité commandes à venir"); }
    
    // ============ AUTHENTIFICATION ============
    function openLoginModal() {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:2000;display:flex;align-items:center;justify-content:center;';
        modal.innerHTML = `
            <div style="background:white;border-radius:24px;width:100%;max-width:380px;padding:24px;">
                <h3 style="margin-bottom:16px;">Connexion</h3>
                <div><input type="email" id="loginEmail" placeholder="Email" style="width:100%;padding:10px;border:1px solid var(--gray-200);border-radius:10px;margin-bottom:12px;"></div>
                <div><input type="password" id="loginPassword" placeholder="Mot de passe" style="width:100%;padding:10px;border:1px solid var(--gray-200);border-radius:10px;margin-bottom:20px;"></div>
                <button onclick="doLogin()" style="width:100%;padding:10px;background:var(--primary);color:white;border:none;border-radius:40px;cursor:pointer;">Se connecter</button>
                <div style="text-align:center;margin-top:12px;"><a href="#" onclick="this.closest('.modal').remove();openRegisterModal();">Créer un compte</a></div>
            </div>`;
        document.body.appendChild(modal);
        window.doLogin = () => {
            const email = document.getElementById('loginEmail').value.trim();
            if (email) { currentUser = { name: email.split('@')[0], email, type: 'client' }; saveData(); updateHeaderUI(); modal.remove(); resetToHome(); alert(`Bienvenue ${currentUser.name}`); }
            else alert("Email requis");
        };
    }
    
    function openRegisterModal() { alert("Inscription disponible"); }
    
    function updateHeaderUI() {
        const container = document.getElementById('headerActions');
        if (currentUser) {
            container.innerHTML = `<div class="user-menu" onclick="goToVendorDashboard()"><div class="user-avatar">${currentUser.name.charAt(0)}</div><div><span style="font-size:11px;">${currentUser.name.split(' ')[0]}</span><br><small>${currentUser.type === 'vendeur' ? 'Vendeur' : 'Client'}</small></div><button onclick="event.stopPropagation();logout()" style="background:none;border:none;cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button></div><div class="cart-icon" onclick="showCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count">${cart.reduce((s,i)=>s+i.quantity,0)}</span></div>`;
        } else {
            container.innerHTML = `<button class="auth-btn" onclick="openLoginModal()">Connexion</button><button class="auth-btn" onclick="openRegisterModal()">Inscription</button><div class="cart-icon" onclick="showCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count">0</span></div>`;
        }
        updateCartCount();
        updateVendorLink();
    }
    
    function logout() { currentUser = null; saveData(); updateHeaderUI(); resetToHome(); alert("Déconnexion réussie"); }
    
    function resetToHome() {
        const url = new URL(window.location.href);
        url.searchParams.delete('id');
        window.history.pushState({}, '', url);
        showHomePage();
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    // ============ INITIALISATION ============
    window.showHomePage = showHomePage;
    window.viewShopDetail = viewShopDetail;
    window.openProductModal = openProductModal;
    window.addToCart = addToCart;
    window.setRanking = setRanking;
    window.resetToHome = resetToHome;
    window.performSearch = performSearch;
    window.goToVendorDashboard = goToVendorDashboard;
    window.showCart = showCart;
    window.showMyOrders = showMyOrders;
    
    document.addEventListener('DOMContentLoaded', () => {
        updateHeaderUI();
        
        // Vérifier si un ID de boutique est présent dans l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const shopId = parseInt(urlParams.get('id'));
        
        if (shopId && shops.find(s => s.id === shopId)) {
            viewShopDetail(shopId);
        } else {
            showHomePage();
        }
        
        document.getElementById('searchBtn').addEventListener('click', performSearch);
        document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') performSearch(); });
        
        const dropBtn = document.getElementById('dropdownBtn');
        const dropCont = document.getElementById('dropdownContent');
        if(dropBtn) {
            dropBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropCont.classList.toggle('show');
                dropCont.style.opacity = dropCont.classList.contains('show') ? '1' : '0';
                dropCont.style.visibility = dropCont.classList.contains('show') ? 'visible' : 'hidden';
            });
            window.addEventListener('click', () => {
                dropCont.classList.remove('show');
                dropCont.style.opacity = '0';
                dropCont.style.visibility = 'hidden';
            });
        }
    });
</script>
</body>
