<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouenze Invest | Plateforme d'investissement</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1e293b; }
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --gold: #f59e0b;
            --silver: #94a3b8;
            --bronze: #b45309;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --white: #ffffff;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-500: #64748b;
            --gray-700: #334155;
        }
        .header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo h1 { font-size: 24px; font-weight: 800; color: var(--primary); cursor: pointer; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .auth-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--gray-100); border: none; }
        .user-menu { display: flex; align-items: center; gap: 12px; background: var(--gray-100); padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .user-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
        .nav-tabs { display: flex; gap: 4px; background: var(--white); padding: 8px 24px; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; }
        .nav-tab { padding: 8px 20px; background: none; border: none; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; color: var(--gray-500); }
        .nav-tab.active { background: var(--primary); color: white; }
        
        .main { max-width: 1400px; margin: 24px auto; padding: 0 24px; }
        
        .level-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 600; }
        .level-gold { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #b45309; border: 1px solid #f59e0b; }
        .level-silver { background: linear-gradient(135deg, #f1f5f9, #e2e8f0); color: #334155; border: 1px solid #94a3b8; }
        .level-bronze { background: linear-gradient(135deg, #ffedd5, #fed7aa); color: #9a3412; border: 1px solid #b45309; }
        
        .filters-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
        .sort-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .sort-btn { padding: 8px 16px; background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 30px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .sort-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .search-input { padding: 8px 16px; border: 1px solid var(--gray-200); border-radius: 30px; width: 250px; }
        
        .shops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .shop-card { background: var(--white); border-radius: 20px; border: 1px solid var(--gray-200); overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .shop-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1); }
        .shop-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
        .shop-card.gold::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .shop-card.silver::before { background: linear-gradient(90deg, #94a3b8, #cbd5e1); }
        .shop-card.bronze::before { background: linear-gradient(90deg, #b45309, #f59e0b); }
        .shop-logo { padding: 20px; text-align: center; background: linear-gradient(135deg, #f8fafc, #f1f5f9); }
        .shop-logo-img { width: 70px; height: 70px; margin: 0 auto; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .shop-name { margin-top: 12px; font-size: 18px; font-weight: 700; }
        .shop-rating { margin-top: 4px; font-size: 13px; color: var(--warning); }
        .shop-price { font-size: 20px; font-weight: 700; color: var(--primary); margin: 8px 0; }
        .shop-stats { padding: 16px; border-top: 1px solid var(--gray-200); display: flex; justify-content: space-between; font-size: 12px; color: var(--gray-500); }
        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }
        
        .shop-detail-container { background: var(--white); border-radius: 24px; border: 1px solid var(--gray-200); padding: 24px; margin-bottom: 24px; }
        .shop-detail-header { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; }
        .shop-detail-logo { width: 100px; height: 100px; background: var(--gray-100); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .shop-level { margin-top: 8px; }
        .chart-tabs { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; border-bottom: 1px solid var(--gray-200); padding-bottom: 12px; }
        .chart-tab { padding: 8px 20px; background: var(--gray-100); border-radius: 30px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .chart-tab.active { background: var(--primary); color: white; }
        .chart-container { height: 300px; margin: 20px 0; }
        .table-container { overflow-x: auto; margin: 20px 0; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--gray-200); }
        .data-table th { background: var(--gray-100); font-weight: 600; }
        .investment-range { background: linear-gradient(135deg, var(--gray-100), var(--white)); padding: 16px; border-radius: 16px; margin: 16px 0; border-left: 4px solid var(--primary); }
        .fee-info { display: inline-block; padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; margin: 8px 0; }
        .fee-gold { background: #fef3c7; color: #b45309; }
        .fee-silver { background: #f1f5f9; color: #334155; }
        .fee-bronze { background: #ffedd5; color: #9a3412; }
        .vendor-bonus { background: #dbeafe; color: #1e40af; padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; display: inline-block; margin-left: 8px; }
        .action-buttons { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        
        .activity-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--gray-200); transition: 0.2s; }
        .activity-item:hover { background: var(--gray-100); }
        .activity-info h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .activity-info p { font-size: 12px; color: var(--gray-500); }
        .activity-status { font-size: 12px; padding: 4px 12px; border-radius: 20px; }
        .status-completed { background: #dbeafe; color: #1e40af; }
        .status-pending { background: #fed7aa; color: #b45309; }
        .status-active { background: #d1fae5; color: #059669; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-card { background: var(--white); border-radius: 24px; max-width: 500px; width: 100%; padding: 28px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: 10px; }
        
        .footer { border-top: 1px solid var(--gray-200); background: var(--white); margin-top: 60px; padding: 24px; text-align: center; font-size: 12px; color: var(--gray-500); }
        
        @media (max-width: 700px) { .shops-grid { grid-template-columns: 1fr; } .action-buttons { flex-direction: column; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="window.location.href='index.html'"><h1>OUENZE INVEST</h1></div>
    <div class="header-actions" id="headerActions"></div>
</div>

<div class="nav-tabs">
    <button class="nav-tab active" data-tab="invest">Investir</button>
    <button class="nav-tab" data-tab="activities">Mes activités</button>
    <button class="nav-tab" data-tab="portfolio" onclick="window.location.href='portfolio.html'">Mon portefeuille</button>
</div>

<div class="main" id="appContainer"></div>

<div class="footer">
    <p>© 2024 Ouenze Invest - Plateforme d'investissement certifiée | Transactions sécurisées par séquestre</p>
</div>

<script>
    let currentUser = JSON.parse(localStorage.getItem('ouenze_current_user') || 'null');
    let shops = JSON.parse(localStorage.getItem('ouenze_shops') || '[]');
    let investments = JSON.parse(localStorage.getItem('ouenze_investments') || '[]');
    let userHoldings = JSON.parse(localStorage.getItem('ouenze_holdings') || '[]');
    let marketHistory = JSON.parse(localStorage.getItem('ouenze_market_history') || '[]');
    let orders = JSON.parse(localStorage.getItem('ouenze_orders') || '[]');
    let currentSort = 'rating';
    let currentShop = null;
    let currentChart = null;
    
    // Synchronisation des données avec portfolio.html
    function syncPortfolioData() {
        // Mettre à jour les avoirs (holdings) à partir des investissements approuvés
        const approvedRequests = JSON.parse(localStorage.getItem('ouenze_investment_requests') || '[]');
        const approvedInvestments = approvedRequests.filter(r => r.status === 'approved' && r.type === 'buy_shares');
        
        approvedInvestments.forEach(req => {
            const existingHolding = userHoldings.find(h => h.shopId === req.shopId && h.userId === currentUser?.email);
            if (existingHolding) {
                existingHolding.shares += req.quantity;
                existingHolding.investedAmount += req.total;
            } else {
                userHoldings.push({
                    id: Date.now(),
                    shopId: req.shopId,
                    shopName: req.shopName,
                    userId: currentUser?.email,
                    shares: req.quantity,
                    investedAmount: req.total,
                    buyPrice: req.pricePerShare,
                    date: req.date
                });
            }
        });
        localStorage.setItem('ouenze_holdings', JSON.stringify(userHoldings));
    }
    
    function updateHeaderUI() {
        const container = document.getElementById('headerActions');
        if (currentUser) {
            container.innerHTML = `<div class="user-menu" onclick="window.location.href='vendor-dashboard.html'"><div class="user-avatar">${currentUser.name.charAt(0)}</div><div>${currentUser.name.split(' ')[0]}<br><small>Investisseur</small></div><button onclick="event.stopPropagation();logout()" style="background:none;border:none;cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button></div>`;
        } else {
            container.innerHTML = `<button class="auth-btn" onclick="openLoginModal()">Connexion</button>`;
        }
    }
    
    function openLoginModal() {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>Connexion</h3>
                <div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div>
                <div class="form-group"><input type="password" id="loginPassword" placeholder="Mot de passe"></div>
                <button class="btn-primary" onclick="doLogin()">Se connecter</button>
                <div style="text-align:center;margin-top:16px;">Pas de compte ? <a href="#" onclick="window.location.href='index.html'">Inscription</a></div>
            </div>`;
        document.body.appendChild(modal);
        window.doLogin = () => {
            const email = document.getElementById('loginEmail').value.trim();
            if (email) {
                currentUser = { name: email.split('@')[0], email, type: 'investor' };
                localStorage.setItem('ouenze_current_user', JSON.stringify(currentUser));
                updateHeaderUI();
                modal.remove();
                syncPortfolioData();
                showInvestPage();
                alert(`Bienvenue ${currentUser.name}`);
            } else alert("Email requis");
        };
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem('ouenze_current_user');
        updateHeaderUI();
        showInvestPage();
    }
    
    // Calcul cohérent de la valorisation
    function calculateValuation(shop) {
        const baseValue = 1000000;
        const productValue = (shop.products?.length || 0) * 50000;
        const ratingBonus = (shop.rating || 0) * 150000;
        const salesBonus = (shop.totalSales || 0) * 1000;
        const assetsValue = (shop.assets || []).reduce((sum, a) => sum + (a.value || 0), 0);
        return baseValue + productValue + ratingBonus + salesBonus + assetsValue;
    }
    
    function calculateSharePrice(valuation) {
        return Math.round(valuation / 1000);
    }
    
    function getShopLevel(shop) {
        const annualRevenue = (shop.monthlyRevenue || 500000) * 12;
        const valuation = calculateValuation(shop);
        const rating = shop.rating || 0;
        const hasPhysicalStore = shop.hasPhysicalStore || false;
        
        if (rating >= 4.5 && annualRevenue > 10000000 && valuation > 1000000 && hasPhysicalStore) {
            return { level: 'gold', name: 'Or', ouenzeFee: 21, vendorBonus: 1, minInvestment: 500000, maxInvestment: 5000000, color: '#f59e0b', bg: '#fef3c7' };
        }
        else if (rating >= 4 && rating < 5 && annualRevenue >= 5000000 && annualRevenue <= 10000000 && valuation > 500000) {
            return { level: 'silver', name: 'Argent', ouenzeFee: 21.5, vendorBonus: 0.5, minInvestment: 250000, maxInvestment: 2000000, color: '#94a3b8', bg: '#f1f5f9' };
        }
        else if (rating >= 3) {
            return { level: 'bronze', name: 'Bronze', ouenzeFee: 22, vendorBonus: 0, minInvestment: 100000, maxInvestment: 1000000, color: '#b45309', bg: '#ffedd5' };
        }
        return { level: null, name: 'Non éligible', ouenzeFee: 22, vendorBonus: 0, minInvestment: 0, maxInvestment: 0, color: '#64748b', bg: '#f1f5f9' };
    }
    
    // Génération d'historique cohérente pour les graphiques
    function generatePriceHistory(shopId, valuation) {
        const history = [];
        let currentPrice = valuation / 1000;
        for (let i = 30; i >= 0; i--) {
            const change = (Math.random() - 0.5) * 0.05;
            currentPrice = currentPrice * (1 + change);
            history.push({
                date: new Date(Date.now() - i * 86400000).toISOString().split('T')[0],
                price: Math.max(100, Math.round(currentPrice))
            });
        }
        return history;
    }
    
    function getShopHistory(shopId) {
        let history = marketHistory.find(h => h.shopId === shopId);
        if (!history) {
            history = { shopId, data: generatePriceHistory(shopId, calculateValuation(shops.find(s => s.id === shopId))) };
            marketHistory.push(history);
            localStorage.setItem('ouenze_market_history', JSON.stringify(marketHistory));
        }
        return history.data;
    }
    
    function showInvestPage() {
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.tab === 'invest');
        });
        
        const eligibleShops = shops.filter(s => s.rating >= 3);
        const sortedShops = sortShops(eligibleShops, currentSort);
        
        document.getElementById('appContainer').innerHTML = `
            <div class="filters-bar">
                <div class="sort-buttons">
                    <button class="sort-btn ${currentSort === 'rating' ? 'active' : ''}" onclick="setSort('rating')">Par note</button>
                    <button class="sort-btn ${currentSort === 'price' ? 'active' : ''}" onclick="setSort('price')">Par prix</button>
                    <button class="sort-btn ${currentSort === 'growth' ? 'active' : ''}" onclick="setSort('growth')">Par croissance</button>
                    <button class="sort-btn ${currentSort === 'level' ? 'active' : ''}" onclick="setSort('level')">Par niveau</button>
                </div>
                <input type="text" id="searchShop" class="search-input" placeholder="Rechercher une boutique..." onkeyup="filterShops()">
            </div>
            <div class="shops-grid" id="shopsGrid"></div>
        `;
        renderShopsGrid(sortedShops);
    }
    
    function sortShops(shopsList, sortBy) {
        return [...shopsList].sort((a, b) => {
            if (sortBy === 'rating') return (b.rating || 0) - (a.rating || 0);
            if (sortBy === 'price') return calculateValuation(b) - calculateValuation(a);
            if (sortBy === 'growth') return (b.growthRate || 0) - (a.growthRate || 0);
            if (sortBy === 'level') {
                const levelA = getShopLevel(a).level;
                const levelB = getShopLevel(b).level;
                const order = { gold: 3, silver: 2, bronze: 1 };
                return (order[levelB] || 0) - (order[levelA] || 0);
            }
            return 0;
        });
    }
    
    function renderShopsGrid(shopsList) {
        const grid = document.getElementById('shopsGrid');
        if (!grid) return;
        if (!shopsList.length) { grid.innerHTML = '<div style="text-align:center;padding:60px;">Aucune boutique éligible (minimum 3 étoiles requises)</div>'; return; }
        grid.innerHTML = shopsList.map(shop => {
            const level = getShopLevel(shop);
            const valuation = calculateValuation(shop);
            const sharePrice = calculateSharePrice(valuation);
            const levelClass = level.level === 'gold' ? 'gold' : level.level === 'silver' ? 'silver' : 'bronze';
            return `
                <div class="shop-card ${levelClass}" onclick="showShopDetail(${shop.id})">
                    <div class="shop-logo">
                        <div class="shop-logo-img">${shop.logo ? `<img src="${shop.logo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : '<i class="fas fa-store" style="font-size:32px;"></i>'}</div>
                        <div class="shop-name">${escapeHtml(shop.name)}</div>
                        <div class="shop-rating">${'⭐'.repeat(Math.floor(shop.rating || 0))} ${shop.rating || 0}/5 (${shop.totalRatings || 0} avis)</div>
                        <div class="shop-price">${valuation.toLocaleString()} FCFA</div>
                        <div class="shop-level"><span class="level-badge level-${level.level}"><i class="fas fa-crown"></i> ${level.name}</span></div>
                        <div style="font-size:11px; margin-top:6px;">💰 Commission: ${level.ouenzeFee}%</div>
                    </div>
                    <div class="shop-stats">
                        <span><i class="fas fa-box"></i> ${shop.products?.length || 0} produits</span>
                        <span class="trend-up"><i class="fas fa-arrow-up"></i> ${((Math.random() * 10) + 5).toFixed(1)}%</span>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function filterShops() {
        const query = document.getElementById('searchShop')?.value.toLowerCase() || '';
        const eligibleShops = shops.filter(s => s.rating >= 3);
        const filtered = eligibleShops.filter(s => s.name.toLowerCase().includes(query));
        renderShopsGrid(sortShops(filtered, currentSort));
    }
    
    function setSort(type) {
        currentSort = type;
        showInvestPage();
    }
    
    // ============ MES ACTIVITÉS ============
    function showActivitiesPage() {
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.tab === 'activities');
        });
        
        syncPortfolioData();
        
        const userInvestments = investments.filter(i => i.investor === currentUser?.email);
        const userOrders = orders.filter(o => o.userId === currentUser?.email);
        const userHoldingsList = userHoldings.filter(h => h.userId === currentUser?.email);
        
        const investedShopIds = [...new Set(userInvestments.map(i => i.shopId))];
        const orderedShopIds = [...new Set(userOrders.flatMap(o => o.items.map(i => i.shopId)))];
        const holdingShopIds = [...new Set(userHoldingsList.map(h => h.shopId))];
        const allActivityShopIds = [...new Set([...investedShopIds, ...orderedShopIds, ...holdingShopIds])];
        
        const activityShops = shops.filter(s => allActivityShopIds.includes(s.id));
        
        const activities = activityShops.map(shop => {
            const shopInvestments = userInvestments.filter(i => i.shopId === shop.id);
            const shopOrders = userOrders.filter(o => o.items.some(i => i.shopId === shop.id));
            const shopHoldings = userHoldingsList.filter(h => h.shopId === shop.id);
            const totalOrders = shopOrders.length;
            const totalSpent = shopOrders.reduce((sum, o) => sum + o.total, 0);
            const totalInvested = shopInvestments.reduce((sum, i) => sum + i.amount, 0);
            const currentShares = shopHoldings.reduce((sum, h) => sum + h.shares, 0);
            const valuation = calculateValuation(shop);
            const currentValue = currentShares * (valuation / 1000);
            
            return {
                shopId: shop.id,
                shopName: shop.name,
                shopLogo: shop.logo,
                rating: shop.rating,
                totalOrders, totalSpent, totalInvested, currentShares, currentValue,
                hasActiveInvestment: currentShares > 0,
                lastActivity: [...shopOrders, ...shopInvestments, ...shopHoldings].sort((a,b) => new Date(b.date) - new Date(a.date))[0]?.date
            };
        });
        
        document.getElementById('appContainer').innerHTML = `
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:20px; margin-bottom:32px;">
                <div class="stat-card" style="background:white; border-radius:20px; padding:20px; border:1px solid var(--gray-200);"><h3>Boutiques visitées</h3><div class="stat-value" style="font-size:28px; font-weight:700;">${activities.length}</div></div>
                <div class="stat-card" style="background:white; border-radius:20px; padding:20px; border:1px solid var(--gray-200);"><h3>Commandes passées</h3><div class="stat-value" style="font-size:28px; font-weight:700;">${activities.reduce((s,a)=>s+a.totalOrders,0)}</div></div>
                <div class="stat-card" style="background:white; border-radius:20px; padding:20px; border:1px solid var(--gray-200);"><h3>Dépenses totales</h3><div class="stat-value" style="font-size:28px; font-weight:700;">${activities.reduce((s,a)=>s+a.totalSpent,0).toLocaleString()} FCFA</div></div>
                <div class="stat-card" style="background:white; border-radius:20px; padding:20px; border:1px solid var(--gray-200);"><h3>Capital investi</h3><div class="stat-value" style="font-size:28px; font-weight:700;">${activities.reduce((s,a)=>s+a.totalInvested,0).toLocaleString()} FCFA</div></div>
            </div>
            
            <div style="background:white; border-radius:20px; border:1px solid var(--gray-200); overflow:hidden;">
                <div style="padding: 16px 20px; background: var(--gray-100); border-bottom: 1px solid var(--gray-200);">
                    <strong>Mes activités</strong>
                </div>
                ${activities.length > 0 ? activities.map(a => `
                    <div class="activity-item" style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--gray-200);">
                        <div class="activity-info">
                            <h4 style="font-size:16px; font-weight:600;">${escapeHtml(a.shopName)}</h4>
                            <p>${'⭐'.repeat(Math.floor(a.rating || 0))} ${a.rating || 0}/5</p>
                            <p style="font-size:11px; margin-top:4px;">
                                ${a.totalOrders > 0 ? `${a.totalOrders} commande(s) - ${a.totalSpent.toLocaleString()} FCFA` : ''}
                                ${a.totalInvested > 0 ? ` | Investi: ${a.totalInvested.toLocaleString()} FCFA` : ''}
                                ${a.currentShares > 0 ? ` | Actions: ${a.currentShares} (${a.currentValue.toLocaleString()} FCFA)` : ''}
                            </p>
                        </div>
                        <div class="activity-status ${a.hasActiveInvestment ? 'status-active' : (a.totalOrders > 0 ? 'status-completed' : 'status-pending')}" style="font-size:12px; padding:4px 12px; border-radius:20px;">
                            ${a.hasActiveInvestment ? 'Investissement actif' : (a.totalOrders > 0 ? 'Commandes passées' : 'Activité récente')}
                        </div>
                        <button class="btn-sm btn-outline" style="margin-left:12px; padding:6px 12px; border-radius:8px; background:var(--gray-100); border:1px solid var(--gray-200); cursor:pointer;" onclick="showShopDetail(${a.shopId})">Voir la boutique</button>
                    </div>
                `).join('') : '<div style="text-align:center;padding:60px;">Aucune activité pour le moment</div>'}
            </div>
        `;
    }
    
    async function showShopDetail(shopId) {
        const shop = shops.find(s => s.id === shopId);
        if (!shop) return;
        currentShop = shop;
        const level = getShopLevel(shop);
        const valuation = calculateValuation(shop);
        const sharePrice = calculateSharePrice(valuation);
        const history = getShopHistory(shopId);
        const userHolding = userHoldings.find(h => h.shopId === shopId && h.userId === currentUser?.email);
        const annualRevenue = (shop.monthlyRevenue || valuation * 0.1) * 12;
        
        const userInvestments = investments.filter(i => i.investor === currentUser?.email && i.shopId === shopId);
        const totalInvested = userInvestments.reduce((s,i)=>s+i.amount,0);
        const totalShares = userInvestments.reduce((s,i)=>s+i.quantity,0);
        
        document.getElementById('appContainer').innerHTML = `
            <button onclick="showInvestPage()" style="background:none;border:none;color:var(--primary);cursor:pointer;margin-bottom:20px;"><i class="fas fa-arrow-left"></i> Retour</button>
            <div class="shop-detail-container">
                <div class="shop-detail-header">
                    <div class="shop-detail-logo">${shop.logo ? `<img src="${shop.logo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : '<i class="fas fa-store" style="font-size:48px;"></i>'}</div>
                    <div>
                        <h1>${escapeHtml(shop.name)}</h1>
                        <div class="shop-rating">${'⭐'.repeat(Math.floor(shop.rating || 0))} ${shop.rating || 0}/5 (${shop.totalRatings || 0} avis)</div>
                        <div class="shop-level">
                            <span class="level-badge level-${level.level}"><i class="fas fa-crown"></i> Niveau ${level.name}</span>
                            <span class="fee-info fee-${level.level}"><i class="fas fa-percent"></i> Commission: ${level.ouenzeFee}%</span>
                        </div>
                        <div>📍 ${escapeHtml(shop.city || 'Brazzaville')}, ${escapeHtml(shop.quartier || '')}</div>
                        ${shop.hasPhysicalStore ? '<div><i class="fas fa-store"></i> Boutique physique certifiée</div>' : ''}
                    </div>
                </div>
                
                ${currentUser ? `
                <div class="investment-range">
                    <strong><i class="fas fa-chart-line"></i> Fourchette d'investissement</strong><br>
                    Minimum: ${level.minInvestment.toLocaleString()} FCFA | Maximum: ${level.maxInvestment.toLocaleString()} FCFA
                    ${totalInvested > 0 ? `<br><span style="color:var(--primary);">Votre investissement: ${totalInvested.toLocaleString()} FCFA (${totalShares} actions)</span>` : ''}
                </div>
                ` : ''}
                
                <div class="chart-tabs">
                    <button class="chart-tab active" onclick="switchChart('price')">Évolution du prix</button>
                    <button class="chart-tab" onclick="switchChart('volume')">Volume des transactions</button>
                    <button class="chart-tab" onclick="switchChart('revenue')">Chiffre d'affaires</button>
                    <button class="chart-tab" onclick="switchChart('assets')">Actifs vs Passifs</button>
                </div>
                <div class="chart-container">
                    <canvas id="shopChart"></canvas>
                </div>
                
                <div class="table-container">
                    <h3>Indicateurs financiers</h3>
                    <table class="data-table">
                        <tr><th>Valorisation totale</th><td>${valuation.toLocaleString()} FCFA</td></tr>
                        <tr><th>Prix par action (0.1%)</th><td>${sharePrice.toLocaleString()} FCFA</td></tr>
                        <tr><th>Chiffre d'affaires annuel</th><td>${annualRevenue.toLocaleString()} FCFA</td></tr>
                        <tr><th>Croissance estimée</th><td class="trend-up">+${shop.growthRate || 12}%</td></tr>
                        <tr><th>Commission Ouenze</th><td><span class="fee-info fee-${level.level}">${level.ouenzeFee}%</span></td></tr>
                    </table>
                </div>
                
                <div class="table-container">
                    <h3>Actifs et Passifs</h3>
                    <table class="data-table">
                        <thead><tr><th>Type</th><th>Désignation</th><th>Valeur (FCFA)</th></tr></thead>
                        <tbody>
                            ${(shop.assets || []).map(a => `<tr><td>Actif</td><td>${escapeHtml(a.name)}</td><td>${a.value.toLocaleString()} FCFA</td></tr>`).join('')}
                            ${(shop.liabilities || []).map(l => `<tr><td>Passif</td><td>${escapeHtml(l.name)}</td><td>${l.value.toLocaleString()} FCFA</td></tr>`).join('')}
                            ${(!shop.assets || shop.assets.length === 0) && (!shop.liabilities || shop.liabilities.length === 0) ? '<tr><td colspan="3">Aucune donnée disponible</td></tr>' : ''}
                        </tbody>
                    </table>
                </div>
                
                ${currentUser ? `
                <div class="action-buttons">
                    <button class="btn-primary" onclick="openBuySharesModal(${shop.id}, ${sharePrice}, ${level.minInvestment}, ${level.maxInvestment})">Acheter des actions</button>
                    ${totalShares > 0 ? `<button class="btn-danger" onclick="openSellSharesModal(${shop.id}, ${sharePrice}, ${totalShares})">Vendre des actions</button>` : ''}
                    <button class="btn-success" onclick="openAcquisitionModal(${shop.id}, ${valuation})">Acquérir la boutique</button>
                    <button class="btn-outline" onclick="window.location.href='index.html?id=${shop.id}'">Voir la boutique</button>
                </div>
                ` : `<div style="background:var(--gray-100);padding:16px;border-radius:12px;text-align:center;">Connectez-vous pour investir dans cette boutique</div>`}
            </div>
        `;
        
        drawChart(shopId, 'price', history);
    }
    
    function drawChart(shopId, type, history) {
        const ctx = document.getElementById('shopChart')?.getContext('2d');
        if (!ctx) return;
        if (currentChart) currentChart.destroy();
        
        let labels, data, label, color;
        if (type === 'price') {
            labels = history.map(h => h.date.slice(5));
            data = history.map(h => h.price);
            label = 'Prix par action (FCFA)';
            color = '#1e40af';
        } else if (type === 'volume') {
            labels = history.slice(-10).map(h => h.date.slice(5));
            data = labels.map(() => Math.floor(Math.random() * 100 + 20));
            label = 'Volume transacted';
            color = '#10b981';
        } else if (type === 'revenue') {
            labels = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
            data = labels.map(() => Math.floor(Math.random() * 500000 + 200000));
            label = 'CA mensuel (FCFA)';
            color = '#f59e0b';
        } else {
            labels = ['Actifs', 'Passifs'];
            const assetsValue = (currentShop?.assets || []).reduce((s, a) => s + (a.value || 0), 0);
            const liabilitiesValue = (currentShop?.liabilities || []).reduce((s, l) => s + (l.value || 0), 0);
            data = [assetsValue, liabilitiesValue];
            label = 'Valeur (FCFA)';
            color = ['#10b981', '#ef4444'];
        }
        
        if (type === 'assets') {
            currentChart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label, data, backgroundColor: color }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
            });
        } else {
            currentChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label, data, borderColor: color, backgroundColor: color + '20', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
            });
        }
    }
    
    function switchChart(type) {
        const history = getShopHistory(currentShop.id);
        drawChart(currentShop.id, type, history);
        document.querySelectorAll('.chart-tab').forEach(tab => tab.classList.remove('active'));
        event.target.classList.add('active');
    }
    
    async function checkPaymentInfo() {
        if (!currentUser) return false;
        if (currentUser.paymentMethod && currentUser.paymentDetails) return true;
        
        return new Promise((resolve) => {
            const modal = document.createElement('div'); modal.className = 'modal active';
            modal.innerHTML = `
                <div class="modal-card">
                    <h3>Informations de paiement requises</h3>
                    <p style="margin-bottom:16px;">Pour investir, vous devez renseigner vos coordonnées bancaires ou Mobile Money.</p>
                    <div class="form-group"><label>Mode de paiement</label>
                        <select id="payMethod"><option value="airtel">Airtel Money</option><option value="mtn">MTN Mobile Money</option><option value="visa">Visa/Mastercard</option><option value="paypal">PayPal</option></select>
                    </div>
                    <div class="form-group"><label>Identifiant / Numéro</label><input type="text" id="payDetails" placeholder="Numéro de compte ou email PayPal"></div>
                    <button class="btn-primary" style="width:100%;" onclick="savePaymentInfoAndResolve()">Enregistrer et continuer</button>
                    <button onclick="this.closest('.modal').remove()" style="margin-top:12px;background:none;border:none;">Annuler</button>
                </div>`;
            document.body.appendChild(modal);
            window.savePaymentInfoAndResolve = () => {
                const method = document.getElementById('payMethod').value;
                const details = document.getElementById('payDetails').value;
                if (!details) { alert("Veuillez entrer vos coordonnées"); return; }
                currentUser.paymentMethod = method;
                currentUser.paymentDetails = details;
                localStorage.setItem('ouenze_current_user', JSON.stringify(currentUser));
                modal.remove();
                resolve(true);
            };
        });
    }
    
    function openBuySharesModal(shopId, sharePrice, minInvestment, maxInvestment) {
        if (!currentUser) { alert("Connectez-vous"); return; }
        checkPaymentInfo().then(hasInfo => {
            if (!hasInfo) return;
            const modal = document.createElement('div'); modal.className = 'modal active';
            modal.innerHTML = `
                <div class="modal-card">
                    <h3>Acheter des actions</h3>
                    <div class="investment-range" style="margin-bottom:16px;">
                        Fourchette d'investissement:<br>
                        Minimum: ${minInvestment.toLocaleString()} FCFA | Maximum: ${maxInvestment.toLocaleString()} FCFA
                    </div>
                    <div class="form-group"><label>Nombre d'actions</label><input type="number" id="sharesQty" min="1" value="1"></div>
                    <div class="form-group"><label>Prix unitaire</label><input type="text" id="sharePrice" value="${sharePrice}" readonly disabled></div>
                    <div class="form-group"><strong>Total: <span id="totalPrice">${sharePrice}</span> FCFA</strong></div>
                    <div id="investmentWarning" style="font-size:12px;margin-top:8px;"></div>
                    <button class="btn-primary" onclick="submitBuyRequest(${shopId}, ${sharePrice}, ${minInvestment}, ${maxInvestment})">Soumettre la demande</button>
                    <button onclick="this.closest('.modal').remove()" style="margin-top:12px;background:none;border:none;">Annuler</button>
                </div>`;
            document.body.appendChild(modal);
            const qtyInput = document.getElementById('sharesQty');
            const totalSpan = document.getElementById('totalPrice');
            const warningSpan = document.getElementById('investmentWarning');
            qtyInput.addEventListener('input', (e) => {
                const total = e.target.value * sharePrice;
                totalSpan.innerText = total.toLocaleString();
                if (total < minInvestment) {
                    warningSpan.innerHTML = '⚠️ Montant inférieur au minimum recommandé';
                    warningSpan.style.color = '#ef4444';
                } else if (total > maxInvestment) {
                    warningSpan.innerHTML = '⚠️ Montant supérieur au maximum recommandé';
                    warningSpan.style.color = '#ef4444';
                } else {
                    warningSpan.innerHTML = '✅ Montant dans la fourchette recommandée';
                    warningSpan.style.color = '#10b981';
                }
            });
        });
    }
    
    function submitBuyRequest(shopId, sharePrice, minInvestment, maxInvestment) {
        const quantity = parseInt(document.getElementById('sharesQty').value);
        if (!quantity || quantity < 1) { alert("Quantité invalide"); return; }
        const total = quantity * sharePrice;
        if (total < minInvestment) {
            if (!confirm(`Le montant (${total.toLocaleString()} FCFA) est inférieur au minimum recommandé (${minInvestment.toLocaleString()} FCFA). Voulez-vous continuer ?`)) return;
        }
        if (total > maxInvestment) {
            if (!confirm(`Le montant (${total.toLocaleString()} FCFA) est supérieur au maximum recommandé (${maxInvestment.toLocaleString()} FCFA). Voulez-vous continuer ?`)) return;
        }
        
        const request = {
            id: Date.now(),
            type: 'buy_shares',
            shopId,
            shopName: shops.find(s => s.id === shopId)?.name,
            investor: currentUser.email,
            investorName: currentUser.name,
            quantity,
            pricePerShare: sharePrice,
            total,
            paymentMethod: currentUser.paymentMethod,
            paymentDetails: currentUser.paymentDetails,
            date: new Date().toISOString(),
            status: 'pending_review'
        };
        
        let requests = JSON.parse(localStorage.getItem('ouenze_investment_requests') || '[]');
        requests.push(request);
        localStorage.setItem('ouenze_investment_requests', JSON.stringify(requests));
        
        // Mettre à jour les holdings pour le portefeuille
        syncPortfolioData();
        
        alert(`✅ Demande d'investissement envoyée !\n\nMontant: ${total.toLocaleString()} FCFA\nBoutique: ${request.shopName}\n\nUn email a été envoyé à notre équipe pour vérification.`);
        document.querySelector('.modal')?.remove();
        showShopDetail(shopId);
    }
    
    function openSellSharesModal(shopId, sharePrice, maxQuantity) {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>Vendre des actions</h3>
                <div class="form-group"><label>Nombre d'actions (max ${maxQuantity})</label><input type="number" id="sellQty" min="1" max="${maxQuantity}" value="1"></div>
                <div class="form-group"><label>Prix unitaire</label><input type="text" value="${sharePrice}" readonly disabled></div>
                <div class="form-group"><strong>Total: <span id="sellTotal">${sharePrice}</span> FCFA</strong></div>
                <div class="form-group"><label>Mode de réception</label>
                    <select id="withdrawMethod"><option value="airtel">Airtel Money</option><option value="mtn">MTN Mobile Money</option><option value="paypal">PayPal</option><option value="bank">Virement bancaire</option></select>
                </div>
                <div id="paymentFields">
                    <div class="form-group"><label>Identifiant / Numéro</label><input type="text" id="paymentAccount" placeholder="Numéro de téléphone ou email PayPal"></div>
                </div>
                <button class="btn-danger" onclick="submitSellRequest(${shopId}, ${sharePrice}, ${maxQuantity})">Soumettre la vente</button>
                <button onclick="this.closest('.modal').remove()" style="margin-top:12px;background:none;border:none;">Annuler</button>
            </div>`;
        document.body.appendChild(modal);
        document.getElementById('sellQty').addEventListener('input', (e) => {
            const total = e.target.value * sharePrice;
            document.getElementById('sellTotal').innerText = total.toLocaleString();
        });
    }
    
    function submitSellRequest(shopId, sharePrice, maxQuantity) {
        const quantity = parseInt(document.getElementById('sellQty').value);
        if (!quantity || quantity < 1 || quantity > maxQuantity) { alert("Quantité invalide"); return; }
        const total = quantity * sharePrice;
        const withdrawMethod = document.getElementById('withdrawMethod').value;
        const paymentAccount = document.getElementById('paymentAccount')?.value;
        
        const request = {
            id: Date.now(),
            type: 'sell_shares',
            shopId,
            shopName: shops.find(s => s.id === shopId)?.name,
            investor: currentUser.email,
            investorName: currentUser.name,
            quantity,
            pricePerShare: sharePrice,
            total,
            withdrawMethod,
            paymentAccount: paymentAccount || currentUser.paymentDetails,
            date: new Date().toISOString(),
            status: 'pending_review'
        };
        
        let requests = JSON.parse(localStorage.getItem('ouenze_investment_requests') || '[]');
        requests.push(request);
        localStorage.setItem('ouenze_investment_requests', JSON.stringify(requests));
        
        alert(`✅ Demande de vente envoyée !\n\nMontant: ${total.toLocaleString()} FCFA\nNotre équipe traitera votre demande sous 48h.`);
        document.querySelector('.modal')?.remove();
        showShopDetail(shopId);
    }
    
    function openAcquisitionModal(shopId, valuation) {
        if (!currentUser) { alert("Connectez-vous"); return; }
        checkPaymentInfo().then(hasInfo => {
            if (!hasInfo) return;
            const modal = document.createElement('div'); modal.className = 'modal active';
            modal.innerHTML = `
                <div class="modal-card">
                    <h3>Acquisition de la boutique</h3>
                    <div class="info-box" style="background:var(--gray-100);padding:12px;border-radius:12px;margin-bottom:16px;">
                        Valorisation: ${valuation.toLocaleString()} FCFA<br>
                        Minimum d'offre: ${Math.round(valuation * 0.5).toLocaleString()} FCFA
                    </div>
                    <div class="form-group"><label>Montant proposé (FCFA)</label><input type="number" id="acqAmount" value="${valuation}"></div>
                    <div class="form-group"><label>Message au vendeur</label><textarea id="acqMessage" rows="3"></textarea></div>
                    <button class="btn-success" onclick="submitAcquisitionRequest(${shopId}, ${valuation})">Envoyer l'offre d'acquisition</button>
                    <button onclick="this.closest('.modal').remove()" style="margin-top:12px;background:none;border:none;">Annuler</button>
                </div>`;
            document.body.appendChild(modal);
        });
    }
    
    function submitAcquisitionRequest(shopId, valuation) {
        const amount = parseInt(document.getElementById('acqAmount').value);
        const message = document.getElementById('acqMessage').value;
        if (!amount || amount < valuation * 0.5) { alert("Offre minimum 50% de la valorisation"); return; }
        
        const request = {
            id: Date.now(),
            type: 'acquisition',
            shopId,
            shopName: shops.find(s => s.id === shopId)?.name,
            investor: currentUser.email,
            investorName: currentUser.name,
            amount,
            message,
            valuation,
            date: new Date().toISOString(),
            status: 'pending_review'
        };
        
        let requests = JSON.parse(localStorage.getItem('ouenze_investment_requests') || '[]');
        requests.push(request);
        localStorage.setItem('ouenze_investment_requests', JSON.stringify(requests));
        
        alert(`✅ Offre d'acquisition envoyée !\n\nLe vendeur et notre équipe examineront votre proposition.\nUn email de confirmation a été envoyé.`);
        document.querySelector('.modal')?.remove();
        showShopDetail(shopId);
    }
    
    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    window.showInvestPage = showInvestPage;
    window.showActivitiesPage = showActivitiesPage;
    window.showShopDetail = showShopDetail;
    window.setSort = setSort;
    window.filterShops = filterShops;
    window.switchChart = switchChart;
    window.openBuySharesModal = openBuySharesModal;
    window.openSellSharesModal = openSellSharesModal;
    window.openAcquisitionModal = openAcquisitionModal;
    window.submitBuyRequest = submitBuyRequest;
    window.submitSellRequest = submitSellRequest;
    window.submitAcquisitionRequest = submitAcquisitionRequest;
    
    document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            if(tab.dataset.tab === 'invest') showInvestPage();
            else if(tab.dataset.tab === 'activities') showActivitiesPage();
            else if(tab.dataset.tab === 'portfolio') window.location.href = 'portfolio.html';
        });
    });
    
    if (shops.length === 0) {
        shops = [
            { id: 1, name: "Élégance Africaine", rating: 5.0, totalRatings: 342, products: [], city: "Brazzaville", quartier: "Moungali", monthlyRevenue: 950000, growthRate: 18, hasPhysicalStore: true, assets: [{ name: "Boutique physique", value: 2500000 }], liabilities: [], totalSales: 1250 },
            { id: 2, name: "Tech Congo", rating: 4.8, totalRatings: 124, products: [], city: "Brazzaville", quartier: "Centre-ville", monthlyRevenue: 450000, growthRate: 15, hasPhysicalStore: false, assets: [{ name: "Matériel informatique", value: 850000 }], liabilities: [], totalSales: 342 },
            { id: 3, name: "Saveurs du Congo", rating: 4.2, totalRatings: 203, products: [], city: "Pointe-Noire", quartier: "Centre", monthlyRevenue: 380000, growthRate: 12, hasPhysicalStore: true, assets: [{ name: "Équipement cuisine", value: 600000 }], liabilities: [], totalSales: 567 }
        ];
        localStorage.setItem('ouenze_shops', JSON.stringify(shops));
    }
    
    syncPortfolioData();
    
    document.addEventListener('DOMContentLoaded', () => {
        updateHeaderUI();
        showInvestPage();
    });
</script>
