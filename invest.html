<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouenze Invest | Plateforme d'investissement</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e17; color: #e2e8f0; }
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gold: #f59e0b;
            --silver: #94a3b8;
            --bronze: #b45309;
            --white: #ffffff;
            --gray-100: #1e2430;
            --gray-200: #2a3140;
            --gray-500: #6b7280;
            --gray-700: #9ca3af;
            --dark-bg: #0a0e17;
            --card-bg: #111827;
        }
        
        .header { background: var(--card-bg); border-bottom: 1px solid var(--gray-200); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; position: sticky; top: 0; z-index: 100; }
        .logo h1 { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .auth-btn { padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--gray-200); border: none; color: white; }
        .user-menu { display: flex; align-items: center; gap: 12px; background: var(--gray-200); padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .user-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
        
        .nav-tabs { display: flex; gap: 4px; background: var(--card-bg); padding: 8px 24px; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; }
        .nav-tab { padding: 8px 20px; background: none; border: none; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; color: var(--gray-500); }
        .nav-tab.active { background: var(--primary); color: white; }
        
        .main { max-width: 1400px; margin: 24px auto; padding: 0 24px; }
        
        .level-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 600; }
        .level-gold { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #b45309; border: 1px solid #f59e0b; }
        .level-silver { background: linear-gradient(135deg, #f1f5f9, #e2e8f0); color: #334155; border: 1px solid #94a3b8; }
        .level-bronze { background: linear-gradient(135deg, #ffedd5, #fed7aa); color: #9a3412; border: 1px solid #b45309; }
        .level-none { background: var(--gray-200); color: var(--gray-500); border: 1px solid var(--gray-200); }
        
        .filters-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
        .sort-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .sort-btn { padding: 8px 16px; background: var(--gray-200); border: 1px solid var(--gray-200); border-radius: 30px; cursor: pointer; font-size: 13px; transition: 0.2s; color: var(--gray-500); }
        .sort-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .search-input { padding: 8px 16px; background: var(--gray-200); border: 1px solid var(--gray-200); border-radius: 30px; width: 250px; color: white; }
        
        .shops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .shop-card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--gray-200); overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .shop-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.3); }
        .shop-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
        .shop-card.gold::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .shop-card.silver::before { background: linear-gradient(90deg, #94a3b8, #cbd5e1); }
        .shop-card.bronze::before { background: linear-gradient(90deg, #b45309, #f59e0b); }
        .shop-logo { padding: 20px; text-align: center; background: var(--gray-100); }
        .shop-logo-img { width: 70px; height: 70px; margin: 0 auto; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--gray-200); }
        .shop-name { margin-top: 12px; font-size: 18px; font-weight: 700; color: white; }
        .shop-rating { margin-top: 4px; font-size: 13px; color: var(--warning); }
        .shop-price { font-size: 20px; font-weight: 700; color: var(--primary); margin: 8px 0; }
        .shop-stats { padding: 16px; border-top: 1px solid var(--gray-200); display: flex; justify-content: space-between; font-size: 12px; color: var(--gray-500); }
        
        .shop-detail-container { background: var(--card-bg); border-radius: 24px; border: 1px solid var(--gray-200); padding: 24px; margin-bottom: 24px; }
        .shop-detail-header { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; }
        .shop-detail-logo { width: 100px; height: 100px; background: var(--gray-100); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .shop-level { margin-top: 8px; }
        .chart-tabs { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; border-bottom: 1px solid var(--gray-200); padding-bottom: 12px; }
        .chart-tab { padding: 8px 20px; background: var(--gray-200); border-radius: 30px; cursor: pointer; font-size: 13px; transition: 0.2s; color: var(--gray-500); }
        .chart-tab.active { background: var(--primary); color: white; }
        .chart-container { height: 300px; margin: 20px 0; }
        .table-container { overflow-x: auto; margin: 20px 0; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--gray-200); }
        .data-table th { background: var(--gray-100); font-weight: 600; color: white; }
        .data-table td { color: var(--gray-700); }
        .investment-range { background: var(--gray-100); padding: 16px; border-radius: 16px; margin: 16px 0; border-left: 4px solid var(--primary); color: white; }
        .fee-info { display: inline-block; padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; margin: 8px 0; }
        .fee-gold { background: #fef3c7; color: #b45309; }
        .fee-silver { background: #f1f5f9; color: #334155; }
        .fee-bronze { background: #ffedd5; color: #9a3412; }
        .action-buttons { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-card { background: var(--card-bg); border-radius: 24px; max-width: 500px; width: 100%; padding: 28px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--gray-200); position: relative; }
        .modal-close { position: absolute; top: 16px; right: 16px; font-size: 24px; cursor: pointer; background: none; border: none; color: var(--gray-500); }
        .modal-close:hover { color: var(--gray-700); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--gray-500); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: var(--gray-200); border: 1px solid var(--gray-200); border-radius: 10px; color: white; }
        
        .footer { border-top: 1px solid var(--gray-200); background: var(--card-bg); margin-top: 60px; padding: 24px; text-align: center; font-size: 12px; color: var(--gray-500); }
        
        @media (max-width: 700px) { .shops-grid { grid-template-columns: 1fr; } .action-buttons { flex-direction: column; } }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--success); color: white; padding: 12px 20px; border-radius: 40px; font-size: 13px; z-index: 2000; animation: slideIn 0.3s ease; }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="window.location.href='index.html'"><h1>OUENZE INVEST</h1></div>
    <div class="header-actions" id="headerActions"></div>
</div>

<div class="nav-tabs">
    <button class="nav-tab active" data-tab="invest">Investir</button>
    <button class="nav-tab" data-tab="activities" onclick="window.location.href='activities.html'">Mes activités</button>
    <button class="nav-tab" data-tab="portfolio" onclick="window.location.href='portfolio.html'">Mon portefeuille</button>
</div>

<div class="main" id="appContainer"></div>

<div class="footer">
    <p>© 2024 Ouenze Invest - Plateforme d'investissement certifiée | Transactions sécurisées par séquestre</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // ============ DONNÉES ============
    let currentUser = JSON.parse(localStorage.getItem('ouenze_current_user') || 'null');
    let shops = JSON.parse(localStorage.getItem('ouenze_shops') || '[]');
    let investments = JSON.parse(localStorage.getItem('ouenze_investments') || '[]');
    let userHoldings = JSON.parse(localStorage.getItem('ouenze_holdings') || '[]');
    let marketHistory = JSON.parse(localStorage.getItem('ouenze_market_history') || '[]');
    let investmentRequests = JSON.parse(localStorage.getItem('ouenze_investment_requests') || '[]');
    let currentSort = 'rating';
    let currentShop = null;
    let currentChart = null;
    
    // ============ FONCTIONS UTILITAIRES ============
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(s) {
        if (s === null || s === undefined) return '';
        return String(s).replace(/[&<>]/g, m => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;'
        }[m]));
    }
    
    // ============ GESTION DES NIVEAUX (CORRIGÉE) ============
    function getSafeLevelClass(level) {
        if (level === 'gold') return 'level-gold';
        if (level === 'silver') return 'level-silver';
        if (level === 'bronze') return 'level-bronze';
        return 'level-none';
    }
    
    function getShopLevel(shop) {
        const annualRevenue = (shop.monthlyRevenue || 500000) * 12;
        const valuation = calculateValuation(shop);
        const rating = shop.rating || 0;
        const hasPhysicalStore = shop.hasPhysicalStore || false;
        
        if (rating >= 4.5 && annualRevenue > 10000000 && valuation > 1000000 && hasPhysicalStore) {
            return { level: 'gold', name: 'Or', ouenzeFee: 21, vendorBonus: 1, minInvestment: 500000, maxInvestment: 5000000, color: '#f59e0b', bg: '#fef3c7' };
        }
        else if (rating >= 4 && rating < 5 && annualRevenue >= 5000000 && annualRevenue <= 10000000 && valuation > 500000) {
            return { level: 'silver', name: 'Argent', ouenzeFee: 21.5, vendorBonus: 0.5, minInvestment: 250000, maxInvestment: 2000000, color: '#94a3b8', bg: '#f1f5f9' };
        }
        else if (rating >= 3) {
            return { level: 'bronze', name: 'Bronze', ouenzeFee: 22, vendorBonus: 0, minInvestment: 100000, maxInvestment: 1000000, color: '#b45309', bg: '#ffedd5' };
        }
        return { level: null, name: 'Non éligible', ouenzeFee: 22, vendorBonus: 0, minInvestment: 0, maxInvestment: 0, color: '#64748b', bg: '#f1f5f9' };
    }
    
    function calculateValuation(shop) {
        const baseValue = 1000000;
        const productValue = (shop.products?.length || 0) * 50000;
        const ratingBonus = (shop.rating || 0) * 150000;
        const salesBonus = (shop.totalSales || 0) * 1000;
        const assetsValue = (shop.assets || []).reduce((sum, a) => sum + (a.value || 0), 0);
        return baseValue + productValue + ratingBonus + salesBonus + assetsValue;
    }
    
    function calculateSharePrice(valuation) {
        return Math.max(100, Math.round(valuation / 1000));
    }
    
    // Calcul du prix moyen pondéré (FIFO)
    function getAverageBuyPrice(shopId, userEmail) {
        const userInvestments = investments.filter(i => i.shopId === shopId && i.investor === userEmail);
        if (userInvestments.length === 0) return 0;
        const totalAmount = userInvestments.reduce((s, i) => s + i.amount, 0);
        const totalQuantity = userInvestments.reduce((s, i) => s + i.quantity, 0);
        return totalAmount / totalQuantity;
    }
    
    // ============ AUTHENTIFICATION ============
    function updateHeaderUI() {
        const container = document.getElementById('headerActions');
        if (currentUser) {
            container.innerHTML = `<div class="user-menu" onclick="showProfile()"><div class="user-avatar">${escapeHtml(currentUser.name.charAt(0))}</div><div>${escapeHtml(currentUser.name.split(' ')[0])}<br><small>Investisseur</small></div><button onclick="event.stopPropagation();logout()" style="background:none;border:none;cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button></div>`;
        } else {
            container.innerHTML = `<button class="auth-btn" onclick="openLoginModal()">Connexion</button>`;
        }
    }
    
    function openLoginModal() {
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button>
                <h3 style="margin-bottom:20px;">Connexion</h3>
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="exemple@email.com"></div>
                <div class="form-group"><label>Mot de passe</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
                <button class="btn-primary" style="width:100%;" onclick="doLogin()">Se connecter</button>
                <div style="text-align:center;margin-top:16px;">Pas de compte ? <a href="#" onclick="window.location.href='index.html'" style="color:var(--primary);">Inscription</a></div>
            </div>`;
        document.body.appendChild(modal);
    }
    
    function doLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email) { showToast("Email requis", true); return; }
        // Simulation de connexion (en production : validation backend)
        const allUsers = JSON.parse(localStorage.getItem('ouenze_all_users') || '[]');
        const user = allUsers.find(u => u.email === email && u.password === password);
        if (user) {
            currentUser = { name: user.fullName, email: user.email, type: 'investor' };
        } else {
            currentUser = { name: email.split('@')[0], email, type: 'investor' };
        }
        localStorage.setItem('ouenze_current_user', JSON.stringify(currentUser));
        updateHeaderUI();
        document.querySelector('.modal')?.remove();
        showInvestPage();
        showToast(`Bienvenue ${currentUser.name}`);
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem('ouenze_current_user');
        updateHeaderUI();
        showInvestPage();
        showToast("Déconnexion réussie");
    }
    
    function showProfile() {
        if (!currentUser) { openLoginModal(); return; }
        document.getElementById('appContainer').innerHTML = `
            <div class="shop-detail-container" style="text-align:center;">
                <div class="user-avatar" style="width:80px;height:80px;margin:0 auto;font-size:32px;">${escapeHtml(currentUser.name.charAt(0))}</div>
                <h3 style="margin:15px 0;">${escapeHtml(currentUser.name)}</h3>
                <p>${escapeHtml(currentUser.email)}</p>
                <p>Type: Investisseur</p>
                ${currentUser.paymentMethod ? `<p>Mode de paiement: ${currentUser.paymentMethod}</p>` : ''}
                <button class="btn-primary" style="margin-top:20px;" onclick="logout()">Se déconnecter</button>
                <button class="btn-outline" style="margin-top:10px;" onclick="showInvestPage()">Retour</button>
            </div>`;
    }
    
    // ============ PAGE INVESTISSEMENT ============
    function showInvestPage() {
        document.querySelectorAll('.nav-tab').forEach(tab => {
            if (tab.dataset.tab === 'invest') tab.classList.add('active');
            else tab.classList.remove('active');
        });
        
        const eligibleShops = shops.filter(s => s.rating >= 3);
        const sortedShops = sortShops(eligibleShops, currentSort);
        
        document.getElementById('appContainer').innerHTML = `
            <div class="filters-bar">
                <div class="sort-buttons">
                    <button class="sort-btn ${currentSort === 'rating' ? 'active' : ''}" onclick="setSort('rating')">Par note</button>
                    <button class="sort-btn ${currentSort === 'price' ? 'active' : ''}" onclick="setSort('price')">Par prix</button>
                    <button class="sort-btn ${currentSort === 'level' ? 'active' : ''}" onclick="setSort('level')">Par niveau</button>
                </div>
                <input type="text" id="searchShop" class="search-input" placeholder="Rechercher une boutique..." onkeyup="filterShops()">
            </div>
            <div class="shops-grid" id="shopsGrid"></div>
        `;
        renderShopsGrid(sortedShops);
    }
    
    function sortShops(shopsList, sortBy) {
        return [...shopsList].sort((a, b) => {
            if (sortBy === 'rating') return (b.rating || 0) - (a.rating || 0);
            if (sortBy === 'price') return calculateValuation(b) - calculateValuation(a);
            if (sortBy === 'level') {
                const levelA = getShopLevel(a).level;
                const levelB = getShopLevel(b).level;
                const order = { gold: 3, silver: 2, bronze: 1 };
                return (order[levelB] || 0) - (order[levelA] || 0);
            }
            return 0;
        });
    }
    
    function renderShopsGrid(shopsList) {
        const grid = document.getElementById('shopsGrid');
        if (!grid) return;
        if (!shopsList.length) { grid.innerHTML = '<div style="text-align:center;padding:60px;">Aucune boutique éligible (minimum 3 étoiles requises)</div>'; return; }
        grid.innerHTML = shopsList.map(shop => {
            const level = getShopLevel(shop);
            const valuation = calculateValuation(shop);
            const levelClass = level.level === 'gold' ? 'gold' : level.level === 'silver' ? 'silver' : 'bronze';
            const levelBadgeClass = getSafeLevelClass(level.level);
            return `
                <div class="shop-card ${levelClass}" onclick="showShopDetail(${shop.id})">
                    <div class="shop-logo">
                        <div class="shop-logo-img">${shop.logo ? `<img src="${shop.logo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : '<i class="fas fa-store" style="font-size:32px;"></i>'}</div>
                        <div class="shop-name">${escapeHtml(shop.name)}</div>
                        <div class="shop-rating">${'⭐'.repeat(Math.floor(shop.rating || 0))} ${shop.rating || 0}/5</div>
                        <div class="shop-price">${valuation.toLocaleString()} FCFA</div>
                        <div class="shop-level"><span class="level-badge ${levelBadgeClass}"><i class="fas fa-crown"></i> ${level.name || 'Standard'}</span></div>
                    </div>
                    <div class="shop-stats">
                        <span><i class="fas fa-box"></i> ${shop.products?.length || 0} produits</span>
                        <span class="trend-up"><i class="fas fa-arrow-up"></i> ${shop.growthRate || 12}%</span>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function filterShops() {
        const query = document.getElementById('searchShop')?.value.toLowerCase() || '';
        const eligibleShops = shops.filter(s => s.rating >= 3);
        const filtered = eligibleShops.filter(s => s.name.toLowerCase().includes(query));
        renderShopsGrid(sortShops(filtered, currentSort));
    }
    
    function setSort(type) {
        currentSort = type;
        showInvestPage();
    }
    
    // ============ DÉTAIL BOUTIQUE ============
    function showShopDetail(shopId) {
        const shop = shops.find(s => s.id === shopId);
        if (!shop) return;
        currentShop = shop;
        const level = getShopLevel(shop);
        const valuation = calculateValuation(shop);
        const sharePrice = calculateSharePrice(valuation);
        const history = getShopHistory(shopId);
        const userInvestments = investments.filter(i => i.investor === currentUser?.email && i.shopId === shopId);
        const totalInvested = userInvestments.reduce((s,i)=>s+i.amount,0);
        const totalShares = userInvestments.reduce((s,i)=>s+i.quantity,0);
        const avgPrice = getAverageBuyPrice(shopId, currentUser?.email);
        
        document.getElementById('appContainer').innerHTML = `
            <button onclick="showInvestPage()" style="background:none;border:none;color:var(--primary);cursor:pointer;margin-bottom:20px;"><i class="fas fa-arrow-left"></i> Retour</button>
            <div class="shop-detail-container">
                <div class="shop-detail-header">
                    <div class="shop-detail-logo">${shop.logo ? `<img src="${shop.logo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : '<i class="fas fa-store" style="font-size:48px;"></i>'}</div>
                    <div>
                        <h1>${escapeHtml(shop.name)}</h1>
                        <div class="shop-rating">${'⭐'.repeat(Math.floor(shop.rating || 0))} ${shop.rating || 0}/5 (${shop.totalRatings || 0} avis)</div>
                        <div class="shop-level">
                            <span class="level-badge ${getSafeLevelClass(level.level)}"><i class="fas fa-crown"></i> Niveau ${level.name || 'Standard'}</span>
                            <span class="fee-info fee-${level.level || 'none'}"><i class="fas fa-percent"></i> Commission: ${level.ouenzeFee}%</span>
                        </div>
                        <div>📍 ${escapeHtml(shop.city || 'Brazzaville')}, ${escapeHtml(shop.quartier || '')}</div>
                    </div>
                </div>
                
                ${currentUser ? `
                <div class="investment-range">
                    <strong><i class="fas fa-chart-line"></i> Fourchette d'investissement</strong><br>
                    Minimum: ${level.minInvestment.toLocaleString()} FCFA | Maximum: ${level.maxInvestment.toLocaleString()} FCFA
                    ${totalInvested > 0 ? `<br><span style="color:var(--primary);">💰 Votre investissement: ${totalInvested.toLocaleString()} FCFA (${totalShares} actions)</span>` : ''}
                    ${avgPrice > 0 ? `<br><span style="color:var(--gray-500);">📊 Prix moyen d'achat: ${Math.round(avgPrice).toLocaleString()} FCFA/action</span>` : ''}
                </div>
                ` : ''}
                
                <div class="chart-tabs">
                    <button class="chart-tab active" onclick="switchChart(event, 'price')">Évolution du prix</button>
                    <button class="chart-tab" onclick="switchChart(event, 'volume')">Volume des transactions</button>
                    <button class="chart-tab" onclick="switchChart(event, 'revenue')">Chiffre d'affaires</button>
                </div>
                <div class="chart-container">
                    <canvas id="shopChart"></canvas>
                </div>
                
                <div class="table-container">
                    <h3>Indicateurs financiers</h3>
                    <table class="data-table">
                        <tr><th>Valorisation totale</th><td>${valuation.toLocaleString()} FCFA</td> </tr>
                        <tr><th>Prix par action (0.1%)</th><td>${sharePrice.toLocaleString()} FCFA</td> </tr>
                        <tr><th>Chiffre d'affaires annuel</th><td>${((shop.monthlyRevenue || valuation * 0.1) * 12).toLocaleString()} FCFA</td> </tr>
                        <tr><th>Croissance estimée</th><td class="trend-up">+${shop.growthRate || 12}%</td> </tr>
                    </table>
                </div>
                
                ${currentUser ? `
                <div class="action-buttons">
                    <button class="btn-primary" onclick="openBuySharesModal(${shop.id}, ${sharePrice}, ${level.minInvestment}, ${level.maxInvestment})">Acheter des actions</button>
                    ${totalShares > 0 ? `<button class="btn-danger" onclick="openSellSharesModal(${shop.id}, ${sharePrice}, ${totalShares})">Vendre des actions</button>` : ''}
                    <button class="btn-outline" onclick="window.location.href='index.html?id=${shop.id}'">Voir la boutique</button>
                </div>
                ` : `<div style="background:var(--gray-100);padding:16px;border-radius:12px;text-align:center;">Connectez-vous pour investir dans cette boutique</div>`}
            </div>
        `;
        
        drawChart('price', history);
    }
    
    function getShopHistory(shopId) {
        let history = marketHistory.find(h => h.shopId === shopId);
        if (!history) {
            history = { shopId, data: generatePriceHistory(shopId) };
            marketHistory.push(history);
            localStorage.setItem('ouenze_market_history', JSON.stringify(marketHistory));
        }
        return history.data;
    }
    
    function generatePriceHistory(shopId) {
        const shop = shops.find(s => s.id === shopId);
        const valuation = calculateValuation(shop);
        let currentPrice = valuation / 1000;
        const history = [];
        for (let i = 30; i >= 0; i--) {
            const change = (Math.random() - 0.5) * 0.03;
            currentPrice = currentPrice * (1 + change);
            history.push({
                date: new Date(Date.now() - i * 86400000).toISOString().split('T')[0],
                price: Math.max(100, Math.round(currentPrice))
            });
        }
        return history;
    }
    
    function drawChart(type, history) {
        const ctx = document.getElementById('shopChart')?.getContext('2d');
        if (!ctx) return;
        if (currentChart) currentChart.destroy();
        
        let labels, data, label, color;
        if (type === 'price') {
            labels = history.map(h => h.date.slice(5));
            data = history.map(h => h.price);
            label = 'Prix par action (FCFA)';
            color = '#3b82f6';
        } else if (type === 'volume') {
            labels = history.slice(-10).map(h => h.date.slice(5));
            data = labels.map(() => Math.floor(Math.random() * 100 + 20));
            label = 'Volume transacted';
            color = '#22c55e';
        } else {
            labels = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
            data = labels.map(() => Math.floor(Math.random() * 500000 + 200000));
            label = 'CA mensuel (FCFA)';
            color = '#f59e0b';
        }
        
        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, color + '40');
        gradient.addColorStop(1, color + '00');
        currentChart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ label, data, borderColor: color, backgroundColor: gradient, fill: true, tension: 0.3, pointRadius: 2 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { color: '#9ca3af' } } } }
        });
    }
    
    function switchChart(event, type) {
        const history = getShopHistory(currentShop.id);
        drawChart(type, history);
        document.querySelectorAll('.chart-tab').forEach(tab => tab.classList.remove('active'));
        if (event && event.target) event.target.classList.add('active');
    }
    
    // ============ ACHAT/VENTE D'ACTIONS ============
    function openBuySharesModal(shopId, sharePrice, minInvestment, maxInvestment) {
        if (!currentUser) { showToast("Connectez-vous", true); return; }
        
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button>
                <h3 style="margin-bottom:20px;">Acheter des actions</h3>
                <div class="investment-range" style="margin-bottom:16px;">
                    Fourchette d'investissement:<br>
                    Minimum: ${minInvestment.toLocaleString()} FCFA | Maximum: ${maxInvestment.toLocaleString()} FCFA
                </div>
                <div class="form-group"><label>Nombre d'actions</label><input type="number" id="sharesQty" min="1" value="1"></div>
                <div class="form-group"><label>Prix unitaire</label><input type="text" id="sharePrice" value="${sharePrice}" readonly disabled></div>
                <div class="form-group"><strong>Total: <span id="totalPrice">${sharePrice}</span> FCFA</strong></div>
                <div id="investmentWarning" style="font-size:12px;margin-top:8px;"></div>
                <div class="form-group"><label>Mode de paiement</label>
                    <select id="paymentMethod">
                        <option value="airtel">Airtel Money</option>
                        <option value="mtn">MTN Mobile Money</option>
                        <option value="orange">Orange Money</option>
                        <option value="visa">Carte bancaire</option>
                    </select>
                </div>
                <div class="form-group"><label>Numéro / Identifiant</label><input type="text" id="paymentDetails" placeholder="Numéro de téléphone ou email"></div>
                <button class="btn-primary" style="width:100%;" onclick="submitBuyRequest(${shopId}, ${sharePrice}, ${minInvestment}, ${maxInvestment})">Confirmer l'achat</button>
            </div>`;
        document.body.appendChild(modal);
        
        const qtyInput = document.getElementById('sharesQty');
        const totalSpan = document.getElementById('totalPrice');
        const warningSpan = document.getElementById('investmentWarning');
        qtyInput.addEventListener('input', (e) => {
            const qty = parseInt(e.target.value) || 0;
            const total = qty * sharePrice;
            totalSpan.innerText = total.toLocaleString();
            if (total < minInvestment && total > 0) {
                warningSpan.innerHTML = '⚠️ Montant inférieur au minimum recommandé';
                warningSpan.style.color = '#ef4444';
            } else if (total > maxInvestment) {
                warningSpan.innerHTML = '⚠️ Montant supérieur au maximum recommandé';
                warningSpan.style.color = '#ef4444';
            } else if (total > 0) {
                warningSpan.innerHTML = '✅ Montant dans la fourchette recommandée';
                warningSpan.style.color = '#22c55e';
            } else {
                warningSpan.innerHTML = '';
            }
        });
    }
    
    function submitBuyRequest(shopId, sharePrice, minInvestment, maxInvestment) {
        const quantity = parseInt(document.getElementById('sharesQty').value);
        const paymentMethod = document.getElementById('paymentMethod').value;
        const paymentDetails = document.getElementById('paymentDetails').value;
        
        if (!quantity || quantity < 1) { showToast("Quantité invalide", true); return; }
        if (!paymentDetails) { showToast("Veuillez renseigner vos coordonnées de paiement", true); return; }
        
        const total = quantity * sharePrice;
        if (total < minInvestment) {
            if (!confirm(`Le montant (${total.toLocaleString()} FCFA) est inférieur au minimum recommandé (${minInvestment.toLocaleString()} FCFA). Voulez-vous continuer ?`)) return;
        }
        if (total > maxInvestment) {
            if (!confirm(`Le montant (${total.toLocaleString()} FCFA) est supérieur au maximum recommandé (${maxInvestment.toLocaleString()} FCFA). Voulez-vous continuer ?`)) return;
        }
        
        // Mettre à jour les infos de paiement de l'utilisateur
        currentUser.paymentMethod = paymentMethod;
        currentUser.paymentDetails = paymentDetails;
        localStorage.setItem('ouenze_current_user', JSON.stringify(currentUser));
        
        const investment = {
            id: Date.now(),
            shopId: shopId,
            shopName: shops.find(s => s.id === shopId)?.name,
            investor: currentUser.email,
            investorName: currentUser.name,
            quantity: quantity,
            amount: total,
            pricePerShare: sharePrice,
            date: new Date().toISOString(),
            status: 'active'
        };
        
        investments.push(investment);
        localStorage.setItem('ouenze_investments', JSON.stringify(investments));
        
        // Mettre à jour les holdings (agrégation)
        const existingHolding = userHoldings.find(h => h.shopId === shopId && h.userId === currentUser.email);
        if (existingHolding) {
            const newTotalAmount = existingHolding.amount + total;
            const newTotalQuantity = existingHolding.quantity + quantity;
            existingHolding.amount = newTotalAmount;
            existingHolding.quantity = newTotalQuantity;
            existingHolding.avgPrice = newTotalAmount / newTotalQuantity;
        } else {
            userHoldings.push({
                shopId: shopId,
                shopName: shops.find(s => s.id === shopId)?.name,
                userId: currentUser.email,
                userName: currentUser.name,
                quantity: quantity,
                amount: total,
                avgPrice: sharePrice,
                date: new Date().toISOString()
            });
        }
        localStorage.setItem('ouenze_holdings', JSON.stringify(userHoldings));
        
        // Enregistrer la demande
        const request = {
            id: Date.now(), type: 'buy_shares',
            shopId, shopName: shops.find(s => s.id === shopId)?.name,
            investor: currentUser.email, investorName: currentUser.name,
            quantity, pricePerShare: sharePrice, total,
            paymentMethod, paymentDetails,
            date: new Date().toISOString(), status: 'approved'
        };
        investmentRequests.push(request);
        localStorage.setItem('ouenze_investment_requests', JSON.stringify(investmentRequests));
        
        showToast(`✅ Achat confirmé ! ${total.toLocaleString()} FCFA - ${quantity} actions`);
        document.querySelector('.modal')?.remove();
        showShopDetail(shopId);
    }
    
    function openSellSharesModal(shopId, sharePrice, maxQuantity) {
        if (!currentUser) { showToast("Connectez-vous", true); return; }
        
        const modal = document.createElement('div'); modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button>
                <h3 style="margin-bottom:20px;">Vendre des actions</h3>
                <div class="form-group"><label>Nombre d'actions (max ${maxQuantity})</label><input type="number" id="sellQty" min="1" max="${maxQuantity}" value="1"></div>
                <div class="form-group"><label>Prix unitaire</label><input type="text" value="${sharePrice}" readonly disabled></div>
                <div class="form-group"><strong>Total: <span id="sellTotal">${sharePrice}</span> FCFA</strong></div>
                <div class="form-group"><label>Mode de réception</label>
                    <select id="withdrawMethod">
                        <option value="airtel">Airtel Money</option>
                        <option value="mtn">MTN Mobile Money</option>
                        <option value="orange">Orange Money</option>
                        <option value="bank">Virement bancaire</option>
                    </select>
                </div>
                <div class="form-group"><label>Compte de réception</label><input type="text" id="receiveAccount" placeholder="Numéro ou IBAN"></div>
                <button class="btn-danger" style="width:100%;" onclick="submitSellRequest(${shopId}, ${sharePrice}, ${maxQuantity})">Confirmer la vente</button>
            </div>`;
        document.body.appendChild(modal);
        
        document.getElementById('sellQty').addEventListener('input', (e) => {
            const total = (parseInt(e.target.value) || 0) * sharePrice;
            document.getElementById('sellTotal').innerText = total.toLocaleString();
        });
    }
    
    function submitSellRequest(shopId, sharePrice, maxQuantity) {
        const quantity = parseInt(document.getElementById('sellQty').value);
        const withdrawMethod = document.getElementById('withdrawMethod').value;
        const receiveAccount = document.getElementById('receiveAccount').value;
        
        if (!quantity || quantity < 1 || quantity > maxQuantity) { showToast("Quantité invalide", true); return; }
        if (!receiveAccount) { showToast("Veuillez renseigner un compte de réception", true); return; }
        
        const total = quantity * sharePrice;
        
        // Gestion FIFO : supprimer les plus anciens investissements en premier
        let remainingToSell = quantity;
        const updatedInvestments = [...investments];
        const userInvestments = investments.filter(i => i.shopId === shopId && i.investor === currentUser.email);
        
        for (let i = 0; i < userInvestments.length && remainingToSell > 0; i++) {
            const invIndex = updatedInvestments.findIndex(ui => ui.id === userInvestments[i].id);
            if (invIndex !== -1) {
                if (updatedInvestments[invIndex].quantity <= remainingToSell) {
                    remainingToSell -= updatedInvestments[invIndex].quantity;
                    updatedInvestments.splice(invIndex, 1);
                } else {
                    updatedInvestments[invIndex].quantity -= remainingToSell;
                    updatedInvestments[invIndex].amount = updatedInvestments[invIndex].quantity * updatedInvestments[invIndex].pricePerShare;
                    remainingToSell = 0;
                }
            }
        }
        
        investments.length = 0;
        investments.push(...updatedInvestments);
        localStorage.setItem('ouenze_investments', JSON.stringify(investments));
        
        // Mettre à jour les holdings
        const holdingIndex = userHoldings.findIndex(h => h.shopId === shopId && h.userId === currentUser.email);
        if (holdingIndex !== -1) {
            const holding = userHoldings[holdingIndex];
            if (quantity >= holding.quantity) {
                userHoldings.splice(holdingIndex, 1);
            } else {
                const ratio = quantity / holding.quantity;
                holding.quantity -= quantity;
                holding.amount = holding.amount * (1 - ratio);
            }
            localStorage.setItem('ouenze_holdings', JSON.stringify(userHoldings));
        }
        
        const request = {
            id: Date.now(), type: 'sell_shares',
            shopId, shopName: shops.find(s => s.id === shopId)?.name,
            investor: currentUser.email, investorName: currentUser.name,
            quantity, pricePerShare: sharePrice, total,
            withdrawMethod, receiveAccount,
            date: new Date().toISOString(), status: 'approved'
        };
        investmentRequests.push(request);
        localStorage.setItem('ouenze_investment_requests', JSON.stringify(investmentRequests));
        
        showToast(`✅ Vente confirmée ! ${total.toLocaleString()} FCFA - ${quantity} actions vendues`);
        document.querySelector('.modal')?.remove();
        showShopDetail(shopId);
    }
    
    // ============ INITIALISATION ============
    if (shops.length === 0) {
        shops = [
            { id: 1, name: "Élégance Africaine", rating: 5.0, totalRatings: 342, products: [], city: "Brazzaville", quartier: "Moungali", monthlyRevenue: 950000, growthRate: 18, hasPhysicalStore: true, assets: [{ name: "Boutique physique", value: 2500000 }], liabilities: [], totalSales: 1250 },
            { id: 2, name: "Tech Congo", rating: 4.8, totalRatings: 124, products: [], city: "Brazzaville", quartier: "Centre-ville", monthlyRevenue: 450000, growthRate: 15, hasPhysicalStore: false, assets: [{ name: "Matériel informatique", value: 850000 }], liabilities: [], totalSales: 342 },
            { id: 3, name: "Saveurs du Congo", rating: 4.2, totalRatings: 203, products: [], city: "Pointe-Noire", quartier: "Centre", monthlyRevenue: 380000, growthRate: 12, hasPhysicalStore: true, assets: [{ name: "Équipement cuisine", value: 600000 }], liabilities: [], totalSales: 567 }
        ];
        localStorage.setItem('ouenze_shops', JSON.stringify(shops));
    }
    
    // Initialisation
    document.addEventListener('DOMContentLoaded', () => {
        updateHeaderUI();
        showInvestPage();
    });
    
    // Exports globaux
    window.showInvestPage = showInvestPage;
    window.showShopDetail = showShopDetail;
    window.setSort = setSort;
    window.filterShops = filterShops;
    window.switchChart = switchChart;
    window.openBuySharesModal = openBuySharesModal;
    window.openSellSharesModal = openSellSharesModal;
    window.submitBuyRequest = submitBuyRequest;
    window.submitSellRequest = submitSellRequest;
    window.showProfile = showProfile;
    window.doLogin = doLogin;
    window.logout = logout;
    window.openLoginModal = openLoginModal;
</script>
