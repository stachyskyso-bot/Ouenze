<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ouenze | Devenir livreur</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon/Icon.png">
    <link rel="apple-touch-icon" href="favicon/Icon.png">
    <!-- Polices et bibliothèques externes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Styles personnalisés -->
    <link rel="stylesheet" href="css/delivery-register.css">
</head>
<body>

<div class="header">
    <div class="logo" onclick="window.location.href='index.html'"><h1>OUENZE</h1></div>
    <div><button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Retour</button></div>
</div>

<div class="container">
    <div class="register-card">
        <div class="register-header">
            <h2>Devenir livreur partenaire</h2>
            <p>Rejoignez notre réseau de livraison et gagnez de l'argent</p>
        </div>
        
        <div class="step-indicator" id="stepIndicator">
            <div class="step active"></div>
            <div class="step"></div>
            <div class="step"></div>
        </div>
        
        <div id="stepContent"></div>
    </div>
</div>

<div class="footer">
    <p>© 2024 Ouenze - Programme livreur partenaire</p>
</div>

<!-- Scripts -->
<script src="database.js"></script>
<script src="js/delivery-register.js"></script>
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Configuration Supabase -->
<script src="js/supabase-config.js"></script>

</html>
